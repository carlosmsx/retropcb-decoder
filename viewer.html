<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PCB Viewer</title>
    
    
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png">
    <script src="src/i18n.js"></script>
    <style>
      :root {
        --ink: #17211f;
        --muted: #596561;
        --paper: #f7f7f2;
        --panel: #ffffff;
        --line: #d8ded9;
        --green: #176b58;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
      }

      /* ── Nav superior fijo (estilo site-header) ── */
      .viewer-nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 52px;
        z-index: 30;
        background: var(--paper);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 16px;
      }

      /* Todos los items del nav no crecen salvo el spacer */
      .viewer-nav > * { flex-shrink: 0; }

      /* ── Toolbox ─────────────────────────────────────────────────── */
      .toolbar {
        position: fixed;
        z-index: 20;
        background: rgba(247, 247, 242, .97);
        border: 1px solid var(--line);
        box-shadow: 0 4px 20px rgba(16, 37, 32, .10);
        backdrop-filter: blur(12px);
        overflow-y: auto;
        overflow-x: hidden;
      }

      .toolbar-layers {
        display: flex;
        flex-direction: column;
      }

      /* ── Accordion group ── */
      .layer-group {
        border-bottom: 1px solid var(--line);
        flex-shrink: 0;
      }
      .layer-group:last-child { border-bottom: none; }

      .lg-header {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 10px;
        border: none;
        min-height: unset;
        height: auto;
        background: transparent;
        cursor: pointer;
        color: var(--ink);
        font: inherit;
      }
      .lg-header:hover { background: rgba(23, 107, 88, .06); }

      .lg-label {
        font-size: 10px;
        font-weight: 760;
        text-transform: uppercase;
        letter-spacing: .05em;
        color: var(--muted);
      }

      .lg-chevron {
        font-size: 11px;
        color: var(--muted);
        transition: transform .15s;
        flex-shrink: 0;
      }
      .layer-group.is-closed .lg-chevron { transform: rotate(-90deg); }
      .layer-group.is-closed .lg-body    { display: none; }

      .lg-body { padding: 0 6px 8px; }

      .lg-buttons {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3px;
      }

      /* ── Landscape: panel izquierdo ── */
      @media (orientation: landscape) {
        .toolbar {
          top: 64px; left: 12px; bottom: 12px;
          width: 128px;
          border-radius: 8px;
        }
      }

      /* ── Portrait: panel inferior ── */
      @media (orientation: portrait), (max-width: 640px) {
        .toolbar {
          bottom: 0; left: 0; right: 0;
          border-radius: 12px 12px 0 0;
          max-height: 50vh;
        }
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-right: 4px;
        text-decoration: none;
        color: inherit;
      }

      .brand-talent { height: 18px; width: auto; }
      .brand-msx    { height: 18px; width: auto; opacity: .75; }

      .viewer-nav-links {
        margin-left: auto;
        display: flex;
        gap: 18px;
      }

      .viewer-nav-links a {
        font-size: 14px;
        color: var(--muted);
        text-decoration: none;
      }

      .viewer-nav-links a:hover {
        color: var(--green);
      }

      .lang-btn-v {
        min-height: 26px;
        padding: 2px 7px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: transparent;
        color: var(--muted);
        font: inherit;
        font-size: 11px;
        font-weight: 760;
        cursor: pointer;
        letter-spacing: .03em;
      }


      button,
      select {
        min-height: 34px;
        border: 1px solid var(--ink);
        border-radius: 5px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
        font-weight: 700;
      }

      button {
        min-width: 36px;
        padding: 5px 9px;
        cursor: pointer;
      }

      select {
        padding: 5px 8px;
      }

      .readout {
        color: var(--muted);
        font-family: "Courier New", monospace;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 1;
        min-width: 0;
      }

      .viewer {
        position: fixed;
        inset: 52px 0 0 0;
        overflow: hidden;
        background: #101715;
        cursor: grab;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
      }

      .viewer.is-dragging {
        cursor: grabbing;
      }

      html.is-panning,
      html.is-panning * {
        cursor: grabbing !important;
        user-select: none !important;
      }

      .world {
        position: absolute;
        left: 0;
        top: 0;
        transform-origin: 0 0;
        will-change: transform;
      }

      .layer {
        position: absolute;
        inset: 0;
      }

      .drill-overlay {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .trace-overlay {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .trace-outline {
        fill: none;
        stroke: rgba(0, 0, 0, .55);
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .trace-line {
        fill: none;
        opacity: .78;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .trace-line.side-a { stroke: rgba(255, 225, 64, .96); }
      .trace-line.side-b { stroke: rgba(255, 78, 190, .96); }

      .trace-line.is-selected { opacity: 1; filter: brightness(1.4) drop-shadow(0 0 3px #fff); }
      .trace-line.is-net      { opacity: 1; }
      .trace-line.is-dimmed   { opacity: .15; }

      .drill-highlight {
        fill: rgba(0, 255, 80, .75);
        stroke: rgba(0, 255, 80, 1);
        stroke-width: 2px;
        pointer-events: none;
      }

      /* ── Orphan endpoint debug overlay ── */
      .orphan-dot {
        pointer-events: none;
      }
      .orphan-true {
        fill: rgba(255, 30, 30, .85);
        stroke: #ff0000;
        stroke-width: 2;
      }
      .orphan-tjunction {
        fill: rgba(255, 150, 0, .75);
        stroke: rgba(255, 110, 0, .9);
        stroke-width: 1.5;
      }

      #drill-overlay circle,
      #drill-overlay polygon,
      #drill-overlay rect {
        pointer-events: all;
      }

      .pin-tooltip {
        position: fixed;
        z-index: 30;
        pointer-events: none;
        background: rgba(247, 247, 242, .97);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 6px 24px rgba(16, 37, 32, .18);
        padding: 10px 14px;
        font-size: 12px;
        min-width: 220px;
        max-width: 320px;
        display: none;
        backdrop-filter: blur(8px);
      }

      .pin-tooltip.is-visible {
        display: block;
      }

      .pin-tooltip-title {
        font-weight: 800;
        font-size: 13px;
        margin-bottom: 6px;
        color: var(--green);
        border-bottom: 1px solid var(--line);
        padding-bottom: 5px;
      }

      .pin-tooltip-note {
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
        font-style: italic;
      }

      .pin-tooltip-signal {
        font-size: 15px;
        font-weight: 700;
        color: #1a1a1a;
        margin-top: 4px;
        letter-spacing: 0.03em;
      }

      .pin-tooltip table {
        border-collapse: collapse;
        width: 100%;
      }

      .pin-tooltip td {
        padding: 1px 0;
        vertical-align: top;
        line-height: 1.5;
      }

      .pin-tooltip td:first-child {
        font-family: "Courier New", monospace;
        font-weight: 700;
        color: var(--muted);
        white-space: nowrap;
        padding-right: 8px;
        min-width: 28px;
      }

      .pin-tooltip tr.is-active td {
        font-weight: 700;
        color: var(--green);
      }

      .pin-tooltip tr.is-active td:first-child {
        color: var(--green);
      }

      .drill-via {
        fill: rgba(255, 132, 59, .22);
        stroke: rgba(255, 132, 59, .95);
        stroke-width: 1.4;
      }

      .ic-bbox {
        fill: rgba(0, 194, 255, .08);
        stroke: rgba(0, 194, 255, .7);
        stroke-width: 1.5;
        stroke-dasharray: 6 3;
        pointer-events: all;
        cursor: default;
      }

      .ic-bbox-label,
      .con-bbox-label, .con50-bbox-label,
      .con50-a-bbox-label, .con50-b-bbox-label,
      .rnet-bbox-label,
      .cap-label, .res-label,
      .relay-label, .jp-label, .xtal-label,
      .trn-label, .ind-label {
        font-size: 18px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
        user-select: none;
      }

      .ic-bbox-label {
        fill: rgba(0, 194, 255, .9);
      }

      .drill-pad {
        fill: rgba(255, 255, 255, .12);
        stroke: rgba(255, 255, 255, .70);
        stroke-width: 1.2;
      }

      .drill-cap  { fill: rgba(255, 220, 0, .22);  stroke: rgba(255, 210, 0, .90);  stroke-width: 1.5; }
      .drill-res  { fill: rgba(255, 140, 0, .22);  stroke: rgba(255, 120, 0, .90);  stroke-width: 1.5; }
      .drill-ind  { fill: rgba(180, 80,  255, .22); stroke: rgba(150, 50, 220, .90); stroke-width: 1.5; }
      .drill-jp   { fill: rgba(255, 160, 0, .22);  stroke: rgba(220, 130, 0, .90);  stroke-width: 1.5; }
      .drill-xtal { fill: rgba(0,   210, 180, .22); stroke: rgba(0,  180, 150, .90); stroke-width: 1.5; }
      .drill-trn  { fill: rgba(180, 120, 255, .22); stroke: rgba(160, 96, 240, .90);  stroke-width: 1.5; }
      .drill-dio  { fill: rgba(80,  200, 100, .22); stroke: rgba(50, 180,  80, .90);  stroke-width: 1.5; }

      .drill-relay {
        fill: rgba(255, 80, 80, .30);
        stroke: rgba(200, 40, 40, .96);
        stroke-width: 1.8;
        cursor: default;
      }

      .drill-ic {
        fill: rgba(0, 194, 255, .22);
        stroke: rgba(0, 194, 255, .96);
        stroke-width: 1.4;
      }

      .drill-con {
        fill: rgba(255, 218, 77, .24);
        stroke: rgba(255, 218, 77, .96);
        stroke-width: 1.5;
      }

      .con-bbox {
        fill: rgba(255, 218, 77, .18);
        stroke: rgba(255, 218, 77, .95);
        stroke-width: 2;
        stroke-dasharray: 8 4;
        pointer-events: all;
        cursor: default;
      }
      .con-bbox-label     { fill: rgba(255, 200, 50, 1); }
      .con50-a-bbox       { fill: rgba(190, 96, 255, .18); stroke: rgba(190, 96, 255, .95);
                            stroke-width: 2; stroke-dasharray: 8 4;
                            pointer-events: all; cursor: default; }
      .con50-a-bbox-label { fill: rgba(190, 96, 255, 1); }
      .con50-b-bbox       { fill: rgba(210, 218, 224, .18); stroke: rgba(210, 218, 224, .95);
                            stroke-width: 2; stroke-dasharray: 8 4;
                            pointer-events: all; cursor: default; }
      .con50-b-bbox-label { fill: rgba(210, 218, 224, 1); }

      .drill-con50-a {
        fill: rgba(190, 96, 255, .22);
        stroke: rgba(190, 96, 255, .96);
        stroke-width: 1.5;
      }

      .drill-con50-b {
        fill: rgba(210, 218, 224, .22);
        stroke: rgba(210, 218, 224, .96);
        stroke-width: 1.5;
      }

      .cap-footprint {
        fill: rgba(255, 220, 0, .25);
        stroke: rgba(255, 210, 0, 1);
        stroke-width: 2.5;
        stroke-linejoin: round;
        pointer-events: all;
        cursor: default;
      }

      .cap-label   { fill: rgba(255, 210, 0, 0.9); }
      .res-label   { fill: rgba(255, 120, 0, 0.9); }
      .rnet-bbox-label { fill: rgba(255, 120, 0, 1); }

      .res-footprint {
        fill: rgba(255, 140, 0, .20);
        stroke: rgba(255, 120, 0, 1);
        stroke-width: 2.5;
        stroke-linejoin: round;
        pointer-events: all;
        cursor: default;
      }

      .dio-footprint {
        fill: rgba(60, 160, 255, .18);
        stroke: rgba(30, 120, 255, 1);
        stroke-width: 2.5;
        stroke-linejoin: round;
        pointer-events: all;
        cursor: default;
      }

      .dio-arrow {
        fill: rgba(30, 120, 255, .75);
        pointer-events: none;
      }

      .relay-footprint {
        fill: rgba(255, 80, 80, .15);
        stroke: rgba(200, 40, 40, 1);
        stroke-width: 3;
        pointer-events: visibleFill;
        cursor: default;
      }

      .relay-label { fill: rgba(180, 30, 30, 0.9); }

      .jp-footprint {
        fill: rgba(255, 160, 0, .18);
        stroke: rgba(220, 130, 0, 1);
        stroke-width: 2.5;
        stroke-dasharray: 6 3;
        pointer-events: visibleFill;
        cursor: default;
      }

      .jp-label  { fill: rgba(200, 110, 0, 0.9); }

      .xtal-footprint {
        fill: rgba(0, 210, 180, .15);
        stroke: rgba(0, 180, 150, 1);
        stroke-width: 2.5;
        pointer-events: visibleFill;
        cursor: default;
      }

      .xtal-label  { fill: rgba(0, 160, 130, 0.9); }

      .trn-footprint {
        fill: rgba(180, 120, 255, .18);
        stroke: rgba(160, 96, 240, 1);
        stroke-width: 1.5;
        pointer-events: visibleFill;
        cursor: default;
      }

      .trn-label   { fill: rgba(160, 96, 240, 0.9); }

      .drill-trn {
        fill: rgba(180, 120, 255, .22);
        stroke: rgba(160, 96, 240, .96);
        stroke-width: 1.4;
      }

      .ind-footprint {
        fill: rgba(180, 80, 255, .15);
        stroke: rgba(150, 50, 220, 1);
        stroke-width: 2.5;
        pointer-events: visibleFill;
        cursor: default;
      }

      .ind-label   { fill: rgba(150, 50, 220, 0.9); }



      .tile {
        position: absolute;
        display: block;
        width: 512px;
        height: 512px;
        background: #202927;
        image-rendering: auto;
        pointer-events: none;
        user-select: none;
      }

      .help {
        color: var(--muted);
        font-size: 13px;
      }

      .opacity-control {
        display: none;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .opacity-control.is-visible {
        display: inline-flex;
      }

      .opacity-control input {
        width: 120px;
      }

      .silkscreen-control {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .drill-control {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      /* Oculto por defecto via atributo hidden; se muestra con display:grid en JS */
      .empty {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        color: #f7f7f2;
        pointer-events: none;
        user-select: none;
      }

      .crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 17px;
        height: 17px;
        z-index: 15;
        pointer-events: none;
        transform: translate(-50%, -50%);
      }

      .crosshair::before,
      .crosshair::after {
        content: "";
        position: absolute;
        background: rgba(255, 255, 255, .75);
      }

      .crosshair::before {
        left: 8px;
        top: 0;
        width: 1px;
        height: 17px;
      }

      .crosshair::after {
        left: 0;
        top: 8px;
        width: 17px;
        height: 1px;
      }

      /* ── toolbar structure ──────────────────────────────────────── */
      .toolbar-sep {
        width: 1px;
        height: 26px;
        background: var(--line);
        align-self: center;
        flex-shrink: 0;
        margin: 0 2px;
      }

      .toolbar-group {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .tool-button {
        width: auto;
        min-width: unset;
        min-height: unset;
        height: auto;
        padding: 6px 4px;
        border: 1px solid transparent;
        background: transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        font-size: 16px;
        line-height: 1;
        border-radius: 5px;
        color: var(--ink);
        cursor: pointer;
        transition: background .1s, border-color .1s;
        flex-shrink: 0;
      }

      #share-btn.copied { color: var(--green); }

      /* En la grilla del toolbox sí ocupa todo el ancho de la celda */
      .lg-buttons .tool-button {
        width: 100%;
      }

      .tool-button:hover {
        background: rgba(23, 107, 88, .08);
        border-color: var(--line);
      }

      .tool-button.is-active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      .tool-button .btn-lbl {
        font-size: 7.5px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        opacity: 0.65;
      }

      .tool-button.is-active .btn-lbl {
        opacity: 0.85;
      }

      /* ── Tabler Icons size normalisation ─────────────────────────── */
      .ti {
        font-size: 18px;
        line-height: 1;
        display: inline-block;
      }

      /* ── Resistor body in tooltip ──────────────────────────────────── */
      .res-body-wrap {
        margin-top: 10px;
        display: flex;
        justify-content: center;
      }

      .res-body-svg {
        display: block;
        filter: drop-shadow(0 1px 2px rgba(0,0,0,.18));
      }

      /* ── Search dialog ─────────────────────────────────────────────── */
      .search-dialog {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 50;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        box-shadow: 0 16px 48px rgba(16, 37, 32, .22);
        padding: 18px 20px 16px;
        width: 300px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .search-dialog[hidden] {
        display: none;
      }

      .search-dialog-title {
        font-weight: 800;
        font-size: 14px;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .search-dialog-input {
        width: 100%;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        font-size: 14px;
        color: var(--ink);
        background: var(--paper);
        outline: none;
        transition: border-color .15s;
        box-sizing: border-box;
      }

      .search-dialog-input:focus {
        border-color: var(--green);
      }

      .search-dialog-error {
        font-size: 12px;
        color: #c0392b;
        font-weight: 700;
        padding: 6px 8px;
        background: rgba(192, 57, 43, .08);
        border-radius: 5px;
        border: 1px solid rgba(192, 57, 43, .25);
      }

      .search-dialog-error[hidden] {
        display: none;
      }

      .search-dialog-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .search-dialog-btn {
        min-height: 32px;
        padding: 5px 16px;
        border-radius: 5px;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        border: 1px solid var(--line);
        background: var(--paper);
        color: var(--ink);
      }

      .search-dialog-btn-ok {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      .search-dialog-btn-ok:hover {
        background: var(--green);
        border-color: var(--green);
      }

      .search-dialog-btn-cancel:hover {
        background: var(--line);
      }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  </head>
  <body>
    <div class="viewer" id="viewer" aria-label="Navegador de motherboard por tiles">
      <div class="world" id="world">
        <div class="layer" id="layer-a"></div>
        <div class="layer" id="layer-b"></div>
        <div class="layer" id="layer-silk"></div>
      </div>
      <svg class="drill-overlay" id="drill-overlay" aria-hidden="true"></svg>
      <svg class="trace-overlay" id="trace-overlay" aria-label="Pistas vectoriales"></svg>
      <svg class="drill-overlay" id="highlight-overlay" aria-hidden="true"></svg>
      <svg class="trace-overlay" id="orphan-overlay" aria-hidden="true" style="display:none"></svg>
    </div>
    <div class="crosshair" aria-hidden="true"></div>
    <div class="pin-tooltip" id="pin-tooltip" aria-hidden="true"></div>
    <!-- ── Nav superior ── -->
    <header class="viewer-nav">
      <a class="brand" href="index.html" aria-label="Ir al inicio" id="nav-brand">
        <span id="nav-project-name">PCB Reverser</span>
      </a>
      <span class="toolbar-sep"></span>
      <button id="zoom-out" type="button" aria-label="Alejar"  title="Alejar"><i class="ti ti-zoom-out"></i></button>

    <script>
      const viewer = document.querySelector("#viewer");
      const world = document.querySelector("#world");
      const layerA = document.querySelector("#layer-a");
      const layerB = document.querySelector("#layer-b");
      const layerSilk = document.querySelector("#layer-silk");
      const drillOverlay = document.querySelector("#drill-overlay");
      const traceOverlay = document.querySelector("#trace-overlay");
      const highlightOverlay = document.querySelector("#highlight-overlay");
      const orphanOverlay = document.querySelector("#orphan-overlay");
      const boardSelect = document.querySelector("#board");
      const opacityControl = document.querySelector("#opacity-control");
      const opacityInput = document.querySelector("#overlay-opacity");
      const opacityValue = document.querySelector("#opacity-value");
      const pcbToggle        = document.querySelector("#pcb-toggle");
      const silkscreenToggle = document.querySelector("#silkscreen-toggle");
      const viasToggle = document.querySelector("#vias-toggle");
      const icsToggle = document.querySelector("#ics-toggle");
      const connectorsToggle = document.querySelector("#connectors-toggle");
      const largeConnectorsToggle = document.querySelector("#large-connectors-toggle");
      const capsToggle = document.querySelector("#caps-toggle");
      const resToggle = document.querySelector("#res-toggle");
      const dioToggle = document.querySelector("#dio-toggle");
      const indToggle  = document.querySelector("#ind-toggle");
      const xtalToggle = document.querySelector("#xtal-toggle");
      const trnToggle  = document.querySelector("#trn-toggle");
      const jpToggle    = document.querySelector("#jp-toggle");
      const relayToggle = document.querySelector("#relay-toggle");
      const traceAToggle = document.querySelector("#trace-a-toggle");
      const traceBToggle = document.querySelector("#trace-b-toggle");
      const readout = document.querySelector("#readout");
      const empty = document.querySelector("#empty");
      const cacheToken = window.location.search;
      const searchBtn = document.querySelector("#search-btn");
      const searchDialog = document.querySelector("#search-dialog");
      const searchInput = document.querySelector("#search-input");
      const searchError = document.querySelector("#search-error");
      const searchOk = document.querySelector("#search-ok");
      const searchCancel = document.querySelector("#search-cancel");

      function assetUrl(path) {
        return cacheToken ? `${path}${cacheToken}` : path;
      }

      function debounce(fn, ms) {
        let t;
        return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
      }

      // rAF: colapsa múltiples llamadas a render() en un solo frame
      let _rafId = null;

      // Dirty flags: los overlays SVG solo se reconstruyen cuando su contenido cambia
      let _drillDirty = true;
      let _traceDirty = true;
      let _orphanDirty = true;

      function markDrillDirty() { _drillDirty = true; }
      function markTraceDirty() { _traceDirty = true; }
      function markOrphanDirty() { _orphanDirty = true; }

      const state = {
        manifest: null,
        componentsData: null,

        // ── Modelo de grafo ──────────────────────────────────────────
        graphPoints:    new Map(),   // id → Point  { id, x, y, layer, kind, ... }
        graphSegments:  [],          // Segment[]   { id, from, to, layer, width, net_id }
        netBySegment:   new Map(),   // segId → netId
        segmentsByNet:  new Map(),   // netId → Segment[]
        selectedSegId:  null,        // legacy compat — primer segmento seleccionado
        selectedSegIds: new Set(),   // multi-select: todos los segmentos activos
        // ─────────────────────────────────────────────────────────────
        traces: [],
        mode: null,
        layerIds: [],   // non-silk layer ids in order, from project.json
        silkId: null,   // silk layer id, from project.json

        showPCB: true,
        showSilkscreen: false,
        showVias: false,
        showICs: false,
        showConnectors: false,
        showLargeConnectors: false,
        showCaps: false,
        showRes: false,
        showDio: false,
        showInd: false,
        showXtal: false,
        showTrn:  false,
        showJp: false,
        showRelay: false,
        showTraceA: false,
        showTraceB: false,
        x: 0,
        y: 0,
        zoom: 1,
        level: 0,
        dragging: false,
        dragStart: null,
        hoverStatus: "",
        tiles: new Map(),
        selectedTraceId: null,   // legacy compat — apunta al primer selectedSegId
        netByTrace: new Map(),   // legacy compat
        tracesByNet: new Map(),  // legacy compat
        selectedLegacyTraceId: null,
        selectedLegacyNet: null,
        selectedLegacyNetGroup: null,
        showOrphans: false,
        orphanEndpoints: [],
      };

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      // Retorna el board de referencia segun el modo actual.
      // En overlay se usa el primer layer como base.
      function board() {
        const id = state.mode === state.layerIds[1] ? state.layerIds[1] : state.layerIds[0];
        return state.manifest.boards[id] ?? state.manifest.boards[state.layerIds[0]];
      }

      function levelInfo() {
        return board().levels[state.level];
      }

      function chooseLevel() {
        const levels = board().levels;
        let best = levels[0];
        let bestScore = Infinity;
        for (const level of levels) {
          const levelScreenScale = state.zoom / level.scale;
          const score = Math.abs(Math.log2(levelScreenScale));
          if (score < bestScore) {
            best = level;
            bestScore = score;
          }
        }
        state.level = best.level;
      }

      function setZoom(nextZoom, anchorClientX, anchorClientY) {
        const oldZoom = state.zoom;
        const minZoom = Math.min(viewer.clientWidth / board().width, viewer.clientHeight / board().height) * 0.85;
        const maxZoom = 4;
        const zoom = clamp(nextZoom, minZoom, maxZoom);
        // Convert viewport client coords → viewer-element-relative; default to viewer center
        const anchorX = anchorClientX !== undefined ? toViewer(anchorClientX, 0).x : viewer.clientWidth  / 2;
        const anchorY = anchorClientY !== undefined ? toViewer(0, anchorClientY).y : viewer.clientHeight / 2;
        const imageX = (anchorX - state.x) / oldZoom;
        const imageY = (anchorY - state.y) / oldZoom;
        state.x = anchorX - imageX * zoom;
        state.y = anchorY - imageY * zoom;
        state.zoom = zoom;
        render();
      }

      function fitToScreen() {
        const b = board();
        state.zoom = Math.min(viewer.clientWidth / b.width, viewer.clientHeight / b.height) * 0.92;
        state.x = (viewer.clientWidth - b.width * state.zoom) / 2;
        state.y = (viewer.clientHeight - b.height * state.zoom) / 2;
        render();
      }

      // ── Search / navigate ──────────────────────────────────────────
      function openSearchDialog() {
        searchInput.value = "";
        searchError.hidden = true;
        searchDialog.hidden = false;
        searchInput.focus();
      }

      function closeSearchDialog() {
        searchDialog.hidden = true;
      }

      function navigateToComponent(ref) {
        const comps = state.componentsData && state.componentsData.components;
        if (!comps) return false;
        const needle = ref.trim().toUpperCase();
        const comp = comps.find(c => (c.ref || "").toUpperCase() === needle);
        if (!comp) return false;

        // Compute center from comp.cx/cy (set by normalizeComponentsData) or from pins
        let cx = comp.cx, cy = comp.cy;
        if (cx == null || cy == null) {
          const pins = comp.pins || [];
          if (pins.length === 0) return false;
          const coords = pins.map(pinCoords);
          cx = coords.reduce((s, c) => s + c.cx, 0) / pins.length;
          cy = coords.reduce((s, c) => s + c.cy, 0) / pins.length;
        }

        // Choose a comfortable zoom — 2.5 gives good context without being too close
        const targetZoom = 2.5;
        state.zoom = targetZoom;
        state.x = viewer.clientWidth  / 2 - cx * targetZoom;
        state.y = viewer.clientHeight / 2 - cy * targetZoom;
        render();
        return true;
      }

      function doSearch() {
        const val = searchInput.value.trim();
        if (!val) return;
        const found = navigateToComponent(val);
        if (found) {
          closeSearchDialog();
        } else {
          searchError.textContent = `${window.I18N ? window.I18N.t('search.not-found') : 'No se encontró'} "${val}"`;
          searchError.hidden = false;
          searchInput.select();
        }
      }

      document.querySelector("#share-btn").addEventListener("click", () => {
        stateToHash();
        navigator.clipboard.writeText(window.location.href).then(() => {
          const btn = document.querySelector("#share-btn");
          btn.classList.add("copied");
          btn.title = "¡Link copiado!";
          setTimeout(() => {
            btn.classList.remove("copied");
            btn.title = "Copiar link del estado actual";
          }, 2000);
        });
      });

      searchBtn.addEventListener("click", openSearchDialog);
      searchOk.addEventListener("click", doSearch);
      searchCancel.addEventListener("click", closeSearchDialog);
      searchInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter")  { e.preventDefault(); doSearch(); }
        if (e.key === "Escape") { e.preventDefault(); closeSearchDialog(); }
      });
      searchDialog.addEventListener("keydown", (e) => {
        if (e.key === "Escape") { e.preventDefault(); closeSearchDialog(); }
      });

      function clearTiles() {
        state.tiles.clear();
        layerA.replaceChildren();
        layerB.replaceChildren();
        layerSilk.replaceChildren();
      }

      function activeBoards() {
        if (state.mode === "overlay") {
          return state.layerIds.slice(0, 2);
        }
        return [state.mode];
      }

      function tileKey(boardId, level, col, row) {
        return `${boardId}/${level}/${col}/${row}`;
      }

      function layerForBoard(boardId) {
        return boardId === state.layerIds[1] ? layerB : layerA;
      }

      function tileSource(boardId, level, col, row) {
        return assetUrl(`tiles/${boardId}/${level}/${col}_${row}.jpg`);
      }

      function ensureTile(boardId, level, col, row) {
        const key = tileKey(boardId, level, col, row);
        if (state.tiles.has(key)) {
          return state.tiles.get(key);
        }

        const tile = document.createElement("img");
        tile.className = "tile";
        tile.draggable = false;
        tile.alt = "";
        tile.src = tileSource(boardId, level, col, row);
        tile.style.left = `${col * state.manifest.tileSize}px`;
        tile.style.top = `${row * state.manifest.tileSize}px`;
        if (boardId === state.silkId) {
          layerSilk.append(tile);
        } else {
          layerForBoard(boardId).append(tile);
        }
        state.tiles.set(key, tile);
        return tile;
      }

      function drillLayersEnabled() {
        return state.showVias || state.showICs || state.showConnectors || state.showLargeConnectors || state.showCaps || state.showRes || state.showDio || state.showInd || state.showXtal || state.showTrn || state.showJp || state.showRelay;
      }

      function traceLayersEnabled() {
        return state.showTraceA || state.showTraceB;
      }

      // Devuelve el radio real del taladro de un pin (desde points.json), o defaultR.
      function pinDrillRadius(pin, defaultR = 10) {
        if (pin.point_id) {
          const pt = state.graphPoints.get(pin.point_id);
          if (pt && pt.r) return pt.r;
        }
        return pin.r ?? defaultR;
      }

      // Resuelve las coordenadas de un pin desde points.json vía point_id.
      // Fallback a cx/cy por compatibilidad con datos parcialmente migrados.
      function pinCoords(pin) {
        if (pin.point_id) {
          const pt = state.graphPoints.get(pin.point_id);
          if (pt) return { cx: pt.x, cy: pt.y };
        }
        // Fallback legacy
        return { cx: Number(pin.cx ?? 0), cy: Number(pin.cy ?? 0) };
      }

      function normalizeComponentsData(data) {
        if (!data || !Array.isArray(data.components)) return data;
        const PX_PER_MM = 11.811;
        for (const comp of data.components) {
          const pins = comp.pins || [];
          if (pins.length === 2) {
            const c1 = pinCoords(pins[0]), c2 = pinCoords(pins[1]);
            const dx = c2.cx - c1.cx;
            const dy = c2.cy - c1.cy;
            comp.dist_px = Math.hypot(dx, dy);
            comp.dist_mm = +(comp.dist_px / PX_PER_MM).toFixed(2);
            comp.cx = (c1.cx + c2.cx) / 2;
            comp.cy = (c1.cy + c2.cy) / 2;
          } else if (pins.length >= 1) {
            const coords = pins.map(pinCoords);
            comp.cx = coords.reduce((s, c) => s + c.cx, 0) / pins.length;
            comp.cy = coords.reduce((s, c) => s + c.cy, 0) / pins.length;
          }
        }
        return data;
      }

      function tracePoints(points) {
        return points.map((point) => `${point.x.toFixed(2)},${point.y.toFixed(2)}`).join(" ");
      }

      function segmentStateClass(seg) {
        if (state.selectedSegIds.size === 0) return "";
        const segNet = state.netBySegment.get(seg.id);
        if (state.selectedSegIds.has(seg.id)) return "is-selected";
        if (segNet && selectedNetIds().has(segNet)) return "is-net";
        return "is-dimmed";
      }

      function appendSegment(parent, seg) {
        const ptA = state.graphPoints.get(seg.from);
        const ptB = state.graphPoints.get(seg.to);
        if (!ptA || !ptB) return;
        const w         = String(Number(seg.width) || 6);
        const sideClass = seg.layer === "B" ? "side-b" : "side-a";
        const stateClass = segmentStateClass(seg);

        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", ptA.x); line.setAttribute("y1", ptA.y);
        line.setAttribute("x2", ptB.x); line.setAttribute("y2", ptB.y);
        line.setAttribute("class", ["trace-line", sideClass, stateClass].filter(Boolean).join(" "));
        line.setAttribute("stroke-width", w);
        line.dataset.segId = seg.id;
        if (seg.net_id) {
          const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
          title.textContent = seg.net_id;
          line.append(title);
        }
        parent.append(line);
      }

      // legacy — mantenido por código de UI que aún llama appendTrace
      function appendTrace(parent, trace) {
        const pts = tracePoints(trace.points);
        const traceW = Number(trace.width) || 10;
        const sideClass = trace.side === "B" ? "side-b" : "side-a";
        const stateClass = traceStateClass(trace);
        const outline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        outline.setAttribute("points", pts);
        outline.setAttribute("class", ["trace-outline", stateClass].filter(Boolean).join(" "));
        outline.setAttribute("stroke-width", String(traceW + 4));
        const line = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        line.setAttribute("points", pts);
        line.setAttribute("class", ["trace-line", sideClass, stateClass].filter(Boolean).join(" "));
        line.setAttribute("stroke-width", String(traceW));
        parent.append(outline, line);
      }

      function buildTraceConnectivity(traces) {
        // Conectividad por coordenadas exactas: el snap del trace_editor garantiza
        // que endpoints conectados comparten el mismo punto (o caen a ≤2px por
        // imprecisión de float). Sin aproximaciones mayores.
        const parent = new Map();
        function find(id) {
          if (!parent.has(id)) return id;
          const root = find(parent.get(id));
          parent.set(id, root);
          return root;
        }
        function union(a, b) {
          a = find(a); b = find(b);
          if (a !== b) parent.set(b, a);
        }

        // Índice de todos los puntos de todas las trazas
        const CELL = 4;
        const grid = new Map();
        for (const trace of traces) {
          for (const pt of trace.points) {
            const key = `${Math.round(pt.x / CELL)}:${Math.round(pt.y / CELL)}`;
            if (!grid.has(key)) grid.set(key, []);
            grid.get(key).push({ traceId: trace.id, x: pt.x, y: pt.y });
          }
        }

        // Para cada endpoint, buscar puntos de otras trazas en celdas vecinas (≤2px)
        for (const trace of traces) {
          const pts = trace.points;
          for (const ep of [pts[0], pts[pts.length - 1]]) {
            const cx = Math.round(ep.x / CELL);
            const cy = Math.round(ep.y / CELL);
            for (let dx = -1; dx <= 1; dx++) {
              for (let dy = -1; dy <= 1; dy++) {
                for (const e of (grid.get(`${cx+dx}:${cy+dy}`) || [])) {
                  if (e.traceId !== trace.id && Math.hypot(ep.x - e.x, ep.y - e.y) <= 2) {
                    union(trace.id, e.traceId);
                  }
                }
              }
            }
          }
        }

        for (const trace of traces) {
          trace.netGroup = find(trace.id);
        }
      }

      function normalizeTraces(data) {
        const traces = Array.isArray(data) ? data : data?.traces;
        if (!Array.isArray(traces)) {
          return [];
        }
        return traces
          .filter((trace) => Array.isArray(trace.points) && trace.points.length >= 2)
          .map((trace) => ({
            id: trace.id || "",
            net: trace.net || "",
            side: trace.side === "B" ? "B" : "A",
            width: Number(trace.width) || 10,
            branchFrom: trace.branchFrom || null,
            points: trace.points
              .map((point) => Array.isArray(point)
                ? { x: Number(point[0]), y: Number(point[1]), node: null }
                : { x: Number(point.x), y: Number(point.y), node: point.node || null })
              .filter((point) => Number.isFinite(point.x) && Number.isFinite(point.y)),
          }))
          .filter((trace) => trace.points.length >= 2);
      }

      // Convert viewport-relative client coords to viewer-element-relative coords
      function toViewer(clientX, clientY) {
        const r = viewer.getBoundingClientRect();
        return { x: clientX - r.left, y: clientY - r.top };
      }

      function clientToImage(clientX, clientY) {
        const v = toViewer(clientX, clientY);
        return { x: (v.x - state.x) / state.zoom, y: (v.y - state.y) / state.zoom };
      }

      function nodeKey(node) {
        if (!node) return null;
        return `node:${node.kind || ""}:${node.id || ""}:${node.pin || ""}`;
      }

      function pointKey(point, side) {
        return `point:${side}:${Math.round(Number(point.x) * 10) / 10}:${Math.round(Number(point.y) * 10) / 10}`;
      }

      function buildGraphIndex() {
        const netBySegment  = new Map();
        const segmentsByNet = new Map();
        for (const seg of state.graphSegments) {
          netBySegment.set(seg.id, seg.net_id);
          if (!segmentsByNet.has(seg.net_id)) segmentsByNet.set(seg.net_id, []);
          segmentsByNet.get(seg.net_id).push(seg);
        }
        state.netBySegment  = netBySegment;
        state.segmentsByNet = segmentsByNet;
        // legacy compat: tracesByNet apunta al mismo mapa para no romper UI
        state.tracesByNet   = segmentsByNet;
      }
      // alias para el sitio de llamada original
      function calculateNets() { buildGraphIndex(); }

      /* ── Orphan endpoint computation (modelo de grafo) ── */
      function computeOrphanEndpoints() {
        // En el nuevo modelo, un punto es "orphan" si es waypoint y tiene
        // grado 1 en su net (solo un segmento lo toca → extremo libre).
        const degree = new Map();  // ptId → número de segmentos que lo tocan
        for (const seg of state.graphSegments) {
          degree.set(seg.from, (degree.get(seg.from) || 0) + 1);
          degree.set(seg.to,   (degree.get(seg.to)   || 0) + 1);
        }
        const orphans = [];
        for (const [ptId, deg] of degree) {
          if (deg > 1) continue;
          const pt = state.graphPoints.get(ptId);
          if (!pt || pt.layer === "AB") continue;  // los drills nunca son orphans
          orphans.push({ x: pt.x, y: pt.y, kind: "true" });
        }
        state.orphanEndpoints = orphans;
        console.log(`[orphans] ${orphans.length} extremos libres`);
      }

      function renderOrphanOverlay() {
        orphanOverlay.replaceChildren();
        orphanOverlay.style.display = 'none';
        if (!state.showOrphans || !state.orphanEndpoints.length) return;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        for (const o of state.orphanEndpoints) {
          const r = o.kind === 'true' ? 14 : 9;
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', o.x);
          circle.setAttribute('cy', o.y);
          circle.setAttribute('r', r);
          circle.setAttribute('class', `orphan-dot orphan-${o.kind}`);
          g.append(circle);
        }
        orphanOverlay.append(g);
        orphanOverlay.style.display = 'block';
      }

      function selectedNetIds() {
        const nets = new Set();
        for (const segId of state.selectedSegIds) {
          const n = state.netBySegment.get(segId);
          if (n) nets.add(n);
        }
        return nets;
      }

        // legacy compat: retorna la primera net seleccionada (o null)
        return state.netBySegment.get(state.selectedSegId) ?? null;

      // legacy compat
      function traceInSelectedNet(trace) { return false; }
      function traceStateClass(trace) {
        if (!state.selectedLegacyNetGroup) return "";
        if (trace.netGroup !== state.selectedLegacyNetGroup) return "is-dimmed";
        if (trace.id === state.selectedLegacyTraceId) return "is-selected";
        return "is-net";
      }

      function distanceToSegment(point, a, b) {
        const vx = b.x - a.x;
        const vy = b.y - a.y;
        const wx = point.x - a.x;
        const wy = point.y - a.y;
        const len2 = vx * vx + vy * vy;
        const t = len2 === 0 ? 0 : clamp((wx * vx + wy * vy) / len2, 0, 1);
        return Math.hypot(point.x - (a.x + t * vx), point.y - (a.y + t * vy));
      }

      function nearestSegment(point) {
        let nearest = null;
        let nearestDist = Infinity;
        const threshold = 14 / Math.max(state.zoom, 0.1);
        for (const seg of state.graphSegments) {
          const showSide = seg.layer === "B" ? state.showTraceB : state.showTraceA;
          if (!showSide) continue;
          const a = state.graphPoints.get(seg.from);
          const b = state.graphPoints.get(seg.to);
          if (!a || !b) continue;
          const vx = b.x - a.x, vy = b.y - a.y;
          const len2 = vx * vx + vy * vy;
          const t = len2 === 0 ? 0 : clamp(((point.x - a.x) * vx + (point.y - a.y) * vy) / len2, 0, 1);
          const dist = Math.hypot(point.x - (a.x + t * vx), point.y - (a.y + t * vy));
          if (dist < nearestDist) { nearest = seg; nearestDist = dist; }
        }
        return nearestDist <= threshold ? nearest : null;
      }

      function nearestLegacyTrace(point) {
        let nearest = null;
        let nearestDist = Infinity;
        const baseTol = 8 / Math.max(state.zoom, 0.1);
        for (const trace of state.traces) {
          const showSide = trace.side === "B" ? state.showTraceB : state.showTraceA;
          if (!showSide) continue;
          const threshold = (Number(trace.width) || 10) / 2 + baseTol;
          const pts = trace.points;
          for (let i = 0; i < pts.length - 1; i++) {
            const a = pts[i], b = pts[i + 1];
            const vx = b.x - a.x, vy = b.y - a.y;
            const len2 = vx * vx + vy * vy;
            const t = len2 === 0 ? 0 : clamp(((point.x - a.x) * vx + (point.y - a.y) * vy) / len2, 0, 1);
            const dist = Math.hypot(point.x - (a.x + t * vx), point.y - (a.y + t * vy));
            if (dist < threshold && dist < nearestDist) { nearest = trace; nearestDist = dist; }
          }
        }
        return nearest;
      }

      function selectSegment(segId, additive = false) {
        if (additive && segId !== null) {
          // Shift+click: toggle el segmento dentro del set
          if (state.selectedSegIds.has(segId)) {
            state.selectedSegIds.delete(segId);
          } else {
            state.selectedSegIds.add(segId);
          }
          // selectedSegId apunta al último añadido (o al primero que quede)
          state.selectedSegId   = state.selectedSegIds.size > 0
            ? [...state.selectedSegIds][state.selectedSegIds.size - 1]
            : null;
        } else {
          // Click normal: selección única
          state.selectedSegIds  = segId ? new Set([segId]) : new Set();
          state.selectedSegId   = segId;
        }
        state.selectedTraceId = state.selectedSegId;   // legacy compat
        markTraceDirty();
        render();
      }

      function showPinTooltip(event, compId, pinNum) {
        // Look up component by id in componentsData
        const comp = state.componentsData?.components?.find(c => c.id === compId);
        const ref = comp?.ref || compId;
        // Look up rich pinout from CONNECTOR_PINOUTS by ref name
        const info = Object.values(CONNECTOR_PINOUTS).find(p => p.name === ref);
        const note = comp?.note || info?.note || '';
        let html = `<div class="pin-tooltip-title">${ref} &mdash; pin ${pinNum}</div>`;
        if (note) html += `<div class="pin-tooltip-note">${note}</div>`;
        html += "<table>";
        if (info && info.pins.length > 0) {
          for (const [p, sig] of info.pins) {
            const active = p === pinNum;
            html += `<tr class="${active ? "is-active" : ""}"><td>${p}</td><td>${sig}</td></tr>`;
          }
        } else {
          // Fallback: for CON50 and others — show only the hovered pin's signal
          const pins = comp?.pins || [];
          const pin = pins.find(p => p.n === pinNum);
          const sig = pin?.signal;
          html = `<div class="pin-tooltip-title">${ref} &mdash; pin ${pinNum}</div>`;
          if (note) html += `<div class="pin-tooltip-note">${note}</div>`;
          if (sig) {
            html += `<div class="pin-tooltip-signal">${sig}</div>`;
          } else {
            html += `<div style="color:#666;font-style:italic;font-size:13px">sin señal</div>`;
          }
        }
        pinTooltipEl.innerHTML = html;
        pinTooltipEl.classList.add("is-visible");
        positionPinTooltip(event);
      }

        pinTooltipEl.classList.remove("is-visible");

        const comp = state.componentsData?.components?.find(c => c.id === compId);
        if (!comp) return;
        const chip = comp.part || '';
        let html = `<div class="pin-tooltip-title">${comp.ref}${chip ? ' &mdash; ' + chip : ''}</div>`;
        html += `<div class="pin-tooltip-note">${comp.id}  &middot;  ${comp.pins?.length || 0} pines</div>`;
        if (comp.note) html += `<div class="pin-tooltip-note">${comp.note}</div>`;
        if (pinNum) {
          const pinName = IC_PINOUTS[chip]?.[pinNum];
          html += "<table>";

            ? `<tr class="is-active"><td>${pinNum}</td><td>${pinName}</td></tr>`
            : `<tr class="is-active"><td>${pinNum}</td><td style="color:#666;font-style:italic;">—</td></tr>`;

      function showRelayPinTooltip(event, compId, pinN) {
        const comp = state.componentsData?.components?.find(c => String(c.id) === compId);
        if (!comp) return;

      // ── Resistor color-band helpers ────────────────────────────────
      const _RES_BAND_COLOR = [
        { fill: '#1a1a1a', stroke: '#555' },   // 0 negro
        { fill: '#8B4513', stroke: '#5a2a00' }, // 1 marrón
        { fill: '#DD2200', stroke: '#991500' }, // 2 rojo
        { fill: '#FF7700', stroke: '#cc5500' }, // 3 naranja
        { fill: '#E8E800', stroke: '#aaaa00' }, // 4 amarillo
        { fill: '#008800', stroke: '#005500' }, // 5 verde
        { fill: '#0055DD', stroke: '#003399' }, // 6 azul
        { fill: '#9900CC', stroke: '#660088' }, // 7 violeta
        { fill: '#888888', stroke: '#555555' }, // 8 gris
        { fill: '#EEEEEE', stroke: '#aaaaaa' }, // 9 blanco
      ];
      const _GOLD_BAND   = { fill: '#C8A830', stroke: '#957520' };
      const _SILVER_BAND = { fill: '#C0C0C0', stroke: '#888888' };

      function _parseResOhms(valueStr) {
        if (!valueStr) return null;
        const s = String(valueStr).trim();
        if (/[?]|creo|era|aprox/i.test(s)) return null;
        const m = s.match(/^([\d]+(?:[.,]\d+)?)\s*(k|M|meg)?\s*[ΩΩRrOo]?/i);
        if (!m) return null;
        let val = parseFloat(m[1].replace(',', '.'));
        const sfx = (m[2] || '').toLowerCase();
        if (sfx === 'k') val *= 1e3;
        else if (sfx === 'm' || sfx === 'meg') val *= 1e6;
        return isFinite(val) && val > 0 ? val : null;
      }

      function _resBands4(ohms) {
        if (!ohms || ohms <= 0) return null;
        let exp = Math.floor(Math.log10(ohms)) - 1;
        let mant = Math.round(ohms / Math.pow(10, exp));
        if (mant >= 100) { mant = Math.round(mant / 10); exp++; }
        if (mant < 10)   { mant = Math.round(mant * 10); exp--; }
        const d1 = Math.floor(mant / 10);
        const d2 = mant % 10;
        if (d1 < 1 || d1 > 9 || exp < 0 || exp > 9) return null;
        return [_RES_BAND_COLOR[d1], _RES_BAND_COLOR[d2], _RES_BAND_COLOR[exp], _GOLD_BAND];
      }

      function _resBandSVG(bands) {
        if (!bands) return '';
        const band = (x, c) =>
          `<rect x="${x}" y="4" width="16" height="30" rx="1"
                fill="${c.fill}" stroke="${c.stroke}" stroke-width="0.8" opacity="0.95"/>`;
        return `
        <div class="res-body-wrap">
          <svg class="res-body-svg" viewBox="0 0 196 38" width="196" height="38" aria-hidden="true">
            <line x1="0"   y1="19" x2="32"  y2="19" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
            <line x1="164" y1="19" x2="196" y2="19" stroke="#999" stroke-width="2.5" stroke-linecap="round"/>
            <rect x="32" y="4" width="132" height="30" rx="7" fill="#D4B896" stroke="#A0886A" stroke-width="1"/>
            ${band(48,  bands[0])}
            ${band(72,  bands[1])}
            ${band(100, bands[2])}
            ${band(124, bands[3])}
          </svg>
        </div>`;
      }

      function showComponentTooltip(event, comp) {
        if (!comp) return;
        const ref       = comp.ref || String(comp.id);
        const typeLabel = (window.I18N ? window.I18N.t('type.' + comp.comp_type) : null) || comp.comp_type;
        const dist      = comp.dist_mm ? `${Number(comp.dist_mm).toFixed(1)} mm` : null;
        const orientStr = comp.orient === 'H' ? 'horizontal' : comp.orient === 'V' ? 'vertical' : null;

        let html = `<div class="pin-tooltip-title">${ref} &mdash; ${typeLabel}</div>`;
        const subtitle = [dist, orientStr].filter(Boolean).join('  ·  ');
        if (subtitle) html += `<div class="pin-tooltip-note">${subtitle}</div>`;

        const rows = [];
        if (comp.comp_type === 'CAP') {
          if (comp.value) rows.push(['Valor', comp.value]);
          if (comp.type)  rows.push(['Tipo',  comp.type]);
          if (comp.note)  rows.push(['Nota',  comp.note]);
        } else if (comp.comp_type === 'RES') {
          if (comp.value) rows.push(['Valor', comp.value]);
          if (comp.note)  rows.push(['Nota',  comp.note]);
        } else if (comp.comp_type === 'DIO') {
          if (comp.direction != null && comp.orient) {
            const d = comp.direction, o = comp.orient;
            const label =
              o === 'H' ? (d > 0 ? 'izquierda → derecha' : 'derecha → izquierda') :
              o === 'V' ? (d > 0 ? 'arriba → abajo'       : 'abajo → arriba')      : null;
            if (label) rows.push(['Cátodo', label]);
          }
          if (comp.note) rows.push(['Nota', comp.note]);
        } else if (comp.comp_type === 'RELAY') {
          if (comp.value) rows.push(['Valor', comp.value]);
          if (comp.note)  rows.push(['Nota',  comp.note]);
        } else if (comp.comp_type === 'IND' || comp.comp_type === 'XTAL' || comp.comp_type === 'JP') {
          if (comp.value) rows.push(['Valor', comp.value]);
          if (comp.note)  rows.push(['Nota',  comp.note]);
        } else if (comp.comp_type === 'RNET') {
          rows.push(['Pines', comp.pins?.length || 0]);
          if (comp.note) rows.push(['Nota', comp.note]);
        }
        if (rows.length) {
          html += '<table>';
          for (const [k, v] of rows) html += `<tr><td>${k}</td><td>${v}</td></tr>`;
          html += '</table>';
        }

        if (comp.comp_type === 'RES') {
          const ohms = _parseResOhms(comp.value);
          const svg  = _resBandSVG(_resBands4(ohms));
          if (svg) html += svg;
        }

        pinTooltipEl.innerHTML = html;
        pinTooltipEl.classList.add('is-visible');
        positionPinTooltip(event);
      }

      function positionPinTooltip(event) {
        const x = event.clientX + 18;
        const y = event.clientY + 18;
        pinTooltipEl.style.left = `${x}px`;
        pinTooltipEl.style.top = `${y}px`;
        // Evitar que se salga de la ventana
        const rect = pinTooltipEl.getBoundingClientRect();
        if (rect.right > window.innerWidth - 8) {
          pinTooltipEl.style.left = `${event.clientX - rect.width - 10}px`;
        }
        if (rect.bottom > window.innerHeight - 8) {
          pinTooltipEl.style.top = `${event.clientY - rect.height - 10}px`;
        }
      }

      function appendConnectorBbox(parent, connector, label, rectClass, labelClass, note = '', pad = 22) {
        const pins = connector.pins || [];
        if (pins.length === 0) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const p of pins) {
          const { cx, cy } = pinCoords(p);
          minX = Math.min(minX, cx); minY = Math.min(minY, cy);
          maxX = Math.max(maxX, cx); maxY = Math.max(maxY, cy);
        }
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x",      minX - pad);
        rect.setAttribute("y",      minY - pad);
        rect.setAttribute("width",  maxX - minX + pad * 2);
        rect.setAttribute("height", maxY - minY + pad * 2);
        rect.setAttribute("rx", 6);
        rect.classList.add(rectClass);
        rect.dataset.status = [label, note, `${pins.length} pines`].filter(Boolean).join('  ·  ');
        parent.append(rect);
        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", ((minX + maxX) / 2).toFixed(1));
        txt.setAttribute("y", (minY - pad - 5).toFixed(1));
        txt.textContent = label;
        txt.classList.add(labelClass);
        parent.append(txt);
      }

      function appendDrillCircle(parent, item, radius, className, label) {
        const { cx, cy } = pinCoords(item);
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx.toFixed(2));
        circle.setAttribute("cy", cy.toFixed(2));
        circle.setAttribute("r", radius.toFixed(2));
        circle.setAttribute("class", className);
        circle.dataset.status = `${label}  x:${cx.toFixed(1)} y:${cy.toFixed(1)}`;
        parent.append(circle);
        return circle;
      }

      function renderDrillOverlay() {
        drillOverlay.replaceChildren();
        const shouldHide = !state.componentsData || !drillLayersEnabled();
        drillOverlay.style.display = shouldHide ? "none" : "block";
        if (shouldHide) return;

        const components = state.componentsData.components || [];

        if (state.showVias) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const [, pt] of state.graphPoints) {
            if (pt.layer !== "AB" || pt.comp_id) continue;  // solo vias puras
            const r = pt.r || 10;
            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("cx", pt.x.toFixed(2));
            circle.setAttribute("cy", pt.y.toFixed(2));
            circle.setAttribute("r",  r.toFixed(2));
            circle.setAttribute("class", "drill-via");
            circle.dataset.status = `Vía ${pt.id}  x:${pt.x.toFixed(1)} y:${pt.y.toFixed(1)}`;
            group.append(circle);
          }
          drillOverlay.append(group);
        }

        if (state.showICs) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const comp of components.filter(c => c.comp_type === "IC")) {
            const icLabel = comp.ref
              ? `${comp.ref}${comp.part ? ' ' + comp.part : ''}`
              : comp.id;
            // bbox
            if (comp.bbox && comp.bbox.length === 2) {
              const [[x1, y1], [x2, y2]] = comp.bbox;
              const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
              rect.setAttribute("x", Math.min(x1, x2));
              rect.setAttribute("y", Math.min(y1, y2));
              rect.setAttribute("width",  Math.abs(x2 - x1));
              rect.setAttribute("height", Math.abs(y2 - y1));
              rect.setAttribute("rx", 4);
              rect.classList.add("ic-bbox");
              rect.dataset.status = icLabel;
              rect.dataset.icId   = comp.id;
              rect.dataset.icPin  = "";
              group.append(rect);
              const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
              txt.setAttribute("x", ((x1 + x2) / 2).toFixed(1));
              txt.setAttribute("y", (Math.min(y1, y2) - 6).toFixed(1));
              txt.textContent = icLabel;
              txt.classList.add("ic-bbox-label");
              group.append(txt);
            }
            for (const pin of comp.pins || []) {
              const pinLabel = `${icLabel} — pin ${pin.n}`;
              const circle = appendDrillCircle(group, pin, 9, "drill-ic", pinLabel);
              circle.dataset.icId  = comp.id;
              circle.dataset.icPin = pin.n;
            }
          }
          drillOverlay.append(group);
        }

        if (state.showConnectors) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const comp of components.filter(c => c.comp_type === "CON")) {
            const conLabel = comp.ref || comp.id;
            const conNote  = comp.note || '';
            appendConnectorBbox(group, comp, conLabel, "con-bbox", "con-bbox-label", conNote);
            for (const pin of comp.pins || []) {
              const circle = appendDrillCircle(group, pin, 10, "drill-con", `${conLabel} pin ${pin.n}`);
              circle.dataset.conId  = comp.id;
              circle.dataset.conPin = pin.n;

          }
          drillOverlay.append(group);

        if (state.showLargeConnectors) {

          for (let i = 0; i < con50s.length; i++) {
            const comp = con50s[i];

            const conLabel = comp.ref || comp.id;
            appendConnectorBbox(group, comp, conLabel, boxClass, lblClass, comp.note || '');
            for (const pin of comp.pins || []) {
              const circle = appendDrillCircle(group, pin, 10, pinClass, `${conLabel} pin ${pin.n}`);
              circle.dataset.conId  = comp.id;
              circle.dataset.conPin = pin.n;
            }
          }
          drillOverlay.append(group);
        }

        if (state.showCaps) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const cap of components.filter(c => c.comp_type === "CAP")) {
            const labelParts = [`${cap.ref || cap.id}`];
            if (cap.value) labelParts.push(cap.value);
            if (cap.note)  labelParts.push(cap.note);
            const label = labelParts.join('  ·  ');
            if (cap.poly && cap.poly.length >= 3) {
              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              poly.setAttribute("points", cap.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("cap-footprint");
              poly.dataset.status = label;
              poly.dataset.compId = String(cap.id);
              group.append(poly);
              if (cap.cx != null && cap.cy != null) {

                txt.setAttribute("y", cap.cy);
                txt.setAttribute("text-anchor", "middle");
                txt.setAttribute("dominant-baseline", "central");
                txt.classList.add("cap-label");
                txt.dataset.compId = String(cap.id);

              c.dataset.compId = String(cap.id);

          drillOverlay.append(group);
        }

        if (state.showRes) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const res of components.filter(c => c.comp_type === "RES")) {
            const label = `${res.ref || res.id}${res.note ? '  ·  ' + res.note : ''}`;

              poly.setAttribute("points", res.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("res-footprint");
              poly.dataset.status = label;
              poly.dataset.compId = String(res.id);
              group.append(poly);
              if (res.cx != null && res.cy != null) {

                txt.setAttribute("x", res.cx);
                txt.setAttribute("y", res.cy);
                txt.setAttribute("text-anchor", "middle");
                txt.setAttribute("dominant-baseline", "central");
                txt.classList.add("res-label");
                txt.dataset.compId = String(res.id);
                txt.dataset.status = label;
                txt.textContent = res.ref || res.id;
                group.append(txt);

            for (const pin of res.pins || []) {

              c.dataset.compId = String(res.id);
            }

          // Redes de resistencias (RNET): bbox + pines
          for (const rn of components.filter(c => c.comp_type === "RNET")) {
            const label = rn.ref || rn.id;
            appendConnectorBbox(group, rn, label, "res-footprint", "rnet-bbox-label", rn.note || '', 14);
            for (const pin of rn.pins || []) {
              appendDrillCircle(group, pin, 8, "res-footprint", `${label} pin ${pin.n}`);
            }
          }
          drillOverlay.append(group);
        }

        if (state.showDio) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const dio of components.filter(c => c.comp_type === "DIO")) {
            const label = `${dio.ref || dio.id} (${(dio.dist_mm || 0).toFixed(1)}mm)`;
            if (dio.poly && dio.poly.length >= 3) {
              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              poly.setAttribute("points", dio.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("dio-footprint");
              poly.dataset.status = label;
              poly.dataset.compId = String(dio.id);
              group.append(poly);
            }
            // Flecha de dirección
            if (dio.cx != null && dio.cy != null) {
              const dir = dio.direction || 1;
              const ux = dio.orient === "H" ? dir : 0;
              const uy = dio.orient === "H" ? 0   : dir;
              const px = -uy, py = ux;
              const sz = 15;
              const arrow = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              arrow.setAttribute("points", [
                `${dio.cx + ux*sz},${dio.cy + uy*sz}`,
                `${dio.cx - ux*sz + px*sz*0.65},${dio.cy - uy*sz + py*sz*0.65}`,
                `${dio.cx - ux*sz - px*sz*0.65},${dio.cy - uy*sz - py*sz*0.65}`,
              ].join(" "));
              arrow.classList.add("dio-arrow");
              arrow.dataset.compId = String(dio.id);
              arrow.dataset.status = label;
              group.append(arrow);
            }
            for (const pin of dio.pins || []) {
              const c = appendDrillCircle(group, pin, pinDrillRadius(pin), "drill-dio", `${dio.ref || dio.id} — pin ${pin.n}`);

              txt.setAttribute("y", cy);
              txt.setAttribute("text-anchor", "middle");
              txt.setAttribute("dominant-baseline", "central");
              txt.classList.add("ind-label");
              txt.dataset.compId = String(ind.id);

              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

              txt.setAttribute("text-anchor", "middle");
              txt.setAttribute("dominant-baseline", "central");

              txt.dataset.compId = String(relay.id);

              poly.setAttribute("points", jp.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("jp-footprint");
              poly.dataset.status = label;
