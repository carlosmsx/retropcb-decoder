              c.dataset.compId = String(jp.id);
            }
          }
          drillOverlay.append(group);
        }

        if (state.showXtal) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const xtal of components.filter(c => c.comp_type === "XTAL")) {
            const label = `${xtal.ref || xtal.id}${xtal.value ? ' · ' + xtal.value : ''}`;
            if (xtal.poly && xtal.poly.length >= 3) {
              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              poly.setAttribute("points", xtal.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("xtal-footprint");
              poly.dataset.status = label;
              poly.dataset.compId = String(xtal.id);
              group.append(poly);
              const cx = xtal.poly.reduce((s, [x]) => s + x, 0) / xtal.poly.length;
              const cy = xtal.poly.reduce((s, [, y]) => s + y, 0) / xtal.poly.length;
              const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
              txt.setAttribute("x", cx);
              txt.setAttribute("y", cy);
              txt.setAttribute("text-anchor", "middle");
              txt.setAttribute("dominant-baseline", "central");
              txt.classList.add("xtal-label");
              txt.dataset.compId = String(xtal.id);
              txt.dataset.status = label;
              txt.textContent = xtal.ref || xtal.id;
              group.append(txt);
            }
            for (const pin of xtal.pins || []) {
              const c = appendDrillCircle(group, pin, pinDrillRadius(pin), "drill-xtal", `${xtal.ref || xtal.id} — pin ${pin.n}`);
              c.dataset.compId = String(xtal.id);
            }
          }
          drillOverlay.append(group);
        }

        if (state.showTrn) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const trn of components.filter(c => c.comp_type === "TRN")) {
            const label = [trn.ref || trn.id, trn.part, trn.note].filter(Boolean).join('  ·  ');
            if (trn.poly && trn.poly.length >= 3) {
              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              poly.setAttribute("points", trn.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("trn-footprint");
              poly.dataset.status = label;
              poly.dataset.compId = String(trn.id);
              group.append(poly);
              const cx = trn.poly.reduce((s, [x]) => s + x, 0) / trn.poly.length;
              const cy = trn.poly.reduce((s, [, y]) => s + y, 0) / trn.poly.length;
              const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
              txt.setAttribute("x", cx);
              txt.setAttribute("y", cy);
              txt.setAttribute("text-anchor", "middle");
              txt.setAttribute("dominant-baseline", "central");
              txt.classList.add("trn-label");
              txt.dataset.compId = String(trn.id);
              txt.dataset.status = label;
              txt.textContent = trn.ref || trn.id;
              group.append(txt);
            }
            for (const pin of trn.pins || []) {
              const c = appendDrillCircle(group, pin, pinDrillRadius(pin), "drill-trn",
                `${trn.ref || trn.id} — ${pin.n}`);
              c.dataset.compId = String(trn.id);
            }
          }
          drillOverlay.append(group);
        }
      }

      function renderTraceOverlay() {
        traceOverlay.replaceChildren();
        const hasTraces = state.graphSegments.length > 0 || state.traces.length > 0;
        const shouldHide = !hasTraces || !traceLayersEnabled();
        traceOverlay.style.display = shouldHide ? "none" : "block";
        if (shouldHide) return;

        const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
        for (const seg of state.graphSegments) {
          const showSide = seg.layer === "B" ? state.showTraceB : state.showTraceA;
          if (showSide) appendSegment(group, seg);
        }
        for (const trace of state.traces) {
          const showSide = trace.side === "B" ? state.showTraceB : state.showTraceA;
          if (showSide) appendTrace(group, trace);
        }
        traceOverlay.append(group);
      }

      function renderHighlightOverlay() {
        highlightOverlay.replaceChildren();
        highlightOverlay.style.display = "none";
        if (state.selectedSegIds.size === 0) return;

        // Recoger todos los puntos AB (drills/vias) de TODAS las nets seleccionadas
        const netIds = selectedNetIds();
        const highlighted = new Set();
        for (const netId of netIds) {
          const netSegs = state.segmentsByNet.get(netId) || [];
          for (const seg of netSegs) {
            for (const ptId of [seg.from, seg.to]) {
              if (highlighted.has(ptId)) continue;
              const pt = state.graphPoints.get(ptId);
              if (!pt || pt.layer !== "AB") continue;
              highlighted.add(ptId);
              const r = pt.kind === "drill" ? (pt.r || 10) + 4 : 14;
              const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
              circle.setAttribute("cx", pt.x);
              circle.setAttribute("cy", pt.y);
              circle.setAttribute("r", r);
              circle.setAttribute("class", "drill-highlight");
              highlightOverlay.append(circle);
            }
          }
        }

        if (highlightOverlay.childElementCount > 0) highlightOverlay.style.display = "block";
      }

      // ── URL state ─────────────────────────────────────────────────────────
      const FLAG_KEYS = [
        'showPCB', 'showSilkscreen', 'showVias', 'showICs',
        'showConnectors', 'showLargeConnectors', 'showCaps', 'showRes',
        'showDio', 'showInd', 'showXtal', 'showTrn',
        'showJp', 'showRelay', 'showTraceA', 'showTraceB', 'showOrphans',
      ];
      const FLAG_SELECTORS = {
        showPCB:             '#pcb-toggle',
        showSilkscreen:      '#silkscreen-toggle',
        showVias:            '#vias-toggle',
        showICs:             '#ics-toggle',
        showConnectors:      '#connectors-toggle',
        showLargeConnectors: '#large-connectors-toggle',
        showCaps:            '#caps-toggle',
        showRes:             '#res-toggle',
        showDio:             '#dio-toggle',
        showInd:             '#ind-toggle',
        showXtal:            '#xtal-toggle',
        showTrn:             '#trn-toggle',
        showJp:              '#jp-toggle',
        showRelay:           '#relay-toggle',
        showTraceA:          '#trace-a-toggle',
        showTraceB:          '#trace-b-toggle',
        showOrphans:         '#orphan-toggle',
      };

      function syncToggleUI() {
        for (const [key, sel] of Object.entries(FLAG_SELECTORS)) {
          const el = document.querySelector(sel);
          if (el) el.classList.toggle('is-active', !!state[key]);
        }
      }

      function stateToHash() {
        let v = 0;
        FLAG_KEYS.forEach((k, i) => { if (state[k]) v |= (1 << i); });
        const p = new URLSearchParams();
        if (state.mode) p.set('m', state.mode);
        p.set('v', v.toString(16));
        p.set('z', state.zoom.toFixed(2));
        p.set('px', Math.round(state.x));
        p.set('py', Math.round(state.y));
        if (state.selectedLegacyTraceId) p.set('tid', state.selectedLegacyTraceId);
        history.replaceState(null, '', '#' + p.toString());
      }

      let _hashTimer = null;
      function pushHash() {
        clearTimeout(_hashTimer);
        _hashTimer = setTimeout(stateToHash, 200);
      }

      function enableLayerForRef(ref) {
        const comps = state.componentsData?.components;
        if (!comps) return;
        const needle = ref.trim().toUpperCase();
        const comp = comps.find(c => (c.ref || '').toUpperCase() === needle);
        if (!comp) return;
        const layerMap = {
          IC:    ['#ics-toggle',              () => { state.showICs = true; }],
          CAP:   ['#caps-toggle',             () => { state.showCaps = true; }],
          RES:   ['#res-toggle',              () => { state.showRes = true; }],
          RNET:  ['#res-toggle',              () => { state.showRes = true; }],
          CON:   ['#connectors-toggle',       () => { state.showConnectors = true; }],
          CON50: ['#large-connectors-toggle', () => { state.showLargeConnectors = true; }],
          DIO:   ['#dio-toggle',              () => { state.showDio = true; }],
          IND:   ['#ind-toggle',              () => { state.showInd = true; }],
          XTAL:  ['#xtal-toggle',             () => { state.showXtal = true; }],
          TRN:   ['#trn-toggle',              () => { state.showTrn = true; }],
          JP:    ['#jp-toggle',               () => { state.showJp = true; }],
          RELAY: ['#relay-toggle',            () => { state.showRelay = true; }],
        };
        const entry = layerMap[comp.comp_type];
        if (entry) {
          const [sel, setter] = entry;
          document.querySelector(sel)?.classList.add('is-active');
          setter();
          markDrillDirty();
        }
      }

      function applyHashToState() {
        const raw = window.location.hash.slice(1);
        if (!raw) { fitToScreen(); return; }
        const p = new URLSearchParams(raw);
        const urlRef = p.get('ref');

        // legacy #ref=XX link sin v — solo navegar al componente
        if (urlRef && !p.has('v')) {
          fitToScreen();
          enableLayerForRef(urlRef);
          navigateToComponent(urlRef);
          return;
        }

        // modo (layer o overlay)
        const m = p.get('m');
        if (m && (state.layerIds.includes(m) || m === 'overlay')) {
          switchMode(m);
          boardSelect.value = m;
        }

        // flags de visibilidad
        const vStr = p.get('v');
        if (vStr !== null) {
          const v = parseInt(vStr, 16) || 0;
          FLAG_KEYS.forEach((k, i) => { state[k] = !!(v & (1 << i)); });
          syncToggleUI();
          markDrillDirty();
          markTraceDirty();
          markOrphanDirty();
        }

        // zoom y posición
        const z  = parseFloat(p.get('z'));
        const px = parseFloat(p.get('px'));
        const py = parseFloat(p.get('py'));
        if (!isNaN(z) && !isNaN(px) && !isNaN(py)) {
          state.zoom = z;
          state.x    = px;
          state.y    = py;
        } else {
          fitToScreen();
        }

        if (urlRef) { enableLayerForRef(urlRef); navigateToComponent(urlRef); }

        // traza seleccionada
        const tid = p.get('tid');
        if (tid) {
          const trace = state.traces.find(t => t.id === tid);
          if (trace) {
            state.selectedLegacyTraceId  = trace.id;
            state.selectedLegacyNet      = trace.net;
            state.selectedLegacyNetGroup = trace.netGroup;
            markTraceDirty();
          }
        }

        render();
      }
      // ─────────────────────────────────────────────────────────────────────

      // render() encola un frame; doRender() ejecuta el trabajo real
      function render() {
        if (_rafId !== null) return;
        _rafId = requestAnimationFrame(() => {
          _rafId = null;
          doRender();
          pushHash();
        });
      }

      function doRender() {
        if (!state.manifest) {
          return;
        }

        chooseLevel();

        const b = board();
        const info = levelInfo();
        const tileSize = state.manifest.tileSize;
        const levelToScreen = state.zoom / info.scale;

        world.style.width = `${info.width}px`;
        world.style.height = `${info.height}px`;
        world.style.transform = `translate(${state.x}px, ${state.y}px) scale(${levelToScreen})`;

        // Los overlays SVG viven fuera de .world: se actualizan via viewBox cada frame
        // (mucho mas barato que propagar el CSS transform a cientos de elementos)
        const vbX = (-state.x / state.zoom).toFixed(2);
        const vbY = (-state.y / state.zoom).toFixed(2);
        const vbW = (viewer.clientWidth / state.zoom).toFixed(2);
        const vbH = (viewer.clientHeight / state.zoom).toFixed(2);
        const overlayViewBox = `${vbX} ${vbY} ${vbW} ${vbH}`;
        drillOverlay.setAttribute("width", viewer.clientWidth);
        drillOverlay.setAttribute("height", viewer.clientHeight);
        drillOverlay.setAttribute("viewBox", overlayViewBox);
        traceOverlay.setAttribute("width", viewer.clientWidth);
        traceOverlay.setAttribute("height", viewer.clientHeight);
        traceOverlay.setAttribute("viewBox", overlayViewBox);
        highlightOverlay.setAttribute("width", viewer.clientWidth);
        highlightOverlay.setAttribute("height", viewer.clientHeight);
        highlightOverlay.setAttribute("viewBox", overlayViewBox);
        orphanOverlay.setAttribute("width", viewer.clientWidth);
        orphanOverlay.setAttribute("height", viewer.clientHeight);
        orphanOverlay.setAttribute("viewBox", overlayViewBox);
        layerA.style.opacity = "1";
        layerB.style.opacity = state.mode === "overlay" ? String(Number(opacityInput.value) / 100) : "1";
        layerSilk.style.opacity = "0.85";
        layerSilk.style.mixBlendMode = "screen";
        layerA.hidden = !state.showPCB || state.mode === state.layerIds[1];
        layerB.hidden = !state.showPCB || state.mode === state.layerIds[0];
        layerSilk.hidden = !state.showSilkscreen;
        viewer.style.background = state.showPCB ? "#101715" : "#1a1f1e";
        opacityControl.classList.toggle("is-visible", state.mode === "overlay");

        const viewLeft = Math.max(0, (-state.x / state.zoom) * info.scale);
        const viewTop = Math.max(0, (-state.y / state.zoom) * info.scale);
        const viewRight = Math.min(info.width, ((viewer.clientWidth - state.x) / state.zoom) * info.scale);
        const viewBottom = Math.min(info.height, ((viewer.clientHeight - state.y) / state.zoom) * info.scale);

        const minCol = clamp(Math.floor(viewLeft / tileSize) - 1, 0, info.cols - 1);
        const maxCol = clamp(Math.floor(viewRight / tileSize) + 1, 0, info.cols - 1);
        const minRow = clamp(Math.floor(viewTop / tileSize) - 1, 0, info.rows - 1);
        const maxRow = clamp(Math.floor(viewBottom / tileSize) + 1, 0, info.rows - 1);
        const visible = new Set();
        const boards = activeBoards();
        if (state.showSilkscreen && state.silkId && state.manifest?.boards?.[state.silkId]) {
          boards.push(state.silkId);
        }

        for (let row = minRow; row <= maxRow; row += 1) {
          for (let col = minCol; col <= maxCol; col += 1) {
            for (const boardId of boards) {
              const tile = ensureTile(boardId, info.level, col, row);
              const width = Math.min(tileSize, info.width - col * tileSize);
              const height = Math.min(tileSize, info.height - row * tileSize);
              tile.style.left = `${col * tileSize}px`;
              tile.style.top = `${row * tileSize}px`;
              tile.style.width = `${width}px`;
              tile.style.height = `${height}px`;
              visible.add(tileKey(boardId, info.level, col, row));
            }
          }
        }

        for (const [key, tile] of state.tiles.entries()) {
          if (!visible.has(key)) {
            tile.remove();
            state.tiles.delete(key);
          }
        }

        // Solo reconstruir overlays SVG cuando el contenido cambio (no en cada pan)
        if (_drillDirty) {
          renderDrillOverlay();
          _drillDirty = false;
        }
        if (_traceDirty) {
          renderTraceOverlay();
          renderHighlightOverlay();
          _traceDirty = false;
        }
        if (_orphanDirty) {
          renderOrphanOverlay();
          _orphanDirty = false;
        }

        const centerX = Math.round((viewer.clientWidth / 2 - state.x) / state.zoom);
        const centerY = Math.round((viewer.clientHeight / 2 - state.y) / state.zoom);
        const pcbLabel  = state.showPCB ? "" : " (sin PCB)";
        const silkLabel = state.showSilkscreen ? " + SERIGRAFIA" : "";
        const drillLabel = drillLayersEnabled() ? " + TALADROS" : "";
        const traceLabel = traceLayersEnabled() ? " + PISTAS" : "";
        const label = state.mode === "overlay" ? `OVERLAY B ${opacityInput.value}%` : state.mode.toUpperCase();
        const finalLabel = `${label}${pcbLabel}${silkLabel}${drillLabel}${traceLabel}`;
        const navigationStatus = `${finalLabel}  zoom ${(state.zoom * 100).toFixed(0)}%  nivel ${info.level}  x:${centerX} y:${centerY}`;
        const netIds = selectedNetIds();
        let selectionInfo = "";
        if (netIds.size === 1) {
          const netId = [...netIds][0];
          const netCount = (state.tracesByNet.get(netId) || []).length;
          selectionInfo = `  |  RED ${netId} · ${netCount} seg`;
        } else if (netIds.size > 1) {
          selectionInfo = `  |  ${netIds.size} REDES  [${[...netIds].join(", ")}]`;
        }
        readout.textContent = state.hoverStatus || (navigationStatus + selectionInfo);
      }

      function switchMode(id) {
        if (id === state.mode) {
          return;
        }
        state.mode = id;
        _drillDirty = true;
        _traceDirty = true;
        _lastRenderedLevel = -1;
        clearTiles();
        render();
      }

      function isToolbarEvent(event) {
        return event.target instanceof Element && Boolean(
          event.target.closest(".toolbar") || event.target.closest(".viewer-nav")
        );
      }

      // --- Manejo de punteros con soporte de pinch-to-zoom ---

      const activePointers = new Map();
      let lastPinchDist = null;
      let _dragDidMove = false;

      function getPinchInfo() {
        const pts = [...activePointers.values()];
        return {
          dist: Math.hypot(pts[1].x - pts[0].x, pts[1].y - pts[0].y),
          midX: (pts[0].x + pts[1].x) / 2,
          midY: (pts[0].y + pts[1].y) / 2,
        };
      }

      function startPan(event) {
        if (event.button !== 0 || isToolbarEvent(event)) {
          return;
        }
        event.preventDefault();

        if (event.pointerId !== undefined) {
          activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });
          if (activePointers.size >= 2) {
            // Segundo dedo: cancelar drag y arrancar pinch
            state.dragging = false;
            viewer.classList.remove("is-dragging");
            document.documentElement.classList.remove("is-panning");
            lastPinchDist = getPinchInfo().dist;
            return;
          }
        }

        state.dragging = true;
        _dragDidMove = false;
        state.dragStart = { x: event.clientX, y: event.clientY, viewX: state.x, viewY: state.y };
        viewer.classList.add("is-dragging");
        document.documentElement.classList.add("is-panning");
        // Solo capturar puntero para mouse, no para touch (touch usa varios pointers simultaneos)
        if (event.pointerId !== undefined && viewer.setPointerCapture && event.pointerType !== "touch") {
          try {
            viewer.setPointerCapture(event.pointerId);
          } catch {
            // Algunos eventos sinteticos no permiten captura de puntero.
          }
        }
      }

      function movePan(event) {
        if (event.pointerId !== undefined) {
          if (!activePointers.has(event.pointerId)) {
            return;
          }
          activePointers.set(event.pointerId, { x: event.clientX, y: event.clientY });

          if (activePointers.size >= 2) {
            event.preventDefault();
            const { dist, midX, midY } = getPinchInfo();
            if (lastPinchDist !== null && lastPinchDist > 0) {
              setZoom(state.zoom * (dist / lastPinchDist), midX, midY);
            }
            lastPinchDist = dist;
            return;
          }
        }

        if (!state.dragging) {
          return;
        }
        event.preventDefault();
        const dx = event.clientX - state.dragStart.x;
        const dy = event.clientY - state.dragStart.y;
        const moveThreshold = event.pointerType === "touch" ? 12 : 4;
        if (!_dragDidMove && Math.hypot(dx, dy) > moveThreshold) {
          _dragDidMove = true;
        }
        state.x = state.dragStart.viewX + dx;
        state.y = state.dragStart.viewY + dy;
        render();
      }

      function endPan(event) {
        if (event.pointerId !== undefined) {
          activePointers.delete(event.pointerId);
          if (activePointers.size < 2) {
            lastPinchDist = null;
          }
          if (activePointers.size === 1) {
            // Queda un dedo: reanudar drag desde la posicion actual
            const [pt] = activePointers.values();
            state.dragStart = { x: pt.x, y: pt.y, viewX: state.x, viewY: state.y };
            state.dragging = true;
            viewer.classList.add("is-dragging");
            document.documentElement.classList.add("is-panning");
            return;
          }
          if (activePointers.size > 1) {
            return;
          }
        }

        state.dragging = false;
        viewer.classList.remove("is-dragging");
        document.documentElement.classList.remove("is-panning");
      }

      function resetPointers() {
        activePointers.clear();
        lastPinchDist = null;
        state.dragging = false;
        viewer.classList.remove("is-dragging");
        document.documentElement.classList.remove("is-panning");
      }

      // ---

      window.addEventListener("wheel", (event) => {
        if (isToolbarEvent(event)) {
          return;
        }
        event.preventDefault();
        const delta = Math.sign(event.deltaY);
        const factor = delta < 0 ? 1.18 : 1 / 1.18;
        setZoom(state.zoom * factor, event.clientX, event.clientY);
      }, { passive: false });

      if (window.PointerEvent) {
        viewer.addEventListener("pointerdown", startPan);
        window.addEventListener("pointermove", movePan);
        window.addEventListener("pointerup", endPan);
        window.addEventListener("pointercancel", endPan);
        window.addEventListener("blur", resetPointers);
      } else {
        viewer.addEventListener("mousedown", startPan);
        window.addEventListener("mousemove", movePan);
        window.addEventListener("mouseup", endPan);
        window.addEventListener("mouseleave", endPan);
      }
      viewer.addEventListener("contextmenu", (event) => event.preventDefault());

      drillOverlay.addEventListener("pointerover", (event) => {
        if (!(event.target instanceof SVGCircleElement) && !(event.target instanceof SVGPolygonElement) && !(event.target instanceof SVGRectElement)) return;
        if (event.target.dataset.status) {
          state.hoverStatus = event.target.dataset.status;
          readout.textContent = state.hoverStatus;
        }
        if (event.target.dataset.conId) {
          showPinTooltip(event, event.target.dataset.conId, Number(event.target.dataset.conPin));
        } else if (event.target.dataset.icId) {
          showIcTooltip(event, event.target.dataset.icId, Number(event.target.dataset.icPin));
        } else if (event.target.dataset.relayId) {
          showRelayPinTooltip(event, event.target.dataset.relayId, event.target.dataset.relayPin);
        } else if (event.target.dataset.compId) {
          const comp = state.componentsData?.components?.find(c => String(c.id) === event.target.dataset.compId);
          showComponentTooltip(event, comp);
        }
      });

      drillOverlay.addEventListener("pointermove", (event) => {
        if (pinTooltipEl.classList.contains("is-visible")) {
          positionPinTooltip(event);
        }
      });

      drillOverlay.addEventListener("pointerout", (event) => {
        if (!(event.target instanceof SVGCircleElement) && !(event.target instanceof SVGPolygonElement) && !(event.target instanceof SVGRectElement)) return;
        if (event.target.dataset.status) {
          state.hoverStatus = "";
          render();
        }
        if (event.target.dataset.conId || event.target.dataset.icId || event.target.dataset.relayId || event.target.dataset.compId) {
          hidePinTooltip();
        }
      });

      viewer.addEventListener("click", (event) => {
        if (isToolbarEvent(event)) return;
        if (_dragDidMove) { _dragDidMove = false; return; }
        if (!traceLayersEnabled()) return;
        const point = clientToImage(event.clientX, event.clientY);

        // ── Modelo de grafo (Phase 4) ─────────────────────────────────
        if (state.graphSegments.length > 0) {
          const hit   = nearestSegment(point);
          const newId = hit ? hit.id : null;
          if (event.shiftKey) {
            selectSegment(newId, true);
          } else {
            const isSameOnly = newId !== null
              && state.selectedSegIds.size === 1
              && state.selectedSegIds.has(newId);
            selectSegment(isSameOnly ? null : newId, false);
          }
          return;
        }

        // ── Trazas legacy ─────────────────────────────────────────────
        const hit = nearestLegacyTrace(point);
        const isSame = hit && hit.id === state.selectedLegacyTraceId;
        state.selectedLegacyTraceId  = isSame ? null : (hit ? hit.id       : null);
        state.selectedLegacyNet      = isSame ? null : (hit ? hit.net      : null);
        state.selectedLegacyNetGroup = isSame ? null : (hit ? hit.netGroup : null);
        markTraceDirty();
        render();
      });

      viewer.addEventListener("dblclick", (event) => {
        if (isToolbarEvent(event)) {
          return;
        }
        event.preventDefault();
        setZoom(state.zoom * 1.8, event.clientX, event.clientY);
      });

      // Atajos de teclado
      document.addEventListener("keydown", (event) => {
        if (event.target instanceof HTMLInputElement || event.target instanceof HTMLSelectElement) {
          return;
        }
        switch (event.key) {
          case "+": case "=": setZoom(state.zoom * 1.4); break;
          case "-": setZoom(state.zoom / 1.4); break;
          case "f": case "F": case "0": fitToScreen(); break;
          case "1": setZoom(1); break;
          case "Escape":
            if (state.selectedLegacyTraceId) {
              state.selectedLegacyTraceId  = null;
              state.selectedLegacyNet      = null;
              state.selectedLegacyNetGroup = null;
              markTraceDirty();
              render();
            } else if (state.selectedSegIds.size > 0) {
              selectSegment(null);
            }
            break;
        }
      });

      boardSelect.addEventListener("change", () => switchMode(boardSelect.value));
      opacityInput.addEventListener("input", () => {
        opacityValue.textContent = `${opacityInput.value}%`;
        render();
      });
      pcbToggle.addEventListener("click", () => {
        pcbToggle.classList.toggle("is-active");
        state.showPCB = pcbToggle.classList.contains("is-active");
        render();
      });
      silkscreenToggle.addEventListener("click", () => {
        silkscreenToggle.classList.toggle("is-active");
        state.showSilkscreen = silkscreenToggle.classList.contains("is-active");
        render();
      });
      viasToggle.addEventListener("click", () => {
        viasToggle.classList.toggle("is-active");
        state.showVias = viasToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      icsToggle.addEventListener("click", () => {
        icsToggle.classList.toggle("is-active");
        state.showICs = icsToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      connectorsToggle.addEventListener("click", () => {
        connectorsToggle.classList.toggle("is-active");
        state.showConnectors = connectorsToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      largeConnectorsToggle.addEventListener("click", () => {
        largeConnectorsToggle.classList.toggle("is-active");
        state.showLargeConnectors = largeConnectorsToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      capsToggle.addEventListener("click", () => {
        capsToggle.classList.toggle("is-active");
        state.showCaps = capsToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      resToggle.addEventListener("click", () => {
        resToggle.classList.toggle("is-active");
        state.showRes = resToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      dioToggle.addEventListener("click", () => {
        dioToggle.classList.toggle("is-active");
        state.showDio = dioToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      indToggle.addEventListener("click", () => {
        indToggle.classList.toggle("is-active");
        state.showInd = indToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      xtalToggle.addEventListener("click", () => {
        xtalToggle.classList.toggle("is-active");
        state.showXtal = xtalToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      trnToggle.addEventListener("click", () => {
        trnToggle.classList.toggle("is-active");
        state.showTrn = trnToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      relayToggle.addEventListener("click", () => {
        relayToggle.classList.toggle("is-active");
        state.showRelay = relayToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      jpToggle.addEventListener("click", () => {
        jpToggle.classList.toggle("is-active");
        state.showJp = jpToggle.classList.contains("is-active");
        markDrillDirty();
        render();
      });
      traceAToggle.addEventListener("click", () => {
        traceAToggle.classList.toggle("is-active");
        state.showTraceA = traceAToggle.classList.contains("is-active");
        markTraceDirty();
        render();
      });
      traceBToggle.addEventListener("click", () => {
        traceBToggle.classList.toggle("is-active");
        state.showTraceB = traceBToggle.classList.contains("is-active");
        markTraceDirty();
        render();
      });
      const orphanToggle = document.querySelector("#orphan-toggle");
      orphanToggle.addEventListener("click", () => {
        orphanToggle.classList.toggle("is-active");
        state.showOrphans = orphanToggle.classList.contains("is-active");
        markOrphanDirty();
        render();
      });
      document.querySelector("#zoom-in").addEventListener("click", () => setZoom(state.zoom * 1.4));
      document.querySelector("#zoom-out").addEventListener("click", () => setZoom(state.zoom / 1.4));
      document.querySelector("#fit").addEventListener("click", fitToScreen);
      document.querySelector("#one").addEventListener("click", () => setZoom(1));
      window.addEventListener("resize", debounce(render, 100));

      // ── Accordion ──────────────────────────────────────────────────
      document.querySelectorAll(".lg-header").forEach(header => {
        header.addEventListener("click", () => {
          header.closest(".layer-group").classList.toggle("is-closed");
        });
      });
      // En portrait (celular) todos los grupos arrancan cerrados
      if (window.matchMedia("(orientation: portrait), (max-width: 640px)").matches) {
        document.querySelectorAll(".layer-group").forEach(g => g.classList.add("is-closed"));
      }

      fetch(assetUrl("data/project.json")).then(r => r.ok ? r.json() : {}).catch(() => ({}))
        .then(project => {
          // Poblar título y nombre en navbar
          const projectName = project?.name || "PCB Viewer";
          document.title = `Viewer — ${projectName}`;
          const navName = document.getElementById("nav-project-name");
          if (navName) navName.textContent = projectName;

          // Derivar layer IDs desde project.json
          const layers = project?.scan?.layers ?? [
            { id: "pcb_a", label: "PCB A" },
            { id: "pcb_b", label: "PCB B" },
            { id: "silk",  label: "Silkscreen" },
          ];
          const silkLayer = layers.find(l => l.id === "silk" || l.silk === true);
          state.silkId  = silkLayer?.id ?? null;
          state.layerIds = layers.filter(l => l.id !== state.silkId).map(l => l.id);
          state.mode = state.layerIds[0] ?? "pcb_a";

          // Construir opciones del selector de cara
          boardSelect.innerHTML = "";
          state.layerIds.forEach((id, i) => {
            const opt = document.createElement("option");
            opt.value = id;
            opt.textContent = layers.find(l => l.id === id)?.label ?? id;
            boardSelect.append(opt);
          });
          if (state.layerIds.length >= 2) {
            const opt = document.createElement("option");
            opt.value = "overlay";
            opt.textContent = `Overlay ${state.layerIds[0]} + ${state.layerIds[1]}`;
            boardSelect.append(opt);
          }
          boardSelect.value = state.mode;

          return Promise.all([
            fetch(assetUrl("tiles/manifest.json")).then((r) => {
              if (!r.ok) throw new Error("tiles manifest missing");
              return r.json();
            }),
            fetch(assetUrl("data/components.json")).then((r) => r.ok ? r.json() : null).catch(() => null),
            fetch(assetUrl("data/drills.json")).then((r) => r.ok ? r.json() : null).catch(() => null),
            fetch(assetUrl("data/traces.json")).then((r) => r.ok ? r.json() : null).catch(() => null),
            fetch(assetUrl("data/graph/points.json")).then((r) => r.ok ? r.json() : null).catch(() => null),
            fetch(assetUrl("data/graph/segments.json")).then((r) => r.ok ? r.json() : null).catch(() => null),
            fetch(assetUrl("data/ic_pinouts.json")).then((r) => r.ok ? r.json() : null).catch(() => null),
          ]);
        })
        .then(([manifest, componentsRaw, drillsRaw, tracesRaw, pointsData, segmentsData, icPinoutsData]) => {
          if (icPinoutsData) Object.assign(IC_PINOUTS, icPinoutsData);
          state.manifest = manifest;

          // Modelo de grafo nuevo (points + segments)
          if (pointsData?.points) {
            state.graphPoints = new Map(pointsData.points.map(p => [p.id, p]));
          }
          if (segmentsData?.segments) {
            state.graphSegments = segmentsData.segments;
          }

          // Pistas legacy (traces.json) cuando no hay grafo nuevo
          if (tracesRaw) {
            state.traces = normalizeTraces(tracesRaw);
            buildTraceConnectivity(state.traces);
          }

          // Taladros: mapa id → {x, y, r}
          const drillsList = drillsRaw?.drills ?? (Array.isArray(drillsRaw) ? drillsRaw : []);
          const drillsById = new Map(drillsList.map(d => [d.id, d]));

          // Normalizar componentes: drills:[id,...] → pins:[{n,cx,cy,r}] + bbox/poly
          if (componentsRaw) {
            const comps = componentsRaw.components ?? (Array.isArray(componentsRaw) ? componentsRaw : []);
            comps.forEach((comp, i) => {
              if (!comp.id) comp.id = comp.ref || i;
              if (comp.comp_type === "TR") comp.comp_type = "TRN";
              if (!comp.pins || comp.pins.length === 0) {
                const ids = (comp.drills || []).map(x => typeof x === 'object' ? x.id : x);
                comp.pins = ids.map((id, idx) => {
                  const d = drillsById.get(Number(id));
                  return { n: idx + 1, cx: d?.x ?? 0, cy: d?.y ?? 0, r: d?.r ?? 10 };
                }).filter(p => p.cx !== 0 || p.cy !== 0);
              }
              // Calcular bbox y poly desde pins si no existen
              if (comp.pins.length >= 2 && !comp.bbox && !comp.poly) {
                const xs = comp.pins.map(p => p.cx);
                const ys = comp.pins.map(p => p.cy);
                const minX = Math.min(...xs), maxX = Math.max(...xs);
                const minY = Math.min(...ys), maxY = Math.max(...ys);
                const pad = comp.pins.length > 6 ? 25 : 16;
                comp.bbox = [[minX - pad, minY - pad], [maxX + pad, maxY + pad]];
                if (comp.pins.length === 2) {
                  // Rectángulo perpendicular al eje entre los dos pines
                  const p1 = comp.pins[0], p2 = comp.pins[1];
                  const dx = p2.cx - p1.cx, dy = p2.cy - p1.cy;
                  const len = Math.hypot(dx, dy) || 1;
                  const ux = dx / len, uy = dy / len;
                  const ct = comp.comp_type;
                  const isJP  = ct === 'JP';
                  const isThin = ct === 'CAP' || ct === 'RES' || ct === 'IND';
                  const hw = isJP   ? Math.max(12, Math.min(20, len * 0.15))
                           : isThin ? Math.max(18, Math.min(32, len * 0.20))
                           :          Math.max(28, Math.min(55, len * 0.28));
                  const mg = isJP ? 6 : 10;
                  comp.poly = [
                    [p1.cx - uy*hw - ux*mg, p1.cy + ux*hw - uy*mg],
                    [p1.cx + uy*hw - ux*mg, p1.cy - ux*hw - uy*mg],
                    [p2.cx + uy*hw + ux*mg, p2.cy - ux*hw + uy*mg],
                    [p2.cx - uy*hw + ux*mg, p2.cy + ux*hw + uy*mg],
                  ];
                } else {
                  // Rectángulo del bbox para componentes con 3+ pines
                  comp.poly = [
                    [minX - pad, minY - pad], [maxX + pad, minY - pad],
                    [maxX + pad, maxY + pad], [minX - pad, maxY + pad],
                  ];
                }
              }
            });
          }

          // Normalizar componentes después de tener graphPoints y pins disponibles
          state.componentsData = normalizeComponentsData(componentsRaw);
          buildGraphIndex();
          computeOrphanEndpoints();
          markDrillDirty();
          markTraceDirty();
          markOrphanDirty();
          applyHashToState();
        })
        .catch((error) => {
          empty.style.display = "grid";
          const openedAsFile = window.location.protocol === "file:";
          empty.textContent = openedAsFile
            ? "Abri esta pagina desde un servidor local, no como archivo."
            : `No pude cargar tiles/manifest.json desde ${window.location.origin}.`;
          readout.textContent = openedAsFile ? "Abrir con servidor local" : "Faltan tiles";
          console.error(error);
        });
    </script>
  </body>
</html>
