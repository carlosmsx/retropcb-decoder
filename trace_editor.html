            const label = `${jp.ref || jp.id}${jp.note ? ' · ' + jp.note : ''}`;
            if (jp.poly?.length >= 3) {
              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              poly.setAttribute("points", jp.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("jp-footprint");
              poly.dataset.status = label;
              group.append(poly);
              const cx = jp.poly.reduce((s, [x]) => s + x, 0) / jp.poly.length;
              const cy = jp.poly.reduce((s, [, y]) => s + y, 0) / jp.poly.length;
              const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
              txt.setAttribute("x", cx); txt.setAttribute("y", cy);
              txt.classList.add("jp-label"); txt.textContent = jp.ref || jp.id;
              group.append(txt);
            }
            for (const pin of jp.pins || []) {
              appendDrillCircle(group, pin, 8, "res-footprint", `${label} pin ${pin.n}`);
            }
          }
          drillOverlay.append(group);
        }

        // ── Render RELAY ─────────────────────────────────────────────────────
        if (state.showRelay) {
          const group = document.createElementNS("http://www.w3.org/2000/svg", "g");
          for (const relay of (state.componentsData?.components || []).filter(c => c.comp_type === "RELAY")) {
            const label = `${relay.ref || relay.id}${relay.value ? ' · ' + relay.value : ''}`;
            if (relay.poly?.length >= 3) {
              const poly = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
              poly.setAttribute("points", relay.poly.map(([x, y]) => `${x},${y}`).join(" "));
              poly.classList.add("relay-footprint");
              poly.dataset.status = label;
              group.append(poly);
              const cx = relay.poly.reduce((s, [x]) => s + x, 0) / relay.poly.length;
              const cy = relay.poly.reduce((s, [, y]) => s + y, 0) / relay.poly.length;
              const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
              txt.setAttribute("x", cx); txt.setAttribute("y", cy);
              txt.classList.add("relay-label"); txt.textContent = relay.ref || relay.id;
              group.append(txt);
            }
            for (const pin of relay.pins || []) {
              const circle = appendDrillCircle(group, pin, 9, "drill-relay", `${relay.ref} — ${pin.n}`);
              circle.dataset.relayId  = String(relay.id);
              circle.dataset.relayPin = pin.n;
            }
          }
          drillOverlay.append(group);
        }

        // Highlight del primer taladro seleccionado para nueva resistencia o cap
        for (const [pending, cls] of [[_resPendingDrill, "res-drill-pending"], [_capPendingDrill, "cap-drill-pending"], [_dioPendingDrill, "dio-drill-pending"]]) {
          if (pending) {
            const hl = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            hl.setAttribute("cx", pending.cx);
            hl.setAttribute("cy", pending.cy);
            hl.setAttribute("r", 20);
            hl.classList.add(cls);
            drillOverlay.append(hl);
          }
        }
      }

      function render() {
        if (!state.manifest) {
          return;
        }
        if (_rafId !== null) {
          return;
        }
        _rafId = requestAnimationFrame(() => {
          _rafId = null;
          _doRender();
        });
      }

      function _doRender() {
        chooseLevel();
        const info = levelInfo();
        const tileSize = state.manifest.tileSize;
        const levelToScreen = state.zoom / info.scale;

        world.style.width = `${info.width}px`;
        world.style.height = `${info.height}px`;
        world.style.transform = `translate(${state.x}px, ${state.y}px) scale(${levelToScreen})`;
        layerA.style.opacity = "1";
        layerB.style.opacity = state.mode === "overlay" ? String(Number(opacityInput.value) / 100) : "1";
        layerSilk.style.opacity = "0.85";
        layerSilk.style.mixBlendMode = "screen";
        layerA.hidden = state.mode === "pcb_b";
        layerB.hidden = state.mode === "pcb_a";
        layerSilk.hidden = !state.showSilkscreen;
        opacityControl.classList.toggle("is-visible", state.mode === "overlay");

        // Actualizar viewBox de los overlays (muy barato — solo atributos)
        const vbX = (-state.x / state.zoom).toFixed(2);
        const vbY = (-state.y / state.zoom).toFixed(2);
        const vbW = (viewer.clientWidth / state.zoom).toFixed(2);
        const vbH = (viewer.clientHeight / state.zoom).toFixed(2);
        const overlayViewBox = `${vbX} ${vbY} ${vbW} ${vbH}`;
        drillOverlay.setAttribute("width", viewer.clientWidth);
        drillOverlay.setAttribute("height", viewer.clientHeight);
        drillOverlay.setAttribute("viewBox", overlayViewBox);
        traceOverlay.setAttribute("width", viewer.clientWidth);
        traceOverlay.setAttribute("height", viewer.clientHeight);
        traceOverlay.setAttribute("viewBox", overlayViewBox);
        capMarkersOverlay.setAttribute("width", viewer.clientWidth);
        capMarkersOverlay.setAttribute("height", viewer.clientHeight);
        capMarkersOverlay.setAttribute("viewBox", overlayViewBox);
        resMarkersOverlay.setAttribute("width", viewer.clientWidth);
        resMarkersOverlay.setAttribute("height", viewer.clientHeight);
        resMarkersOverlay.setAttribute("viewBox", overlayViewBox);
        dioMarkersOverlay.setAttribute("width", viewer.clientWidth);
        dioMarkersOverlay.setAttribute("height", viewer.clientHeight);
        dioMarkersOverlay.setAttribute("viewBox", overlayViewBox);

        const viewLeft = Math.max(0, (-state.x / state.zoom) * info.scale);
        const viewTop = Math.max(0, (-state.y / state.zoom) * info.scale);
        const viewRight = Math.min(info.width, ((viewer.clientWidth - state.x) / state.zoom) * info.scale);
        const viewBottom = Math.min(info.height, ((viewer.clientHeight - state.y) / state.zoom) * info.scale);

        const minCol = clamp(Math.floor(viewLeft / tileSize) - 1, 0, info.cols - 1);
        const maxCol = clamp(Math.floor(viewRight / tileSize) + 1, 0, info.cols - 1);
        const minRow = clamp(Math.floor(viewTop / tileSize) - 1, 0, info.rows - 1);
        const maxRow = clamp(Math.floor(viewBottom / tileSize) + 1, 0, info.rows - 1);
        const visible = new Set();
        const boards = activeBoards();
        if (state.showSilkscreen && state.analysisManifest?.layers?.a_silk) {
          boards.push("a_silk");
        }

        for (let row = minRow; row <= maxRow; row += 1) {
          for (let col = minCol; col <= maxCol; col += 1) {
            for (const boardId of boards) {
              const tile = ensureTile(boardId, info.level, col, row);
              const width = Math.min(tileSize, info.width - col * tileSize);
              const height = Math.min(tileSize, info.height - row * tileSize);
              tile.style.left = `${col * tileSize}px`;
              tile.style.top = `${row * tileSize}px`;
              tile.style.width = `${width}px`;
              tile.style.height = `${height}px`;
              visible.add(tileKey(boardId, info.level, col, row));
            }
          }
        }

        for (const [key, tile] of state.tiles.entries()) {
          if (!visible.has(key)) {
            tile.remove();
            state.tiles.delete(key);
          }
        }

        if (_drillDirty) {
          renderDrillOverlay();
          _drillDirty = false;
        }

        if (_traceDirty) {
          renderTraceOverlay();
          _traceDirty = false;
        }

        const centerX = Math.round((viewer.clientWidth / 2 - state.x) / state.zoom);
        const centerY = Math.round((viewer.clientHeight / 2 - state.y) / state.zoom);
        const silkLabel = state.showSilkscreen ? " + SERIGRAFIA" : "";
        const drillLabel = drillLayersEnabled() ? " + TALADROS" : "";
        const label = state.mode === "overlay" ? `OVERLAY B ${opacityInput.value}%` : state.mode.toUpperCase();
        const traceLabel = ` + ${state.traces.length} PISTAS`;
        const netId = selectedNetId();
        const netSize = netId ? state.tracesByNet.get(netId)?.length || 0 : 0;
        const netLabel = netId ? ` + ${netId} ${netSize} RAMAS` : "";
        const finalLabel = `${label}${silkLabel}${drillLabel}${traceLabel}${netLabel}`;
        const navigationStatus = `${finalLabel}  zoom ${(state.zoom * 100).toFixed(0)}%  nivel ${info.level}  x:${centerX} y:${centerY}`;
        const pendingMsg = _trnPendingDrills.length
          ? `  ⬤ Transistor: ${_trnPendingDrills.length}/3 taladros — ${_trnPendingDrills.map(d=>`D${d.id}`).join(", ")}  (Esc cancela)`
          : _resPendingDrill
          ? `  ⬤ D${_resPendingDrill.id} seleccionado — click en segundo taladro para nueva Res  (Esc cancela)`
          : _capPendingDrill
          ? `  ⬤ D${_capPendingDrill.id} seleccionado — click en segundo taladro para nueva Cap  (Esc cancela)`
          : _dioPendingDrill
          ? `  ⬤ D${_dioPendingDrill.id} (ánodo) seleccionado — click en cátodo para nuevo Diodo  (Esc cancela)`
          : "";
        readout.textContent = state.hoverStatus || pendingMsg || navigationStatus;
      }

      function switchMode(id) {
        _traceDirty = true;
        state.mode = id;
        if (id === "pcb_a" || id === "pcb_b") {
          setActiveEditSide(id === "pcb_b" ? "B" : "A", false);
        }
        clearTiles();
        render();
      }

      function setEditorTool(tool) {
        _traceDirty = true;
        state.editMode = tool;
        if (state.editMode !== "draw") {
          finishDraft();
        }
        state.movingPoint = null;
        viewer.classList.toggle("is-drawing", state.editMode === "draw");
        viewer.classList.toggle("is-editing", state.editMode !== "pan");
        viewer.classList.toggle("is-moving-point", state.editMode === "move-point");
        viewer.classList.toggle("is-deleting-point", state.editMode === "delete-point");
        viewer.classList.toggle("is-cutting-segment", state.editMode === "delete-segment");
        drillEditPanel.classList.toggle("is-visible", state.editMode === "add-drill");
        if (state.editMode === "add-drill" && state.componentsData) {
          const vias = (state.componentsData.components || []).filter(c => c.comp_type === "VIA");
          drillAddStatus.textContent = `Click en el PCB para agregar VIA  ·  ${vias.length} VIAs existentes`;
        }
        for (const button of toolButtons) {
          const active = button.dataset.tool === state.editMode;
          button.classList.toggle("is-active", active);
          button.setAttribute("aria-pressed", String(active));
        }
        const drawControls = document.querySelector("#draw-controls");
        if (drawControls) {
          drawControls.style.display = (state.editMode === "draw" || state.editMode === "select-trace") ? "" : "none";
        }
        render();
      }

      function isToolbarEvent(event) {
        return event.target instanceof Element && Boolean(
          event.target.closest(".toolbar") || event.target.closest(".viewer-nav")
        );
      }

      function startPan(event) {
        const wantsRightButtonPan = event.button === 2;
        const wantsLeftButtonPan = event.button === 0 && state.editMode === "pan";
        if ((!wantsLeftButtonPan && !wantsRightButtonPan) || isToolbarEvent(event)) {
          return;
        }
        if (event.target.closest(".cap-unref-marker") || event.target.closest(".res-unref-marker") || event.target.closest(".dio-unref-marker")) {
          return;
        }
        event.preventDefault();
        state.dragging = true;
        state.dragStart = { x: event.clientX, y: event.clientY, viewX: state.x, viewY: state.y };
        viewer.classList.add("is-dragging");
        document.documentElement.classList.add("is-panning");
        if (event.pointerId !== undefined && viewer.setPointerCapture) {
          try {
            viewer.setPointerCapture(event.pointerId);
          } catch {
            // Algunos eventos sinteticos no permiten captura de puntero.
          }
        }
      }

      function movePan(event) {
        if (!state.dragging) {
          return;
        }
        event.preventDefault();
        state.x = state.dragStart.viewX + event.clientX - state.dragStart.x;
        state.y = state.dragStart.viewY + event.clientY - state.dragStart.y;
        render();
      }

      function startEditInteraction(event) {
        if (event.button !== 0 || isToolbarEvent(event)) {
          return;
        }
        if (event.target.closest(".cap-unref-marker") || event.target.closest(".res-unref-marker") || event.target.closest(".dio-unref-marker")) {
          return;
        }
        const target = event.target;

        if (state.editMode === "add-drill") {
          event.preventDefault();
          addManualDrill(clientToImage(event.clientX, event.clientY));
          return;
        }

        if (target instanceof SVGCircleElement && target.dataset.kind === "IC") {
          event.preventDefault();
          selectIc(target.dataset.icId);
          render();
          return;
        }

        if (state.editMode === "pan") {
          return;
        }
        event.preventDefault();
        const point = clientToImage(event.clientX, event.clientY);

        if (state.editMode === "draw") {
          if (target instanceof SVGCircleElement && target.classList.contains("trace-handle")) {
            const sourceTraceId = target.dataset.traceId;
            const pointIndex = Number(target.dataset.pointIndex);
            const sourceTrace = state.traces.find((item) => item.id === sourceTraceId);
            const sourcePoint = sourceTrace?.points[pointIndex];
            if (traceIsEditable(sourceTrace) && sourcePoint) {
              if (state.draftTrace) {
                state.draftTrace.points.push(cloneTracePoint(sourcePoint));
                render();
              } else {
                startBranchFromHandle(sourceTrace.id, pointIndex);
              }
              return;
            }
          }
          if (!state.draftTrace && startBranchFromSelectedSegment(point)) {
            return;
          }
          addDraftPoint(point, event);
          return;
        }

        if (target instanceof SVGCircleElement && target.classList.contains("trace-handle")) {
          const targetTrace = state.traces.find((item) => item.id === target.dataset.traceId);
          if (!traceIsEditable(targetTrace)) {
            return;
          }
          if (state.editMode === "delete-point") {
            deleteTracePoint(target.dataset.traceId, Number(target.dataset.pointIndex));
            return;
          }
          if (state.editMode !== "move-point") {
            selectTrace(target.dataset.traceId);
            render();
            return;
          }
          selectTrace(target.dataset.traceId);
          state.movingPoint = {
            traceId: target.dataset.traceId,
            pointIndex: Number(target.dataset.pointIndex),
          };
          viewer.classList.add("is-dragging");
          document.documentElement.classList.add("is-panning");
          render();
          return;
        }

        if (state.editMode === "insert-point") {
          insertPointOnTrace(point, event);
          return;
        }

        if (state.editMode === "delete-segment") {
          deleteTraceSegment(point);
          return;
        }

        const nearest = findNearestTrace(point);
        selectTrace(nearest ? nearest.id : null);
        render();
      }

      function moveEditInteraction(event) {
        if (!state.movingPoint) {
          return;
        }
        _traceDirty = true;
        event.preventDefault();
        const trace = state.traces.find((item) => item.id === state.movingPoint.traceId);
        if (!trace || !trace.points[state.movingPoint.pointIndex]) {
          return;
        }
        trace.points[state.movingPoint.pointIndex] = pointWithSnap(clientToImage(event.clientX, event.clientY), event, {
          side: trace.side,
          excludeTraceId: trace.id,
        });
        render();
      }

      function endEditInteraction() {
        if (!state.movingPoint) {
          return;
        }
        state.movingPoint = null;
        viewer.classList.remove("is-dragging");
        document.documentElement.classList.remove("is-panning");
      }

      // ── Modo asignación de pines a conectores ────────────────────────────────

      function populateConPinSelect() {
        conPinSelect.innerHTML = '';
        for (const con of state.componentsData?.components?.filter(c => c.comp_type === "CON" || c.comp_type === "CON50") || []) {
          const opt = document.createElement('option');
          opt.value = con.id;
          opt.textContent = con.ref || con.id;
          conPinSelect.append(opt);
        }
      }

      function updateConPinNextLabel() {
        const con = state.componentsData?.components?.find(c => c.id === state.conPinTargetId);
        const name = con?.ref || state.conPinTargetId;
        conPinNextLbl.textContent = `${name}  →  Pin #${state.conPinNextNum}`;
      }

      function enterConPinMode(conId) {
        state.conPinMode      = true;
        state.conPinTargetId  = conId;
        const con = state.componentsData?.components?.find(c => c.id === conId);
        const maxPin = con?.pins?.length ? Math.max(...con.pins.map(p => Number(p.n) || 0)) : 0;
        state.conPinNextNum   = maxPin + 1;
        // Asegurar que conectores estén visibles
        if (!state.showConnectors) {
          state.showConnectors = true;
          connectorsToggle.classList.add("is-active");
          _drillDirty = true;
        }
        conAddPinBtn.classList.add('is-active');
        conPinPanel.style.display = 'inline-flex';
        viewer.classList.add('con-pin-mode');
        updateConPinNextLabel();
        render();
      }

      function exitConPinMode() {
        state.conPinMode     = false;
        state.conPinTargetId = null;
        conAddPinBtn.classList.remove('is-active');
        conPinPanel.style.display = 'none';
        viewer.classList.remove('con-pin-mode');
        render();
      }

      function addConPin(imgX, imgY) {
        if (!state.componentsData || !state.conPinTargetId) return;
        const con = state.componentsData.components.find(c => c.id === state.conPinTargetId);
        if (!con) return;
        const newPin = { n: state.conPinNextNum, cx: imgX, cy: imgY, source: 'manual' };
        con.pins.push(newPin);
        state.conPinNextNum++;
        _markComponentsDirty();
        updateConPinNextLabel();
        _drillDirty = true;
        render();
      }

      function undoLastConPin() {
        if (!state.componentsData || !state.conPinTargetId) return;
        const con = state.componentsData.components.find(c => c.id === state.conPinTargetId);
        if (!con || con.pins.length === 0) return;
        con.pins.pop();
        state.conPinNextNum = Math.max(1, state.conPinNextNum - 1);
        // Actualizar pinN
        if (con.pins.length > 0) {
          const last = con.pins[con.pins.length - 1];
          con.pinN_cx = last.cx; con.pinN_cy = last.cy;
        }
        updateConPinNextLabel();
        state.drillDirty = true;
        _drillDirty = true;
        render();
      }

      async function saveDrillDataToFile() {
        saveComponentsToFile();
      }

      function endPan(event) {
        if (!state.dragging) {
          return;
        }
        const isTap = event && state.dragStart &&
            Math.hypot(event.clientX - state.dragStart.x, event.clientY - state.dragStart.y) < 5;

        // Modo asignación de pines: tap en cualquier punto del PCB
        if (state.conPinMode && state.editMode === "pan" && isTap) {
          const img = clientToImage(event.clientX, event.clientY);
          state.dragging = false;
          viewer.classList.remove("is-dragging");
          document.documentElement.classList.remove("is-panning");
          addConPin(img.x, img.y);
          return;
        }

        // Detectar tap sin arrastre sobre taladro cuando Caps/Res/Dio está activo y herramienta es pan
        const tapEnabled = (state.showRes || state.showCaps || state.showDio || state.showTrn) && state.editMode === "pan";
        if (tapEnabled && isTap) {
          const el = document.elementFromPoint(event.clientX, event.clientY);
          if (el && el.dataset && el.dataset.drillId) {
            state.dragging = false;
            viewer.classList.remove("is-dragging");
            document.documentElement.classList.remove("is-panning");
            // Transistor tiene prioridad si hay pendientes o está activo solo
            if (_trnPendingDrills.length > 0 || (state.showTrn && !_resPendingDrill && !_capPendingDrill && !_dioPendingDrill)) {
              handleTrnDrillTap(el, event.clientX, event.clientY);
            } else if (_resPendingDrill || (state.showRes && !_capPendingDrill && !_dioPendingDrill)) {
              handleResDrillTap(el, event.clientX, event.clientY);
            } else if (_capPendingDrill || (state.showCaps && !_dioPendingDrill)) {
              handleCapDrillTap(el, event.clientX, event.clientY);
            } else {
              handleDioDrillTap(el, event.clientX, event.clientY);
            }
            return;
          } else {
            // Tap en zona vacía — cancela cualquier selección pendiente
            if (_resPendingDrill) clearResPendingDrill();
            if (_capPendingDrill) clearCapPendingDrill();
            if (_dioPendingDrill) clearDioPendingDrill();
            if (_trnPendingDrills.length) { _trnPendingDrills = []; _drillDirty = true; render(); }
          }
        }
        state.dragging = false;
        viewer.classList.remove("is-dragging");
        document.documentElement.classList.remove("is-panning");
      }

      window.addEventListener("wheel", (event) => {
        if (isToolbarEvent(event)) {
          return;
        }
        event.preventDefault();
        const delta = Math.sign(event.deltaY);
        const factor = delta < 0 ? 1.18 : 1 / 1.18;
        setZoom(state.zoom * factor, event.clientX, event.clientY);
      }, { passive: false });

      if (window.PointerEvent) {
        viewer.addEventListener("pointerdown", startPan);
        viewer.addEventListener("pointerdown", startEditInteraction);
        viewer.addEventListener("pointermove", (event) => updateCursorGuides(event.clientX, event.clientY));
        viewer.addEventListener("pointerleave", hideCursorGuides);
        window.addEventListener("pointermove", movePan);
        window.addEventListener("pointermove", moveEditInteraction);
        window.addEventListener("pointerup", endPan);
        window.addEventListener("pointerup", endEditInteraction);
        window.addEventListener("pointercancel", endPan);
        window.addEventListener("pointercancel", endEditInteraction);
        window.addEventListener("blur", endPan);
        window.addEventListener("blur", endEditInteraction);
      } else {
        viewer.addEventListener("mousedown", startPan);
        viewer.addEventListener("mousedown", startEditInteraction);
        viewer.addEventListener("mousemove", (event) => updateCursorGuides(event.clientX, event.clientY));
        viewer.addEventListener("mouseleave", hideCursorGuides);
        window.addEventListener("mousemove", movePan);
        window.addEventListener("mousemove", moveEditInteraction);
        window.addEventListener("mouseup", endPan);
        window.addEventListener("mouseup", endEditInteraction);
        window.addEventListener("mouseleave", endPan);
        window.addEventListener("mouseleave", endEditInteraction);
      }
      viewer.addEventListener("contextmenu", (event) => event.preventDefault());

      drillOverlay.addEventListener("pointerover", (event) => {
        const el = event.target;
        if ((el instanceof SVGCircleElement || el instanceof SVGPolygonElement || el instanceof SVGRectElement) && el.dataset.status) {
          state.hoverStatus = el.dataset.status;
          readout.textContent = state.hoverStatus;
        }
      });

      drillOverlay.addEventListener("pointerout", (event) => {
        const el = event.target;
        if ((el instanceof SVGCircleElement || el instanceof SVGPolygonElement || el instanceof SVGRectElement) && el.dataset.status) {
          state.hoverStatus = "";
          render();
        }
      });

      viewer.addEventListener("dblclick", (event) => {
        if (isToolbarEvent(event)) {
          return;
        }
        event.preventDefault();
        if (state.editMode === "draw") {
          finishDraft();
        } else {
          setZoom(state.zoom * 1.8, event.clientX, event.clientY);
        }
      });

      boardSelect.addEventListener("change", () => switchMode(boardSelect.value));
      for (const button of toolButtons) {
        button.addEventListener("click", () => {
          setEditorTool(button.dataset.tool);
        });
        button.setAttribute("aria-pressed", String(button.dataset.tool === state.editMode));
      }
      window.addEventListener("keydown", (event) => {
        if (event.target instanceof HTMLInputElement || event.target instanceof HTMLSelectElement) {
          return;
        }
        const keyTools = {
          "1": "pan",
          "2": "draw",
          "3": "move-point",
          "4": "insert-point",
          "5": "delete-point",
          "6": "delete-segment",
          "7": "add-drill",
          "8": "select-trace",
        };
        if (keyTools[event.key]) {
          setEditorTool(keyTools[event.key]);
        }
      });
      opacityInput.addEventListener("input", () => {
        opacityValue.textContent = `${opacityInput.value}%`;
        render();
      });

      // --- Creación de nuevas resistencias ---
      const RES_SCALE_MM = 2.54 / 60; // 60px = 2.54mm

      function rectPolyJs(cx, cy, dist_px, orient, halfW, ext) {
        const half = dist_px / 2;
        let ax, ay, px, py, x1, y1, x2, y2;
        if (orient === "H") {
          ax = 1; ay = 0; px = 0; py = 1;
          x1 = cx - half; y1 = cy;
          x2 = cx + half; y2 = cy;
        } else {
          ax = 0; ay = 1; px = 1; py = 0;
          x1 = cx; y1 = cy - half;
          x2 = cx; y2 = cy + half;
        }
        return [
          [Math.round(x1 - ax*ext + px*halfW), Math.round(y1 - ay*ext + py*halfW)],
          [Math.round(x2 + ax*ext + px*halfW), Math.round(y2 + ay*ext + py*halfW)],
          [Math.round(x2 + ax*ext - px*halfW), Math.round(y2 + ay*ext - py*halfW)],
          [Math.round(x1 - ax*ext - px*halfW), Math.round(y1 - ay*ext - py*halfW)],
        ];
      }

      function handleResDrillTap(el, clientX, clientY) {

          // Primer taladro — marcarlo
          _resPendingDrill = { id: drillId, cx, cy };

          render();
        } else if (_resPendingDrill.id === drillId) {
          // Mismo taladro — deseleccionar
          clearResPendingDrill();
        } else {
          // Segundo taladro — abrir diálogo para nombre
          const d1 = _resPendingDrill;
          const d2 = { id: drillId, cx, cy };
          _resPendingDrill = null;
          openNewResDialog(d1, d2, clientX, clientY);

      }

        _pendingNewCap = { d1, d2, dist_px, dist_mm, orient };
        _currentEditCap = null;

      function diodeArrowEl(dio) {
        // Triángulo apuntando desde d1 hacia d2, centrado en el cuerpo
        const half = dio.dist_px / 2;
        const dir  = dio.direction || 1;
        let ux, uy; // vector unitario d1→d2
        if (dio.orient === "H") { ux = dir;  uy = 0; }
        else                    { ux = 0;    uy = dir; }
        const px = -uy, py = ux; // perpendicular
        const sz = 15;
        const tip  = [dio.cx + ux * sz,           dio.cy + uy * sz];
        const b1   = [dio.cx - ux * sz + px * sz * 0.65, dio.cy - uy * sz + py * sz * 0.65];
        const b2   = [dio.cx - ux * sz - px * sz * 0.65, dio.cy - uy * sz - py * sz * 0.65];
        const arrow = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
        arrow.setAttribute("points", `${tip[0]},${tip[1]} ${b1[0]},${b1[1]} ${b2[0]},${b2[1]}`);
        arrow.classList.add("dio-arrow");
        return arrow;
      }

      function openResRefEditor(res, clientX, clientY) {

      function closeCapRefEditor() {
        capRefEditor.style.display = "none";
        _currentEditCap = null;
        _currentEditRes = null;
        _currentEditDio = null;
        _pendingNewRes = null;
        _pendingNewCap = null;

      }
      function confirmCapRef() {
        const val = capRefInput.value.trim().toUpperCase();
        if (_currentEditCap) {
          if (val) { _currentEditCap.ref = val; _markComponentsDirty(); }
        } else if (_currentEditRes) {
          if (val) { _currentEditRes.ref = val; _markComponentsDirty(); }
        } else if (_pendingNewRes) {
          const { d1, d2, dist_px, dist_mm, orient } = _pendingNewRes;
          const cx = Math.round((d1.cx + d2.cx) / 2);
          const cy = Math.round((d1.cy + d2.cy) / 2);
          const poly = rectPolyJs(cx, cy, dist_px, orient, 35, 8);
          const comps = state.componentsData.components;
          const maxId = Math.max(0, ...comps.filter(c => c.comp_type === "RES").map(c => c.res_id || 0));
          const newId = maxId + 1;
          const newRes = {
            id: `RES_${newId}`, comp_type: "RES", ref: val || "", orient, poly,
            cx, cy, dist_px, dist_mm, d1: d1.id, d2: d2.id, res_id: newId,
            pins: [{ n: 1, drill_id: d1.id, cx: d1.cx, cy: d1.cy }, { n: 2, drill_id: d2.id, cx: d2.cx, cy: d2.cy }],
          };
          comps.push(newRes);
          _markComponentsDirty();
        } else if (_pendingNewCap) {
          const { d1, d2, dist_px, dist_mm, orient } = _pendingNewCap;
          const cx = Math.round((d1.cx + d2.cx) / 2);
          const cy = Math.round((d1.cy + d2.cy) / 2);
          const poly = rectPolyJs(cx, cy, dist_px, orient, 38, 12);
          const comps = state.componentsData.components;
          const maxId = Math.max(0, ...comps.filter(c => c.comp_type === "CAP").map(c => c.cap_id || 0));
          const newId = maxId + 1;
          const newCap = {
            id: `CAP_${newId}`, comp_type: "CAP", ref: val || "", type: "manual", poly,
            cx, cy, dist_px, dist_mm, d1: d1.id, d2: d2.id, cap_id: newId,
            pins: [{ n: "+", drill_id: d1.id, cx: d1.cx, cy: d1.cy }, { n: "-", drill_id: d2.id, cx: d2.cx, cy: d2.cy }],
          };
          comps.push(newCap);
          _markComponentsDirty();
        } else if (_currentEditDio) {
          if (val) {
            _currentEditDio.ref = val;
            _markComponentsDirty();
          }
        } else if (_pendingNewDio) {
          const { d1, d2, dist_px, dist_mm, orient, direction } = _pendingNewDio;
          const cx = Math.round((d1.cx + d2.cx) / 2);
          const cy = Math.round((d1.cy + d2.cy) / 2);
          const poly = rectPolyJs(cx, cy, dist_px, orient, 35, 8);
          const comps = state.componentsData.components;
          const maxId = Math.max(0, ...comps.filter(c => c.comp_type === "DIO").map(c => c.dio_id || 0));
          const newId = maxId + 1;
          const [pinA, pinK] = direction >= 0 ? [d1, d2] : [d2, d1];
          const newDio = {
            id: `DIO_${newId}`, comp_type: "DIO", ref: val || "", orient, direction, poly,
            cx, cy, dist_px, dist_mm, d1: d1.id, d2: d2.id, dio_id: newId,
            pins: [{ n: "A", drill_id: pinA.id, cx: pinA.cx, cy: pinA.cy }, { n: "K", drill_id: pinK.id, cx: pinK.cx, cy: pinK.cy }],
          };
          comps.push(newDio);
          _markComponentsDirty();
        }
        closeCapRefEditor();
        _drillDirty = true;
        render();
      }
      capRefOk.addEventListener("click", confirmCapRef);

      // ── Save unificado de components.json ──────────────────────────────────
      const saveComponentsBtn = (() => {
        // Reutilizamos saveCapsBtn como botón principal de componentes
        const btn = saveCapsBtn;
        btn.title = "Guardar components.json";
        return btn;
      })();
      let _componentsFileHandle = null;

      function _markComponentsDirty() {
        state.componentsDirty = true;
        saveComponentsBtn.innerHTML = _componentsFileHandle
          ? '<i class="ti ti-device-floppy"></i>'
          : '<i class="ti ti-download"></i>';
        saveComponentsBtn.style.display = "inline-block";

      async function saveComponentsToFile() {
        if (!state.componentsData) return;
        // Serializar sin campos derivados (cx, cy, dist_px, dist_mm, d1, d2, *_id)
        const cleanComps = state.componentsData.components.map(c => {
          const { cx, cy, dist_px, dist_mm, d1, d2, cap_id, res_id, dio_id, ...rest } = c;
          return rest;
        });
        const json = JSON.stringify({ ...state.componentsData, components: cleanComps }, null, 2);
        if (window.showOpenFilePicker) {
          try {
            if (!_componentsFileHandle) {
              saveComponentsBtn.innerHTML = '<i class="ti ti-folder-open"></i>';
              const [handle] = await window.showOpenFilePicker({
                types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
                multiple: false,
              });
              _componentsFileHandle = handle;
            }
            const writable = await _componentsFileHandle.createWritable();
            await writable.write(json);
            await writable.close();
            state.componentsDirty = false;
            saveComponentsBtn.innerHTML = '<i class="ti ti-check"></i>';
            saveComponentsBtn.style.background = "#2e7d55";
            setTimeout(() => {
              saveComponentsBtn.innerHTML = '<i class="ti ti-device-floppy"></i>';
              saveComponentsBtn.style.background = "";
              if (!state.componentsDirty) saveComponentsBtn.style.display = "none";
            }, 1800);
          } catch (e) {
            _componentsFileHandle = null;
            saveComponentsBtn.innerHTML = '<i class="ti ti-download"></i>';
            if (e.name !== "AbortError") console.error("Error guardando components:", e);
          }
        } else {
          // Fallback: descarga
          const blob = new Blob([json], { type: "application/json" });
          const url  = URL.createObjectURL(blob);
          const a    = document.createElement("a");
          a.href = url;
          a.download = "components.json";
          a.click();
          URL.revokeObjectURL(url);
          state.componentsDirty = false;
          saveComponentsBtn.style.display = "none";
        }
      }

      function handleTrnDrillTap(el, clientX, clientY) {
        const drillId = parseInt(el.dataset.drillId);
        const cx = parseFloat(el.getAttribute("cx"));
        const cy = parseFloat(el.getAttribute("cy"));
        // Deseleccionar si ya estaba
        const existing = _trnPendingDrills.findIndex(d => d.id === drillId);
        if (existing >= 0) {
          _trnPendingDrills.splice(existing, 1);
          _drillDirty = true;
          render();
          return;
        }
        _trnPendingDrills.push({ id: drillId, cx, cy });
        _drillDirty = true;
        if (_trnPendingDrills.length === 3) {
          render();
          openTrnNewPanel(_trnPendingDrills, clientX, clientY);
        } else {
          render();
        }
      }

      trnNewOk.addEventListener("click", confirmTrnNew);
      trnNewCancel.addEventListener("click", closeTrnNewPanel);
      trnNewRef.addEventListener("keydown", e => {
        if (e.key === "Enter")  { e.preventDefault(); confirmTrnNew(); }
        if (e.key === "Escape") { e.preventDefault(); closeTrnNewPanel(); }
      });
      trnEditOk.addEventListener("click", confirmTrnEdit);
      trnEditCancel.addEventListener("click", closeTrnEditPanel);
      trnEditRef.addEventListener("keydown", e => {
        if (e.key === "Enter")  { e.preventDefault(); confirmTrnEdit(); }
        if (e.key === "Escape") { e.preventDefault(); closeTrnEditPanel(); }
      });

      saveTrnBtn.style.display = "none";
      saveTrnBtn.addEventListener("click", saveComponentsToFile);
      trnToggle.addEventListener("click", () => {
        trnToggle.classList.toggle("is-active");
        _drillDirty = true;
        state.showTrn = trnToggle.classList.contains("is-active");
        render();
      });
      // --- Fin transistores ---

      indToggle.addEventListener("click", () => {
        indToggle.classList.toggle("is-active");
        state.showInd = indToggle.classList.contains("is-active");
        _drillDirty = true;
        render();
      });
      xtalToggle.addEventListener("click", () => {
        xtalToggle.classList.toggle("is-active");
        state.showXtal = xtalToggle.classList.contains("is-active");
        _drillDirty = true;
        render();
      });
      jpToggle.addEventListener("click", () => {
        jpToggle.classList.toggle("is-active");
        state.showJp = jpToggle.classList.contains("is-active");
        _drillDirty = true;
        render();
      });
      relayToggle.addEventListener("click", () => {
        relayToggle.classList.toggle("is-active");
        state.showRelay = relayToggle.classList.contains("is-active");
        _drillDirty = true;
        render();
      });

      cursorGuidesToggle.addEventListener("click", () => {
        cursorGuidesToggle.classList.toggle("is-active");
        state.showCursorGuides = cursorGuidesToggle.classList.contains("is-active");
        if (state.showCursorGuides && state.cursorInsideViewer) {
          updateCursorGuides(state.cursorGuideX, state.cursorGuideY);
        } else {
          hideCursorGuides();
        }
      });
      saveIcAnnotationButton.addEventListener("click", saveIcAnnotation);
      if (exportIcAnnotationsButton) exportIcAnnotationsButton.addEventListener("click", saveComponentsToFile);
      // ic annotations y drill_overrides eliminados — todo en components.json
      icRefInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          saveIcAnnotation();
        }
      });
      icPartInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          saveIcAnnotation();
        }
      });
      finishTraceButton.addEventListener("click", finishDraft);
      undoPointButton.addEventListener("click", undoDraftPoint);
      deleteTraceButton.addEventListener("click", deleteSelectedTrace);
      exportTracesButton.addEventListener("click", (e) => exportTraces(e.shiftKey));
      importTracesButton.addEventListener("click", () => traceFileInput.click());
      traceFileInput.addEventListener("change", () => {
        const [file] = traceFileInput.files;
        if (file) {
          importTraces(file);
        }
        traceFileInput.value = "";
      });
      window.addEventListener("keydown", (event) => {
        if (event.target instanceof HTMLInputElement || event.target instanceof HTMLSelectElement) {
          return;
        }
        if (event.key === "Enter") {
          finishDraft();
        } else if (event.key === "Escape") {
          state.draftTrace = null;
          state.movingPoint = null;
          render();
        } else if (event.key === "Delete" || event.key === "Backspace") {
          deleteSelectedTrace();
        } else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "z") {
          undoDraftPoint();
        } else if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          exportTraces(event.shiftKey);
        }
      });
      window.traceEditor = {
        state,
        addPoint: (point) => addDraftPoint(point),
        finish: finishDraft,
        undo: undoDraftPoint,
        deleteSelected: deleteSelectedTrace,
        render,
      };
      document.querySelector("#zoom-in-nav").addEventListener("click", () => setZoom(state.zoom * 1.4));
      document.querySelector("#zoom-out-nav").addEventListener("click", () => setZoom(state.zoom / 1.4));
      document.querySelector("#fit-nav").addEventListener("click", fitToScreen);
      document.querySelector("#one-nav").addEventListener("click", () => setZoom(1));
      window.addEventListener("resize", render);

      fetch('project.json').then(r => r.ok ? r.json() : {}).catch(() => ({})).then(project => {
        const name = project?.name || 'PCB Reverser';
        document.title = `Editor de pistas — ${name}`;
        const navName = document.getElementById('nav-project-name');
        if (navName) navName.textContent = name;
      });

      Promise.all([
        fetch(assetUrl("tiles/manifest.json")).then((response) => {
          if (!response.ok) {
            throw new Error("tiles manifest missing");
          }
          return response.json();
        }),
        fetch(assetUrl("analysis_tiles/manifest.json")).then((response) => {
          if (!response.ok) {
            throw new Error("analysis manifest missing");
          }
          return response.json();
        }),
        fetch(assetUrl("data/components.json")).then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(assetUrl("data/traces.json")).then(r => r.ok ? r.json() : null).catch(() => null),
        fetch(assetUrl("data/graph/points.json")).then(r => r.ok ? r.json() : null).catch(() => null),
      ])
        .then(([manifest, analysisManifest, componentsRaw, tracesData, pointsData]) => {
          state.manifest = manifest;
          state.analysisManifest = analysisManifest;
          // graphPoints primero — pinCoords() y expandPointId() lo necesitan
          if (pointsData?.points) {
            state.graphPoints = new Map(pointsData.points.map(p => [p.id, p]));
          }
          state.componentsData = normalizeComponentsData(componentsRaw);
          refreshDrillData();
          if (tracesData) {
            state.traces = normalizeTraces(tracesData);
          }
          if (!manifest.boards.pcb_a || !manifest.boards.pcb_b) {
            state.mode = Object.keys(manifest.boards)[0];
            boardSelect.value = state.mode;
          }
          fitToScreen();
        })
        .catch((error) => {
          empty.hidden = false;
          const openedAsFile = window.location.protocol === "file:";
          empty.textContent = openedAsFile
            ? "Abri esta pagina desde http://localhost:4173/trace_editor.html, no como archivo local."
            : `No pude cargar tiles/manifest.json desde ${window.location.origin}.`;
          readout.textContent = openedAsFile ? "Abrir con servidor local" : "Faltan tiles";
          console.error(error);
        });
    </script>
  </body>
</html>
