<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editor de pistas — PCB Reverser</title>
    <style>
      :root {
        --ink: #17211f;
        --muted: #596561;
        --paper: #f7f7f2;
        --panel: #ffffff;
        --line: #d8ded9;
        --green: #176b58;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow: hidden;
        overscroll-behavior: none;
      }

      /* ── Nav superior fijo ── */
      .viewer-nav {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 52px;
        z-index: 30;
        background: var(--paper);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 16px;
      }
      .viewer-nav > * { flex-shrink: 0; }

      .viewer-nav-links {
        margin-left: auto;
        display: flex;
        gap: 18px;
      }
      .viewer-nav-links a {
        font-size: 14px;
        color: var(--muted);
        text-decoration: none;
      }
      .viewer-nav-links a:hover { color: var(--green); }

      /* ── Toolbar de edición (flotante debajo del nav) ── */
      .toolbar {
        position: fixed;
        top: 64px;
        left: 12px; right: 12px;
        z-index: 20;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        background: rgba(247, 247, 242, .96);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(16, 37, 32, .10);
        backdrop-filter: blur(12px);
      }

      .toolbar-sep {
        width: 1px;
        height: 26px;
        background: var(--line);
        align-self: center;
        flex-shrink: 0;
        margin: 0 2px;
      }

      .toolbar-group {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .tool-button {
        width: 38px;
        height: 46px;
        min-width: 38px;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        font-size: 17px;
        line-height: 1;
      }

      .tool-button .btn-lbl {
        font-size: 7.5px;
        font-weight: 700;
        line-height: 1;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        opacity: 0.65;
      }

      .tool-button.is-active .btn-lbl {
        opacity: 0.85;
      }

      .tool-button.is-active {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        color: inherit;
        flex-shrink: 0;
      }
      .brand-talent { height: 18px; width: auto; }
      .brand-msx    { height: 18px; width: auto; opacity: .75; }

      button,
      select {
        min-height: 34px;
        border: 1px solid var(--ink);
        border-radius: 5px;
        background: var(--panel);
        color: var(--ink);
        font: inherit;
        font-weight: 720;
      }

      button {
        min-width: 36px;
        padding: 5px 9px;
        cursor: pointer;
      }

      select {
        padding: 5px 8px;
      }

      .readout {
        color: var(--muted);
        font-family: "Courier New", monospace;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex-shrink: 1;
        min-width: 0;
      }

      .viewer {
        position: fixed;
        inset: 52px 0 0 0;
        overflow: hidden;
        background: #101715;
        cursor: grab;
        touch-action: none;
        overscroll-behavior: none;
        user-select: none;
      }

      .viewer.is-dragging {
        cursor: grabbing;
      }

      .viewer.is-editing {
        cursor: crosshair;
      }

      .viewer.is-moving-point {
        cursor: move;
      }

      .viewer.is-deleting-point {
        cursor: not-allowed;
      }

      .viewer.is-cutting-segment {
        cursor: crosshair;
      }

      .cursor-guide {
        position: fixed;
        z-index: 14;
        display: none;
        pointer-events: none;
        background: #fff;
        mix-blend-mode: difference;
      }

      .cursor-guide.is-visible {
        display: block;
      }

      .cursor-guide-x {
        left: 0;
        right: 0;
        height: 1px;
      }

      .cursor-guide-y {
        top: 0;
        bottom: 0;
        width: 1px;
      }

      html.is-panning,
      html.is-panning * {
        cursor: grabbing !important;
        user-select: none !important;
      }

      .world {
        position: absolute;
        left: 0;
        top: 0;
        transform-origin: 0 0;
      }

      .layer {
        position: absolute;
        inset: 0;
      }

      .drill-overlay,
      .trace-overlay {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .trace-overlay.is-editable {
        pointer-events: all;
      }

      .trace-line {
        fill: none;
        opacity: .72;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 2px rgba(0, 0, 0, .9));
      }

      .trace-line.side-a {
        stroke: rgba(255, 225, 64, .96);
      }

      .trace-line.side-b {
        stroke: rgba(255, 78, 190, .96);
      }

      .trace-line.is-selected {
        opacity: .95;
        filter:
          drop-shadow(0 0 2px rgba(0, 0, 0, .95))
          drop-shadow(0 0 6px rgba(255, 255, 255, .9));
      }

      .trace-line.is-net {
        opacity: .88;
        filter:
          drop-shadow(0 0 2px rgba(0, 0, 0, .95))
          drop-shadow(0 0 5px rgba(255, 255, 255, .68));
      }

      .trace-line.is-dimmed {
        opacity: .52;
      }

      .trace-handle {
        fill: #fff;
        stroke: #17211f;
        stroke-width: 1.5;
        pointer-events: all;
      }

      .trace-handle.is-connected {
        fill: #29d28f;
        stroke: #f7f7f2;
        filter: drop-shadow(0 0 4px rgba(41, 210, 143, .95));
      }

      .trace-handle.is-net {
        fill: #ffec5c;
        stroke: #1b1b15;
        filter: drop-shadow(0 0 5px rgba(255, 236, 92, .95));
      }

      .trace-preview {
        stroke-dasharray: 8 8;
        opacity: .85;
      }

      .drill-overlay circle {
        pointer-events: all;
      }

      .drill-via {
        fill: rgba(255, 132, 59, .22);
        stroke: rgba(255, 132, 59, .95);
        stroke-width: 1.4;
      }

      .ic-bbox {
        fill: rgba(0, 194, 255, .08);
        stroke: rgba(0, 194, 255, .7);
        stroke-width: 1.5;
        stroke-dasharray: 6 3;
        pointer-events: all;
        cursor: default;
      }

      .ic-bbox-label {
        font-size: 18px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        text-anchor: middle;
        dominant-baseline: alphabetic;
        fill: rgba(0, 194, 255, .9);
        pointer-events: none;
        user-select: none;
      }

      .drill-ic {
        fill: rgba(0, 194, 255, .22);
        stroke: rgba(0, 194, 255, .96);
        stroke-width: 1.4;
      }

      .drill-con {
        fill: rgba(255, 218, 77, .24);
        stroke: rgba(255, 218, 77, .96);
        stroke-width: 1.5;
      }

      .con-bbox {
        fill: rgba(255, 218, 77, .18);
        stroke: rgba(255, 218, 77, .95);
        stroke-width: 2;
        stroke-dasharray: 8 4;
        pointer-events: all;
        cursor: default;
      }
      .con-bbox-label, .con50-bbox-label {
        font-size: 22px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        text-anchor: middle;
        dominant-baseline: alphabetic;
        pointer-events: none;
        user-select: none;
      }
      .con-bbox-label   { fill: rgba(255, 200, 50, 1); }
      .con50-a-bbox     { fill: rgba(190, 96, 255, .18); stroke: rgba(190, 96, 255, .95);
                          stroke-width: 2; stroke-dasharray: 8 4;
                          pointer-events: all; cursor: default; }
      .con50-a-bbox-label { fill: rgba(190, 96, 255, 1); }
      .con50-b-bbox     { fill: rgba(210, 218, 224, .18); stroke: rgba(210, 218, 224, .95);
                          stroke-width: 2; stroke-dasharray: 8 4;
                          pointer-events: all; cursor: default; }
      .con50-b-bbox-label { fill: rgba(210, 218, 224, 1); }

      .drill-con50-a {
        fill: rgba(190, 96, 255, .22);
        stroke: rgba(190, 96, 255, .96);
        stroke-width: 1.5;
      }

      .drill-con50-b {
        fill: rgba(210, 218, 224, .22);
        stroke: rgba(210, 218, 224, .96);
        stroke-width: 1.5;
      }

      .tile {
        position: absolute;
        display: block;
        width: 512px;
        height: 512px;
        background: #202927;
        image-rendering: auto;
        pointer-events: none;
        user-select: none;
      }

      .help {
        color: var(--muted);
        font-size: 13px;
      }

      #opacity-control {
        display: none;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 720;
      }

      #opacity-control.is-visible {
        display: inline-flex;
      }

      #opacity-control input {
        width: 120px;
      }


      .editor-control {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 720;
      }

      .editor-control input[type="number"] {
        width: 64px;
        min-height: 34px;
        border: 1px solid var(--ink);
        border-radius: 5px;
        padding: 5px 7px;
        font: inherit;
        font-weight: 720;
      }

      .ic-annotation-panel {
        position: fixed;
        left: 12px;
        bottom: 12px;
        z-index: 18;
        display: none;
        align-items: center;
        gap: 8px;
        max-width: calc(100vw - 24px);
        padding: 10px;
        background: rgba(247, 247, 242, .94);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 40px rgba(16, 37, 32, .12);
        backdrop-filter: blur(12px);
      }

      .ic-annotation-panel.is-visible {
        display: flex;
      }

      .ic-annotation-panel input {
        width: 120px;
        min-height: 34px;
        border: 1px solid var(--ink);
        border-radius: 5px;
        padding: 5px 7px;
        font: inherit;
        font-weight: 720;
      }

      .ic-selected-label {
        min-width: 70px;
        font-family: "Courier New", monospace;
        font-size: 13px;
        color: var(--muted);
      }

      .drill-edit-panel {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 18;
        display: none;
        align-items: center;
        gap: 8px;
        max-width: calc(100vw - 24px);
        padding: 10px;
        background: rgba(247, 247, 242, .94);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 40px rgba(16, 37, 32, .12);
        backdrop-filter: blur(12px);
      }

      .drill-edit-panel.is-visible {
        display: flex;
      }

      .drill-edit-panel input {
        width: 72px;
        min-height: 34px;
        border: 1px solid var(--ink);
        border-radius: 5px;
        padding: 5px 7px;
        font: inherit;
        font-weight: 720;
      }

      .empty {
        position: fixed;
        inset: 0;
        display: none;
        place-items: center;
        color: #f7f7f2;
        pointer-events: none;
        user-select: none;
      }

      @media (max-width: 720px) {
        .toolbar {
          align-items: stretch;
          flex-direction: column;
          right: auto;
          width: min(360px, calc(100vw - 24px));
        }

        .readout {
          min-width: 0;
        }
      }

      .cap-footprint {
        fill: rgba(255, 220, 0, .25);
        stroke: rgba(255, 210, 0, 1);
        stroke-width: 2.5;
        stroke-linejoin: round;
        pointer-events: all;
        cursor: default;
      }

      .cap-unref-marker {
        cursor: pointer;
        pointer-events: all;
      }
      .cap-unref-marker circle {
        fill: rgba(220, 50, 0, .85);
        stroke: white;
        stroke-width: 1.5;
      }
      .cap-unref-marker text {
        fill: white;
        font-size: 18px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
        user-select: none;
      }

      .rnet-bbox-label {
        font-size: 18px;
        font-weight: 700;
        font-family: "Courier New", monospace;
        text-anchor: middle;
        dominant-baseline: alphabetic;
        pointer-events: none;
        user-select: none;
        fill: rgba(255, 120, 0, 1);
      }

      .res-footprint {
        fill: rgba(255, 140, 0, .20);
        stroke: rgba(255, 120, 0, 1);
        stroke-width: 2.5;
        stroke-linejoin: round;
        pointer-events: all;
        cursor: default;
      }

      .res-unref-marker {
        cursor: pointer;
        pointer-events: all;
      }
      .res-unref-marker circle {
        fill: rgba(200, 80, 0, .85);
        stroke: white;
        stroke-width: 1.5;
      }
      .res-unref-marker text {
        fill: white;
        font-size: 18px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
        user-select: none;
      }

      .res-drill-pending {
        fill: rgba(255, 120, 0, .35);
        stroke: rgba(255, 80, 0, 1);
        stroke-width: 3;
        stroke-dasharray: 6 4;
        pointer-events: none;
      }

      .cap-drill-pending {
        fill: rgba(255, 220, 0, .35);
        stroke: rgba(200, 160, 0, 1);
        stroke-width: 3;
        stroke-dasharray: 6 4;
        pointer-events: none;
      }

      .dio-footprint {
        fill: rgba(60, 160, 255, .18);
        stroke: rgba(30, 120, 255, 1);
        stroke-width: 2.5;
        stroke-linejoin: round;
        pointer-events: all;
        cursor: default;
      }

      .dio-unref-marker {
        cursor: pointer;
        pointer-events: all;
      }
      .dio-unref-marker circle {
        fill: rgba(20, 80, 200, .85);
        stroke: white;
        stroke-width: 1.5;
      }
      .dio-unref-marker text {
        fill: white;
        font-size: 18px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
        user-select: none;
      }

      .dio-drill-pending {
        fill: rgba(60, 160, 255, .35);
        stroke: rgba(30, 120, 255, 1);
        stroke-width: 3;
        stroke-dasharray: 6 4;
        pointer-events: none;
      }

      .dio-arrow {
        fill: rgba(30, 120, 255, .75);
        pointer-events: none;
      }

      /* ── Transistores ── */
      .trn-footprint { fill: rgba(180,120,255,.18); stroke: #a060f0; stroke-width: 1.5; }
      .trn-pin-label { font-size: 18px; font-weight: 700; fill: #a060f0; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
      .ind-footprint  { fill: rgba(160,100,255,.15); stroke: #9060e0; stroke-width: 1.5; cursor: default; }
      .ind-label      { font-size: 18px; font-weight: 700; fill: #9060e0; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
      .xtal-footprint { fill: rgba(0,210,180,.15);  stroke: #00c8a0; stroke-width: 1.5; cursor: default; }
      .xtal-label     { font-size: 18px; font-weight: 700; fill: #00c8a0; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
      .jp-footprint   { fill: rgba(255,180,0,.15);  stroke: #e0a000; stroke-width: 1.5; cursor: default; }
      .jp-label       { font-size: 18px; font-weight: 700; fill: #e0a000; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
      .relay-footprint{ fill: rgba(255,80,80,.15);  stroke: #d04040; stroke-width: 1.5; cursor: default; }
      .relay-label    { font-size: 18px; font-weight: 700; fill: #d04040; pointer-events: none; text-anchor: middle; dominant-baseline: middle; }
      .drill-relay    { fill: rgba(255,80,80,.55);  stroke: #d04040; stroke-width: 1.5; }
      .trn-drill-pending { stroke: #a060f0 !important; stroke-width: 3 !important; }

      #trn-new-panel {
        display: none; position: fixed; z-index: 100;
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 8px; box-shadow: 0 8px 28px rgba(16,37,32,.18);
        padding: 12px 14px; flex-direction: column; gap: 10px; min-width: 210px;
      }
      #trn-new-panel .trn-label { font-size: 11px; color: var(--muted); }
      #trn-new-panel .trn-row { display: flex; gap: 6px; align-items: center; }
      #trn-new-panel select, #trn-new-panel input[type=text] {
        flex: 1; padding: 5px 8px; font-size: 14px; font-weight: 600;
        border: 1px solid var(--line); border-radius: 5px; outline: none;
        background: var(--panel); color: var(--fg);
      }
      #trn-new-panel input[type=text] { text-transform: uppercase; width: 80px; }
      #trn-new-panel input[type=text]:focus,
      #trn-new-panel select:focus { border-color: #a060f0; }

      #trn-edit-panel {
        display: none; position: fixed; z-index: 100;
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 8px; box-shadow: 0 8px 28px rgba(16,37,32,.18);
        padding: 12px 14px; flex-direction: column; gap: 10px; min-width: 230px;
      }
      #trn-edit-panel .trn-label { font-size: 11px; color: var(--muted); }
      #trn-edit-panel .trn-row { display: flex; gap: 6px; align-items: center; }
      #trn-edit-panel .trn-pin-row { display: flex; gap: 6px; align-items: center; font-size: 12px; }
      #trn-edit-panel .trn-pin-row select {
        flex: 1; padding: 4px 6px; font-size: 13px; font-weight: 600;
        border: 1px solid var(--line); border-radius: 5px; outline: none;
        background: var(--panel); color: var(--fg);
      }
      #trn-edit-panel .trn-pin-row select:focus { border-color: #a060f0; }
      #trn-edit-panel input[type=text] {
        flex: 1; padding: 5px 8px; font-size: 14px; font-weight: 600;
        border: 1px solid var(--line); border-radius: 5px; outline: none;
        background: var(--panel); color: var(--fg); text-transform: uppercase; width: 80px;
      }
      #trn-edit-panel input[type=text]:focus { border-color: #a060f0; }
      #trn-edit-panel select.trn-type-sel {
        flex: 1; padding: 5px 8px; font-size: 13px; font-weight: 600;
        border: 1px solid var(--line); border-radius: 5px; outline: none;
        background: var(--panel); color: var(--fg);
      }

      #cap-ref-editor {
        display: none;
        position: fixed;
        z-index: 100;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 8px 28px rgba(16,37,32,.18);
        padding: 10px 12px;
        flex-direction: column;
        gap: 8px;
        min-width: 180px;
      }
      #cap-ref-editor .cre-label {
        font-size: 11px;
        color: var(--muted);
      }
      #cap-ref-editor .cre-row {
        display: flex;
        gap: 6px;
        align-items: center;
      }
      #cap-ref-input {
        flex: 1;
        padding: 5px 8px;
        font-size: 14px;
        font-weight: 600;
        border: 1px solid var(--line);
        border-radius: 5px;
        outline: none;
        width: 90px;
        text-transform: uppercase;
      }
      #cap-ref-input:focus { border-color: var(--green); }
      .cre-btn {
        padding: 5px 9px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
      }
      #cap-ref-ok     { background: var(--green); color: white; }
      #cap-ref-cancel { background: var(--line); color: var(--ink); }

      #save-caps-btn,
      #save-res-btn,
      #save-dio-btn {
        display: none;
        padding: 4px 6px;
        min-height: unset;
        font-size: 14px;
        background: var(--green);
        color: white;
        border-color: var(--green);
        cursor: pointer;
      }
      #con-pin-panel {
        display: none;
        align-items: center;
        gap: 6px;
      }
      #con-pin-next-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 720;
        white-space: nowrap;
      }
      #con-add-pin-btn.is-active,
      #con-add-pin-btn.is-active:hover {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      #save-drill-btn {
        display: none;
        background: var(--green);
        color: white;
        border-color: var(--green);
      }
      .viewer.con-pin-mode { cursor: crosshair; }
      /* ── Tabler Icons size normalisation ─────────────────────────── */
      .ti {
        font-size: 18px;
        line-height: 1;
        display: inline-block;
      }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  </head>
  <body>
    <div class="viewer" id="viewer" aria-label="Navegador de motherboard por tiles">
      <div class="world" id="world">
        <div class="layer" id="layer-a"></div>
        <div class="layer" id="layer-b"></div>
        <div class="layer" id="layer-silk"></div>
      </div>
      <svg class="drill-overlay" id="drill-overlay" aria-hidden="true"></svg>
      <svg class="trace-overlay" id="trace-overlay" aria-label="Pistas vectoriales editables"></svg>
      <svg class="drill-overlay" id="cap-markers-overlay" aria-hidden="true"></svg>

    <script>
      const viewer = document.querySelector("#viewer");
      const world = document.querySelector("#world");
      const layerA = document.querySelector("#layer-a");
      const layerB = document.querySelector("#layer-b");
      const layerSilk = document.querySelector("#layer-silk");

      const resMarkersOverlay = document.querySelector("#res-markers-overlay");
      const dioToggle = document.querySelector("#dio-toggle");
      const saveDioBtn = document.querySelector("#save-dio-btn");
      const dioMarkersOverlay = document.querySelector("#dio-markers-overlay");
      const trnToggle = document.querySelector("#trn-toggle");
      const saveTrnBtn = document.querySelector("#save-trn-btn");
      const indToggle   = document.querySelector("#ind-toggle");
      const xtalToggle  = document.querySelector("#xtal-toggle");
      const jpToggle    = document.querySelector("#jp-toggle");
      const relayToggle = document.querySelector("#relay-toggle");
      const trnMarkersOverlay = document.querySelector("#trn-markers-overlay") || (() => {
        const el = document.createElementNS("http://www.w3.org/2000/svg", "g");
        el.id = "trn-markers-overlay";
        document.querySelector("#trace-overlay")?.parentNode?.appendChild(el);
        return el;
      })();
      const trnNewPanel   = document.querySelector("#trn-new-panel");
      const trnNewLabel   = document.querySelector("#trn-new-label");
      const trnNewRef     = document.querySelector("#trn-new-ref");
      const trnNewType    = document.querySelector("#trn-new-type");
      const trnNewOk      = document.querySelector("#trn-new-ok");
      const trnNewCancel  = document.querySelector("#trn-new-cancel");
      const trnEditPanel  = document.querySelector("#trn-edit-panel");
      const trnEditLabel  = document.querySelector("#trn-edit-label");
      const trnEditRef    = document.querySelector("#trn-edit-ref");
      const trnEditType   = document.querySelector("#trn-edit-type");
      const trnEditP1     = document.querySelector("#trn-edit-p1");
      const trnEditP2     = document.querySelector("#trn-edit-p2");
      const trnEditP3     = document.querySelector("#trn-edit-p3");
      const trnEditP1Lbl  = document.querySelector("#trn-edit-p1-lbl");
      const trnEditP2Lbl  = document.querySelector("#trn-edit-p2-lbl");
      const trnEditP3Lbl  = document.querySelector("#trn-edit-p3-lbl");
      const trnEditOk     = document.querySelector("#trn-edit-ok");
      const trnEditCancel = document.querySelector("#trn-edit-cancel");
      const conAddPinBtn   = document.querySelector("#con-add-pin-btn");
      const conPinPanel    = document.querySelector("#con-pin-panel");
      const conPinSelect   = document.querySelector("#con-pin-select");
      const conPinNextLbl  = document.querySelector("#con-pin-next-label");
      const conPinUndoBtn  = document.querySelector("#con-pin-undo-btn");
      const conPinCancelBtn = document.querySelector("#con-pin-cancel-btn");
      const saveDrillBtn   = document.querySelector("#save-drill-btn");
      const capRefEditor = document.querySelector("#cap-ref-editor");
      const capRefLabel = document.querySelector("#cap-ref-label");
      const capRefInput = document.querySelector("#cap-ref-input");
      const capRefOk = document.querySelector("#cap-ref-ok");
      const capRefCancel = document.querySelector("#cap-ref-cancel");
      // _currentEdit* — solo uno activo a la vez (edición de ref existente)
      let _currentEditCap = null;
      let _currentEditRes = null;
      let _currentEditDio = null;
      // _pendingNew* — creación de nuevo componente (dos taladros seleccionados)
      let _pendingNewRes = null;
      let _pendingNewCap = null;
      let _pendingNewDio = null;
      // _*PendingDrill — primer taladro seleccionado esperando el segundo
      let _resPendingDrill = null;
      let _capPendingDrill = null;
      let _dioPendingDrill = null;
      const toolButtons = Array.from(document.querySelectorAll(".tool-button[data-tool]"));
      const traceSideSelect = document.querySelector("#trace-side");
      const traceWidthInput = document.querySelector("#trace-width");
      const finishTraceButton = document.querySelector("#finish-trace");
      const undoPointButton = document.querySelector("#undo-point");
      const deleteTraceButton = document.querySelector("#delete-trace");
      const exportTracesButton = document.querySelector("#export-traces");
      const importTracesButton = document.querySelector("#import-traces");
      const traceFileInput = document.querySelector("#trace-file");
      const icAnnotationPanel = document.querySelector("#ic-annotation-panel");
      const icSelectedLabel = document.querySelector("#ic-selected-label");
      const icRefInput = document.querySelector("#ic-ref");
      const icPartInput = document.querySelector("#ic-part");
      const saveIcAnnotationButton = document.querySelector("#save-ic-annotation");
      const exportIcAnnotationsButton = document.querySelector("#export-ic-annotations");
      const drillEditPanel = document.querySelector("#drill-edit-panel");
      const drillAddStatus = document.querySelector("#drill-add-status");
      const readout = document.querySelector("#readout");
      const empty = document.querySelector("#empty");
      const cacheToken = window.location.search;

      function assetUrl(path) {
        return cacheToken ? `${path}${cacheToken}` : path;
      }

      let _rafId = null;
      let _drillDirty = true;
      let _traceDirty = true;

      const state = {
        manifest: null,
        analysisManifest: null,
        componentsData: null,   // data/components.json (fuente de verdad)
        graphPoints: new Map(), // data/graph/points.json — id → Point
        snapNodes: [],
        componentsDirty: false,
        mode: "pcb_a",
        showSilkscreen: false,
        showVias: false,
        showICs: false,
        showConnectors: false,
        showLargeConnectors: false,
        showCursorGuides: false,
        showCaps: false,
        showRes: false,
        showDio: false,
        showTrn: false,
        showInd: false,
        showXtal: false,
        showJp: false,
        showRelay: false,
        conPinMode: false,
        conPinTargetId: null,
        conPinNextNum: 1,
        drillDirty: false,
        cursorGuideX: 0,
        cursorGuideY: 0,
        cursorInsideViewer: false,
        editMode: "pan",
        traces: [],
        selectedIcId: null,
        draftTrace: null,
        selectedTraceId: null,
        netByTrace: new Map(),
        tracesByNet: new Map(),
        movingPoint: null,
        x: 0,
        y: 0,
        zoom: 1,
        level: 0,
        dragging: false,
        dragStart: null,
        hoverStatus: "",
        tiles: new Map()
      };
      window.traceEditorState = state;

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function board() {
        return state.manifest.boards.pcb_a;
      }

      function levelInfo() {
        return board().levels[state.level];
      }

      function chooseLevel() {
        const levels = board().levels;
        let best = levels[0];
        let bestScore = Infinity;
        for (const level of levels) {
          const levelScreenScale = state.zoom / level.scale;
          const score = Math.abs(Math.log2(levelScreenScale));
          if (score < bestScore) {
            best = level;
            bestScore = score;
          }
        }
        state.level = best.level;
      }

      // Convert viewport-relative client coords → viewer-element-relative
      function toViewer(clientX, clientY) {
        const r = viewer.getBoundingClientRect();
        return { x: clientX - r.left, y: clientY - r.top };
      }

      function setZoom(nextZoom, anchorClientX, anchorClientY) {
        const oldZoom = state.zoom;
        const minZoom = Math.min(viewer.clientWidth / board().width, viewer.clientHeight / board().height) * 0.85;
        const maxZoom = 4;
        const zoom = clamp(nextZoom, minZoom, maxZoom);
        const anchorX = anchorClientX !== undefined ? toViewer(anchorClientX, 0).x : viewer.clientWidth  / 2;
        const anchorY = anchorClientY !== undefined ? toViewer(0, anchorClientY).y : viewer.clientHeight / 2;
        const imageX = (anchorX - state.x) / oldZoom;
        const imageY = (anchorY - state.y) / oldZoom;
        state.x = anchorX - imageX * zoom;
        state.y = anchorY - imageY * zoom;
        state.zoom = zoom;
        render();
      }

      function fitToScreen() {
        const b = board();
        state.zoom = Math.min(viewer.clientWidth / b.width, viewer.clientHeight / b.height) * 0.92;
        state.x = (viewer.clientWidth - b.width * state.zoom) / 2;
        state.y = (viewer.clientHeight - b.height * state.zoom) / 2;
        render();
      }

      function clearTiles() {
        state.tiles.clear();
        layerA.replaceChildren();
        layerB.replaceChildren();
        layerSilk.replaceChildren();
      }

      function activeBoards() {
        if (state.mode === "overlay") {
          return ["pcb_a", "pcb_b"];
        }
        return [state.mode];
      }

      function tileKey(boardId, level, col, row) {
        return `${boardId}/${level}/${col}/${row}`;
      }

      function layerForBoard(boardId) {
        return boardId === "pcb_b" ? layerB : layerA;
      }

      function tileSource(boardId, level, col, row) {
        if (boardId === "a_silk") {
          return assetUrl(`analysis_tiles/a_silk/${level}/${col}_${row}.jpg`);
        }
        return assetUrl(`tiles/${boardId}/${level}/${col}_${row}.jpg`);
      }

      function ensureTile(boardId, level, col, row) {
        const key = tileKey(boardId, level, col, row);
        if (state.tiles.has(key)) {
          return state.tiles.get(key);
        }

        const tile = document.createElement("img");
        tile.className = "tile";
        tile.draggable = false;
        tile.alt = "";
        tile.src = tileSource(boardId, level, col, row);
        tile.style.left = `${col * state.manifest.tileSize}px`;
        tile.style.top = `${row * state.manifest.tileSize}px`;
        if (boardId === "a_silk") {
          layerSilk.append(tile);
        } else {
          layerForBoard(boardId).append(tile);
        }
        state.tiles.set(key, tile);
        return tile;
      }

      function drillLayersEnabled() {
        return state.showVias || state.showICs || state.showConnectors || state.showLargeConnectors || state.showCaps || state.showRes || state.showDio || state.showInd || state.showXtal || state.showJp || state.showRelay;
      }

      function isPointVisible(point, bounds) {
        return point.cx >= bounds.left && point.cx <= bounds.right && point.cy >= bounds.top && point.cy <= bounds.bottom;
      }

      // ── Referencias de conectores (silkscreen) ──────────────────────────────
      // CONNECTOR_REFS eliminado — refs y notas ahora en data/components.json

      function appendConnectorBbox(parent, connector, label, rectClass, labelClass, note = '', pad = 22) {
        const pins = connector.pins || [];
        if (pins.length === 0) return;
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const p of pins) {
          minX = Math.min(minX, Number(p.cx)); minY = Math.min(minY, Number(p.cy));
          maxX = Math.max(maxX, Number(p.cx)); maxY = Math.max(maxY, Number(p.cy));
        }
        const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
        rect.setAttribute("x",      minX - pad);
        rect.setAttribute("y",      minY - pad);
        rect.setAttribute("width",  maxX - minX + pad * 2);
        rect.setAttribute("height", maxY - minY + pad * 2);
        rect.setAttribute("rx", 6);
        rect.classList.add(rectClass);
        rect.dataset.status = [label, note, `${pins.length} pines`].filter(Boolean).join('  ·  ');
        parent.append(rect);
        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", ((minX + maxX) / 2).toFixed(1));
        txt.setAttribute("y", (minY - pad - 5).toFixed(1));
        txt.textContent = label;
        txt.classList.add(labelClass);
        parent.append(txt);
      }

      function appendDrillCircle(parent, item, radius, className, label, data = {}) {
        const { cx, cy } = pinCoords(item);
        const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        circle.setAttribute("cx", cx.toFixed(2));
        circle.setAttribute("cy", cy.toFixed(2));
        circle.setAttribute("r", (radius || 10).toFixed(2));
        circle.setAttribute("class", className);
        circle.dataset.status = `${label}  x:${cx.toFixed(1)} y:${cy.toFixed(1)}`;
        for (const [key, value] of Object.entries(data)) {
          circle.dataset[key] = String(value);
        }
        if (label) {
          const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
          title.textContent = label;
          circle.append(title);
        }
        parent.append(circle);
      }

      function clientToImage(clientX, clientY) {
        const v = toViewer(clientX, clientY);
        return {
          x: (v.x - state.x) / state.zoom,
          y: (v.y - state.y) / state.zoom,
        };
      }

      function updateCursorGuides(clientX, clientY) {
        state.cursorGuideX = clientX;
        state.cursorGuideY = clientY;
        state.cursorInsideViewer = true;
        cursorGuideX.style.top = `${clientY}px`;
        cursorGuideY.style.left = `${clientX}px`;
        const visible = state.showCursorGuides && state.cursorInsideViewer;
        cursorGuideX.classList.toggle("is-visible", visible);
        cursorGuideY.classList.toggle("is-visible", visible);
      }

      function hideCursorGuides() {
        state.cursorInsideViewer = false;
        cursorGuideX.classList.remove("is-visible");
        cursorGuideY.classList.remove("is-visible");
      }

      function makeNode(kind, item, point, label) {
        return {
          kind,
          id: item.id,
          pin: point.pin ?? null,
          x: Number(point.cx),
          y: Number(point.cy),
          label,
        };
      }

      function buildSnapNodes(componentsData) {
        const nodes = [];
        for (const comp of componentsData?.components || []) {
          for (const pin of comp.pins || []) {
            const { cx, cy } = pinCoords(pin);
            nodes.push({
              x: cx, y: cy,
              kind: comp.comp_type === "VIA" ? "common_drill" : "component",
              id: comp.id,
              pin: pin.n,
              point_id: pin.point_id,
              label: comp.comp_type === "VIA"
                ? `Vía ${comp.id}`
                : `${comp.ref || comp.id} pin ${pin.n}`,
            });
          }
        }
        // Vías puras del grafo (layer AB sin componente)
        for (const [, pt] of state.graphPoints) {
          if (pt.layer !== "AB" || pt.comp_id) continue;
          nodes.push({
            x: pt.x, y: pt.y,
            kind: "common_drill",
            id: pt.id,
            pin: null,
            point_id: pt.id,
            label: `Vía ${pt.id}`,
          });
        }
        return nodes;
      }

      function icAnnotation(icId) {
        const comp = state.componentsData?.components?.find(c => c.id === `IC_${icId}`);
        return comp ? { ref: comp.ref || "", part: comp.part || "" } : {};
      }

      function icLabel(icId) {
        const ann = icAnnotation(icId);
        return [ann.ref, ann.part].filter(Boolean).join(" ") || `IC ${icId}`;
      }

      function selectIc(icId) {
        state.selectedIcId = icId ? String(icId) : null;
        const annotation = state.selectedIcId ? icAnnotation(state.selectedIcId) : {};
        icAnnotationPanel.classList.toggle("is-visible", Boolean(state.selectedIcId));
        icSelectedLabel.textContent = state.selectedIcId ? `IC ${state.selectedIcId}` : "IC -";
        icRefInput.value = annotation.ref || "";
        icPartInput.value = annotation.part || "";
      }

      function saveIcAnnotation() {
        if (!state.selectedIcId || !state.componentsData) return;
        const comp = state.componentsData.components.find(c => c.id === `IC_${state.selectedIcId}`);
        if (!comp) return;
        comp.ref  = icRefInput.value.trim();
        comp.part = icPartInput.value.trim();
        state.componentsDirty = true;
        saveComponentsBtn.innerHTML = _componentsFileHandle
          ? '<i class="ti ti-device-floppy"></i> Comp'
          : '<i class="ti ti-download"></i> Comp';
        saveComponentsBtn.style.display = "inline-block";
        _drillDirty = true;
        render();
      }

      // exportIcAnnotations ya no es necesario: los ref/part están en components.json

      const SCALE_MM_PER_PX = 0.042333;

      // Resuelve coordenadas de un pin desde graphPoints vía point_id.
      // Fallback a cx/cy para pines sin migrar (VIAs manuales nuevas).
      function pinCoords(pin) {
        if (pin.point_id) {
          const pt = state.graphPoints.get(pin.point_id);
          if (pt) return { cx: pt.x, cy: pt.y };
        }
        return { cx: Number(pin.cx ?? 0), cy: Number(pin.cy ?? 0) };
      }

      function normalizeComponentsData(data) {
        if (!data) return null;
        for (const comp of data.components || []) {
          const pins = comp.pins || [];
          const p0 = pins[0], p1 = pins[1];
          if (p0 && p1) {
            const c0 = pinCoords(p0), c1 = pinCoords(p1);
            comp.cx      = (c0.cx + c1.cx) / 2;
            comp.cy      = (c0.cy + c1.cy) / 2;
            const dpx    = Math.hypot(c1.cx - c0.cx, c1.cy - c0.cy);
            comp.dist_px = Math.round(dpx);
            comp.dist_mm = parseFloat((dpx * SCALE_MM_PER_PX).toFixed(2));
            comp.d1      = p0.drill_id;
            comp.d2      = p1.drill_id;
          }
          // IDs numéricos legacy
          if (comp.comp_type === "CAP") comp.cap_id = parseInt(comp.id.split("_")[1]);
          if (comp.comp_type === "RES") comp.res_id = parseInt(comp.id.split("_")[1]);
          if (comp.comp_type === "DIO") comp.dio_id = parseInt(comp.id.split("_")[1]);
          if (comp.comp_type === "TRN") {
            comp.trn_id = parseInt(comp.id.split("_")[1]);
            if (!comp.cx && pins.length) {
              const coords = pins.map(pinCoords);
              comp.cx = coords.reduce((s, c) => s + c.cx, 0) / pins.length;
              comp.cy = coords.reduce((s, c) => s + c.cy, 0) / pins.length;
            }
          }
        }
        return data;
      }

      function refreshDrillData() {
        state.snapNodes = buildSnapNodes(state.componentsData);
        _drillDirty = true;
      }

      function addManualDrill(point) {
        if (!state.componentsData) return;
        const newId = `via_${Date.now()}`;
        const cx = Math.round(point.x * 10) / 10;
        const cy = Math.round(point.y * 10) / 10;
        state.componentsData.components.push({
          id: newId, comp_type: "VIA", ref: "",
          pins: [{ n: 1, cx, cy }],  // cx/cy temporal hasta rebuild del grafo
        });
        state.snapNodes = buildSnapNodes(state.componentsData);
        _markComponentsDirty();
        drillAddStatus.textContent = `Via agregada en (${cx}, ${cy})`;
        _drillDirty = true;
        render();
      }

      function nearestSnapNode(point) {
        let best = null;
        let bestDistance = Infinity;
        for (const node of state.snapNodes) {
          const distance = Math.hypot(point.x - node.x, point.y - node.y);
          if (distance < bestDistance) {
            best = node;
            bestDistance = distance;
          }
        }
        return best && bestDistance <= 18 ? best : null;
      }

      function nearestTracePoint(point, options = {}) {
        let best = null;
        let bestDistance = Infinity;
        const threshold = options.threshold ?? 18;
        for (const trace of state.traces) {
          if (options.side && trace.side !== options.side) {
            continue;
          }
          if (options.excludeTraceId && trace.id === options.excludeTraceId) {
            continue;
          }
          trace.points.forEach((tracePoint, pointIndex) => {
            if (trace.id === options.excludePointTraceId && pointIndex === options.excludePointIndex) {
              return;
            }
            const distance = Math.hypot(point.x - tracePoint.x, point.y - tracePoint.y);
            if (distance < bestDistance) {
              best = { trace, point: tracePoint, pointIndex };
              bestDistance = distance;
            }
          });
        }
        return best && bestDistance <= threshold ? best : null;
      }

      function pointFromTraceSnap(snap) {
        return {
          x: Number(snap.point.x),
          y: Number(snap.point.y),
          ...(snap.point.node ? { node: structuredClone(snap.point.node) } : {}),
        };
      }

      function pointWithSnap(point, event, options = {}) {
        if (event?.altKey) {
          return { x: point.x, y: point.y };
        }
        const node = nearestSnapNode(point);
        const tracePoint = nearestTracePoint(point, options);
        if (node && tracePoint) {
          const nodeDistance = Math.hypot(point.x - node.x, point.y - node.y);
          const traceDistance = Math.hypot(point.x - tracePoint.point.x, point.y - tracePoint.point.y);
          return nodeDistance <= traceDistance ? {
            x: node.x,
            y: node.y,
            node: {
              kind: node.kind,
              id: node.id,
              pin: node.pin,
              label: node.label,
            },
          } : pointFromTraceSnap(tracePoint);
        }
        if (!node) {
          return tracePoint ? pointFromTraceSnap(tracePoint) : { x: point.x, y: point.y };
        }
        return {
          x: node.x,
          y: node.y,
          node: {
            kind: node.kind,
            id: node.id,
            pin: node.pin,
            label: node.label,
          },
        };
      }

      function cloneTracePoint(point) {
        return {
          x: Number(point.x),
          y: Number(point.y),
          ...(point.node ? { node: structuredClone(point.node) } : {}),
        };
      }

      function pointToLevel(point, info) {
        return {
          x: point.x * info.scale,
          y: point.y * info.scale,
        };
      }

      function nodeKey(node) {
        if (!node) {
          return null;
        }
        return `node:${node.kind || ""}:${node.id || ""}:${node.pin || ""}`;
      }

      function pointKey(point, side) {
        return `point:${side}:${Math.round(Number(point.x) * 10) / 10}:${Math.round(Number(point.y) * 10) / 10}`;
      }

      function selectedNetId() {
        return state.selectedTraceId ? state.netByTrace.get(state.selectedTraceId) : null;
      }

      function traceInSelectedNet(trace) {
        const netId = selectedNetId();
        return Boolean(netId && state.netByTrace.get(trace.id) === netId);
      }

      function traceClass(trace) {
        const side = trace.side === "B" ? "side-b" : "side-a";
        const selectedNet = selectedNetId();
        const inNet = traceInSelectedNet(trace);
        return [
          "trace-line",
          side,
          trace.id === state.selectedTraceId ? "is-selected" : "",
          inNet && trace.id !== state.selectedTraceId ? "is-net" : "",
          selectedNet && !inNet ? "is-dimmed" : "",
        ].filter(Boolean).join(" ");
      }

      function tracePoints(points) {
        return points.map((p) => `${Number(p.x).toFixed(2)},${Number(p.y).toFixed(2)}`).join(" ");
      }

      function createTracePolyline(trace, isPreview = false) {
        const polyline = document.createElementNS("http://www.w3.org/2000/svg", "polyline");
        polyline.setAttribute("points", tracePoints(trace.points));
        polyline.setAttribute("class", `${traceClass(trace)}${isPreview ? " trace-preview" : ""}`);
        polyline.setAttribute("stroke-width", String(Number(trace.width) || 12));
        polyline.dataset.traceId = trace.id;
        return polyline;
      }

      function createTraceHandle(trace, point, index) {
        const r = Math.max(4, 8 / state.zoom);
        const handle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        handle.setAttribute("cx", Number(point.x).toFixed(2));
        handle.setAttribute("cy", Number(point.y).toFixed(2));
        handle.setAttribute("r", r.toFixed(2));
        handle.setAttribute("class", [
          "trace-handle",
          point.node ? "is-connected" : "",
          traceInSelectedNet(trace) ? "is-net" : "",
        ].filter(Boolean).join(" "));
        handle.dataset.traceId = trace.id;
        handle.dataset.pointIndex = String(index);
        if (point.node?.label) {
          const title = document.createElementNS("http://www.w3.org/2000/svg", "title");
          title.textContent = point.node.label;
          handle.append(title);
        }
        return handle;
      }

      function renderTraceOverlay() {
        calculateNets();
        traceOverlay.replaceChildren();
        traceOverlay.classList.toggle("is-editable", state.editMode !== "pan");

        for (const trace of state.traces) {
          if (traceVisibleInMode(trace) && trace.points.length >= 2) {
            traceOverlay.append(createTracePolyline(trace));
          }
        }

        if (state.draftTrace && traceVisibleInMode(state.draftTrace)) {
          if (state.draftTrace.points.length >= 2) {
            traceOverlay.append(createTracePolyline(state.draftTrace, true));
          }
          state.draftTrace.points.forEach((point, index) => {
            traceOverlay.append(createTraceHandle(state.draftTrace, point, index));
          });
        }

        const netId = selectedNetId();
        const selectedTraces = netId
          ? state.tracesByNet.get(netId) || []
          : state.traces.filter((trace) => trace.id === state.selectedTraceId);
        for (const trace of selectedTraces) {
          if (!traceVisibleInMode(trace)) {
            continue;
          }
          trace.points.forEach((point, index) => {
            traceOverlay.append(createTraceHandle(trace, point, index));
          });
        }
      }

      function traceId() {
        return `T${String(Date.now()).slice(-8)}${String(Math.floor(Math.random() * 1000)).padStart(3, "0")}`;
      }

      function selectedTrace() {
        return state.traces.find((trace) => trace.id === state.selectedTraceId) || null;
      }

      function currentEditSide() {
        return traceSideSelect.value === "B" ? "B" : "A";
      }

      function editableTraces() {
        const side = currentEditSide();
        return state.traces.filter((trace) => trace.side === side);
      }

      function traceIsEditable(trace) {
        return Boolean(trace && trace.side === currentEditSide());
      }

      function traceVisibleInMode(trace) {
        if (state.mode === "pcb_a") {
          return trace.side !== "B";
        }
        if (state.mode === "pcb_b") {
          return trace.side === "B";
        }
        return true;
      }

      function currentTraceWidth() {
        return Number(traceWidthInput.value) || 12;
      }

      function selectTrace(traceId) {
        _traceDirty = true;
        state.selectedTraceId = traceId;
        const trace = selectedTrace();
        if (trace) {
          traceSideSelect.value = trace.side;
          traceWidthInput.value = String(trace.width);
        }
      }

      function syncSelectedTraceProperties() {
        const trace = selectedTrace();
        if (!trace) {
          return;
        }
        trace.width = currentTraceWidth();
        _traceDirty = true;
      }

      function setActiveEditSide(side, renderNow = true) {
        traceSideSelect.value = side === "B" ? "B" : "A";
        if (state.draftTrace && state.draftTrace.side !== currentEditSide()) {
          finishDraft();
        }
        const selected = selectedTrace();
        if (selected && !traceIsEditable(selected)) {
          selectTrace(null);
        }
        if (renderNow) {
          render();
        }
      }

      function calculateNets() {
        const parent = new Map();

        function add(id) {
          if (!parent.has(id)) {
            parent.set(id, id);
          }
        }

        function find(id) {
          add(id);
          const next = parent.get(id);
          if (next === id) {
            return id;
          }
          const root = find(next);
          parent.set(id, root);
          return root;
        }

        function union(a, b) {
          if (!a || !b) {
            return;
          }
          const rootA = find(a);
          const rootB = find(b);
          if (rootA !== rootB) {
            parent.set(rootB, rootA);
          }
        }

        const tracesById = new Map(state.traces.map((trace) => [trace.id, trace]));
        const anchors = new Map();

        for (const trace of state.traces) {
          add(trace.id);
          if (trace.branchFrom?.trace && tracesById.has(trace.branchFrom.trace)) {
            union(trace.id, trace.branchFrom.trace);
          }
          for (const point of trace.points) {
            for (const key of [nodeKey(point.node), pointKey(point, trace.side)]) {
              if (!key) {
                continue;
              }
              const existing = anchors.get(key);
              if (existing) {
                union(trace.id, existing);
              } else {
                anchors.set(key, trace.id);
              }
            }
          }
        }

        const rootToNet = new Map();
        const netByTrace = new Map();
        const tracesByNet = new Map();
        let nextNet = 1;

        for (const trace of state.traces) {
          const root = find(trace.id);
          if (!rootToNet.has(root)) {
            rootToNet.set(root, `N${String(nextNet).padStart(3, "0")}`);
            nextNet += 1;
          }
          const netId = rootToNet.get(root);
          trace.net = netId;
          netByTrace.set(trace.id, netId);
          if (!tracesByNet.has(netId)) {
            tracesByNet.set(netId, []);
          }
          tracesByNet.get(netId).push(trace);
        }

        state.netByTrace = netByTrace;
        state.tracesByNet = tracesByNet;
      }

      function startDraft(point, event) {
        const side = currentEditSide();
        state.draftTrace = {
          id: traceId(),
          side,
          width: currentTraceWidth(),
          points: [pointWithSnap(point, event, { side })],
        };
        selectTrace(null);
      }

      function startBranchFromHandle(sourceTraceId, pointIndex) {
        const trace = state.traces.find((item) => item.id === sourceTraceId);
        const point = trace?.points[pointIndex];
        if (!traceIsEditable(trace) || !point) {
          return;
        }
        state.draftTrace = {
          id: traceId(),
          side: trace.side,
          width: Number(trace.width) || 12,
          points: [cloneTracePoint(point)],
          branchFrom: {
            trace: trace.id,
            pointIndex,
          },
        };
        traceSideSelect.value = trace.side;
        traceWidthInput.value = String(state.draftTrace.width);
        selectTrace(trace.id);
        render();
      }

      function addDraftPoint(point, event) {
        _traceDirty = true;
        if (!state.draftTrace) {
          startDraft(point, event);
        } else {
          state.draftTrace.points.push(pointWithSnap(point, event, { side: state.draftTrace.side }));
        }
        render();
      }

      function finishDraft() {
        _traceDirty = true;
        if (state.draftTrace && state.draftTrace.points.length >= 2) {
          state.traces.push(state.draftTrace);
          selectTrace(state.draftTrace.id);
        }
        state.draftTrace = null;
        render();
      }

      function undoDraftPoint() {
        if (!state.draftTrace) {
          return;
        }
        _traceDirty = true;
        state.draftTrace.points.pop();
        if (state.draftTrace.points.length === 0) {
          state.draftTrace = null;
        }
        render();
      }

      function deleteSelectedTrace() {
        const trace = selectedTrace();
        if (!traceIsEditable(trace)) {
          return;
        }
        _traceDirty = true;
        state.traces = state.traces.filter((item) => item.id !== trace.id);
        selectTrace(null);
        render();
      }

      function distanceToSegment(point, a, b) {
        const vx = b.x - a.x;
        const vy = b.y - a.y;
        const wx = point.x - a.x;
        const wy = point.y - a.y;
        const len2 = vx * vx + vy * vy;
        const t = len2 === 0 ? 0 : clamp((wx * vx + wy * vy) / len2, 0, 1);
        const px = a.x + t * vx;
        const py = a.y + t * vy;
        return Math.hypot(point.x - px, point.y - py);
      }

      function nearestTraceSegment(point, traces = editableTraces()) {
        let nearest = null;
        let nearestDistance = Infinity;
        const threshold = 12 / Math.max(state.zoom, 0.1);
        for (const trace of traces) {
          for (let index = 1; index < trace.points.length; index += 1) {
            const a = trace.points[index - 1];
            const b = trace.points[index];
            const vx = b.x - a.x;
            const vy = b.y - a.y;
            const len2 = vx * vx + vy * vy;
            const t = len2 === 0 ? 0 : clamp(((point.x - a.x) * vx + (point.y - a.y) * vy) / len2, 0, 1);
            const projection = { x: a.x + t * vx, y: a.y + t * vy };
            const distance = Math.hypot(point.x - projection.x, point.y - projection.y);
            if (distance < nearestDistance) {
              nearest = { trace, insertIndex: index, projection };
              nearestDistance = distance;
            }
          }
        }
        return nearestDistance <= threshold ? nearest : null;
      }

      function findNearestTrace(point) {
        return nearestTraceSegment(point, editableTraces())?.trace || null;
      }

      function startBranchFromSelectedSegment(point) {
        const trace = selectedTrace();
        if (!traceIsEditable(trace)) {
          return false;
        }
        const nearest = nearestTraceSegment(point, [trace]);
        if (!nearest) {
          return false;
        }
        const branchPoint = {
          x: nearest.projection.x,
          y: nearest.projection.y,
        };
        trace.points.splice(nearest.insertIndex, 0, branchPoint);
        state.draftTrace = {
          id: traceId(),
          side: trace.side,
          width: Number(trace.width) || 12,
          points: [cloneTracePoint(branchPoint)],
          branchFrom: {
            trace: trace.id,
            pointIndex: nearest.insertIndex,
          },
        };
        traceSideSelect.value = trace.side;
        traceWidthInput.value = String(state.draftTrace.width);
        render();
        return true;
      }

      function insertPointOnTrace(point, event) {
        const nearest = nearestTraceSegment(point, editableTraces());
        if (!nearest) {
          selectTrace(null);
          render();
          return;
        }
        nearest.trace.points.splice(nearest.insertIndex, 0, pointWithSnap(nearest.projection, event, {
          side: nearest.trace.side,
          excludeTraceId: nearest.trace.id,
        }));
        selectTrace(nearest.trace.id);
        render();
      }

      function deleteTracePoint(traceId, pointIndex) {
        const trace = state.traces.find((item) => item.id === traceId);
        if (!traceIsEditable(trace)) {
          return;
        }
        trace.points.splice(pointIndex, 1);
        if (trace.points.length < 2) {
          state.traces = state.traces.filter((item) => item.id !== traceId);
          selectTrace(null);
        } else {
          selectTrace(trace.id);
        }
        render();
      }

      function traceFragmentFrom(source, points) {
        return {
          id: traceId(),
          side: source.side === "B" ? "B" : "A",
          width: Number(source.width) || 12,
          points: points.map(cloneTracePoint),
        };
      }

      function remapBranchesAfterTraceSplit(sourceTrace, splitIndex, replacement) {
        for (const trace of state.traces) {
          if (trace.branchFrom?.trace !== sourceTrace.id) {
            continue;
          }
          const oldPointIndex = Number(trace.branchFrom.pointIndex);
          const left = replacement[0];
          const right = replacement.length > 1 ? replacement[1] : null;
          if (left && oldPointIndex < splitIndex) {
            trace.branchFrom = {
              ...trace.branchFrom,
              trace: left.id,
              pointIndex: oldPointIndex,
            };
          } else if (right && oldPointIndex >= splitIndex) {
            trace.branchFrom = {
              ...trace.branchFrom,
              trace: right.id,
              pointIndex: oldPointIndex - splitIndex,
            };
          } else {
            delete trace.branchFrom;
          }
        }
      }

      function deleteTraceSegment(point) {
        const nearest = nearestTraceSegment(point, editableTraces());
        if (!nearest) {
          selectTrace(null);
          render();
          return;
        }

        const trace = nearest.trace;
        const segmentEndIndex = nearest.insertIndex;
        const leftPoints = trace.points.slice(0, segmentEndIndex);
        const rightPoints = trace.points.slice(segmentEndIndex);
        const replacement = [];

        if (leftPoints.length >= 2) {
          replacement.push(traceFragmentFrom(trace, leftPoints));
        }
        if (rightPoints.length >= 2) {
          replacement.push(traceFragmentFrom(trace, rightPoints));
        }

        const originalIndex = state.traces.findIndex((item) => item.id === trace.id);
        if (originalIndex >= 0) {
          state.traces.splice(originalIndex, 1, ...replacement);
          remapBranchesAfterTraceSplit(trace, segmentEndIndex, replacement);
        }
        selectTrace(replacement[0]?.id || null);
        render();
      }

      let _tracesFileHandle = null;
      let _savingInProgress = false;

      function buildTracesJson() {
        syncSelectedTraceProperties();
        calculateNets();
        return JSON.stringify({
          meta: {
            image_width: board().width,
            image_height: board().height,
            units: "image_px",
            created_with: "trace_editor.html",
          },
          traces: state.traces.map((trace) => ({
            id: trace.id,
            net: trace.net || state.netByTrace.get(trace.id) || null,
            side: trace.side === "B" ? "B" : "A",
            width: Number(trace.width) || 12,
            points: trace.points.map((point) => ({
              x: Number(point.x),
              y: Number(point.y),
              ...(point.node ? { node: point.node } : {}),
            })),
            ...(trace.branchFrom ? { branchFrom: trace.branchFrom } : {}),
          })),
        }, null, 2);
      }

      function downloadJson(json, filename) {
        const blob = new Blob([json], { type: "application/json" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
      }

      function updateSaveButton() {
        const name = _tracesFileHandle?.name;
        exportTracesButton.textContent = name ? `Guardar — ${name}` : "Guardar JSON";
      }

      async function exportTraces(forceDialog = false) {
        if (_savingInProgress) return;          // evitar re-entrada (doble click / doble diálogo)
        _savingInProgress = true;
        exportTracesButton.disabled = true;     // feedback visual + bloquear eventos de click

        const json = buildTracesJson();

        if (!window.showSaveFilePicker) {
          // Navegador sin File System Access API → descarga clásica
          downloadJson(json, "traces.json");
          _savingInProgress = false;
          exportTracesButton.disabled = false;
          return;
        }

        try {
          if (forceDialog || !_tracesFileHandle) {
            exportTracesButton.blur();          // quitar foco del botón antes del diálogo nativo
            _tracesFileHandle = await window.showSaveFilePicker({
              suggestedName: "traces.json",
              types: [{ description: "JSON", accept: { "application/json": [".json"] } }],
            });
          }
          const writable = await _tracesFileHandle.createWritable();
          await writable.write(json);
          await writable.close();
          updateSaveButton();
        } catch (err) {
          if (err.name !== "AbortError") {
            // Error de permiso u otro — resetear handle y caer a descarga
            console.warn("exportTraces error, resetting handle:", err);
            _tracesFileHandle = null;
            updateSaveButton();
            downloadJson(json, "traces.json");
          }
        } finally {
          _savingInProgress = false;
          exportTracesButton.disabled = false;
        }
      }

      function importTraces(file) {
        const reader = new FileReader();
        reader.addEventListener("load", () => {
          loadTracesData(JSON.parse(String(reader.result)));
        });
        reader.readAsText(file);
      }

      // Expande un point_id string al formato interno {x, y, node?, point_id}
      function expandPointId(id) {
        const pt = state.graphPoints.get(id);
        if (!pt) return { x: 0, y: 0, point_id: id };
        let node = null;
        if (pt.kind === "drill") {
          if (pt.comp_id) {
            node = { kind: "component", id: pt.comp_id, pin: pt.pin_n,
                     label: `${pt.comp_id} pin ${pt.pin_n}` };
          } else {
            // Via o taladro sin componente
            const numId = id.startsWith("D") ? Number(id.slice(1)) : id;
            node = { kind: "common_drill", id: numId, pin: null, label: `Vía ${id}` };
          }
        }
        return {
          x: pt.x, y: pt.y,
          point_id: id,
          ...(node ? { node } : {}),
        };
      }

      function normalizeTraces(data) {
        const traces = Array.isArray(data) ? data : data.traces;
        if (!Array.isArray(traces)) {
          throw new Error("JSON sin arreglo traces");
        }
        return traces
          .filter((trace) => Array.isArray(trace.points) && trace.points.length >= 2)
          .map((trace) => ({
            id: trace.id || traceId(),
            net: trace.net || null,
            side: trace.side === "B" ? "B" : "A",
            width: Number(trace.width) || 12,
            points: trace.points.map((point) => {
              if (typeof point === "string") return expandPointId(point);
              if (Array.isArray(point)) return { x: Number(point[0]), y: Number(point[1]) };
              return {
                x: Number(point.x),
                y: Number(point.y),
                ...(point.point_id ? { point_id: point.point_id } : {}),
                ...(point.node ? { node: point.node } : {}),
              };
            }),
            ...(trace.branchFrom ? { branchFrom: trace.branchFrom } : {}),
          }));
      }

      function loadTracesData(data) {
        _traceDirty = true;
        state.traces = normalizeTraces(data);
        state.draftTrace = null;
        selectTrace(null);
        render();
      }
