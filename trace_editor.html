<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pistas — PCB Reverser</title>
  <link rel="stylesheet" href="src/tools.css">
  <style>
    /* trace_editor-specific overrides */
    header h1 { color: var(--col-a); margin-right: 4px; }

    input[type="number"].width-inp {
      width: 52px; text-align: right;
    }

    /* ── VIEWER ── */
    #viewer {
      flex: 1; position: relative; overflow: hidden;
      background: #080b0d;
    }
    #viewer.mode-pan              { cursor: grab; }
    #viewer.mode-pan.panning      { cursor: grabbing; }
    #viewer.mode-draw             { cursor: crosshair; }
    #viewer.mode-select           { cursor: default; }

    #world { position: absolute; transform-origin: 0 0; }
    #world img { position: absolute; display: block; image-rendering: pixelated; }

    #overlay-svg {
      position: absolute; inset: 0;
      pointer-events: none; overflow: visible;
    }
    #overlay-svg.interactive { pointer-events: all; }

    #guide-svg { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }

    .crosshair-line { stroke: rgba(255,255,255,.35); stroke-width: 1; stroke-dasharray: 4 4; }

    /* Drills */
    .drill-circle {
      fill: none; stroke: var(--amber); stroke-width: 1.5;
      vector-effect: non-scaling-stroke; pointer-events: none; opacity: .45;
    }

    /* Traces */
    .trace-line {
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      pointer-events: stroke; cursor: pointer; opacity: .85;
    }
    .trace-line.side-a { stroke: var(--col-a); }
    .trace-line.side-b { stroke: var(--col-b); }
    .trace-line.selected  { opacity: 1; filter: drop-shadow(0 0 5px rgba(255,255,255,.5)); }
    .trace-line.net-peer  { opacity: .80; }
    .trace-line.dimmed    { opacity: .22; }

    /* Net connection dots */
    .net-dot      { fill: var(--accent); opacity: .85; pointer-events: none; }
    .waypoint-dot { fill: var(--amber);  opacity: .90; pointer-events: none; }

    /* Orphan endpoints */
    .orphan-ep {
      fill: none; stroke: #fff; stroke-width: 2.5;
      vector-effect: non-scaling-stroke; pointer-events: none; opacity: .95;
      filter: drop-shadow(0 0 3px rgba(0,0,0,.9));
    }

    /* Handles */
    .trace-handle {
      fill: #fff; stroke: #12161a; stroke-width: 1.5;
      vector-effect: non-scaling-stroke;
      r: 5; pointer-events: none;
    }

    /* Preview */
    .preview-line {
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
      stroke-dasharray: 8 6; opacity: .65; pointer-events: none;
    }
    .preview-line.side-a { stroke: var(--col-a); }
    .preview-line.side-b { stroke: var(--col-b); }

    /* Snap ring */
    .snap-ring {
      fill: none; stroke: var(--accent); stroke-width: 2;
      vector-effect: non-scaling-stroke; pointer-events: none; opacity: .9;
    }

    .placeholder {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px;
      color: var(--muted); font-size: 13px;
      pointer-events: none; text-align: center; padding: 24px;
      line-height: 1.7;
    }

  </style>
</head>
<body>

<header>
  <h1>Pistas</h1>

  <select id="layer-sel" title="Capa de imagen"></select>

  <div class="vsep"></div>

  <button id="btn-pan"    class="active" title="Pan — clic izq. o clic der. (P)">✥ Pan</button>
  <button id="btn-draw"                  title="Dibujar traza (D)">✏ Dibujar</button>
  <button id="btn-select"                title="Seleccionar / borrar (S)">↖ Selec.</button>

  <div class="vsep"></div>

  <span class="ctrl-label">
    Lado
    <select id="side-sel">
      <option value="A">A</option>
      <option value="B">B</option>
    </select>
  </span>

  <span class="ctrl-label">
    Ancho
    <input type="number" class="width-inp" id="width-inp" min="1" max="200" step="1" value="12">
    <span style="font-size:11px">px</span>
  </span>

  <div class="vsep"></div>

  <button id="btn-drills"     class="active-g" title="Mostrar taladros (T)">⊙ Drills</button>
  <button id="btn-crosshair" class="active-g" title="Líneas guía (C)">⊕ Crosshair</button>

  <div class="vsep"></div>

  <button id="btn-undo"   disabled title="Deshacer (Ctrl+Z)">⟲ Deshacer</button>
  <button id="btn-finish" hidden   title="Terminar traza (Enter / doble clic)">✓ Terminar</button>
  <button id="btn-delete" hidden   title="Borrar pista seleccionada (Del)" style="color:var(--red);border-color:var(--red)">✕ Borrar</button>

  <div class="sep"></div>

  <button id="btn-save"   disabled title="Guardar en data/traces.json (Ctrl+S)">💾 Guardar</button>
  <span id="unsaved-dot" title="Cambios sin guardar" style="
    width:7px;height:7px;border-radius:50%;background:var(--amber);
    display:none;flex-shrink:0;align-self:center;
  "></span>
  <button id="btn-import">Importar JSON</button>
  <button id="btn-export" disabled>↓ Exportar</button>
  <input type="file" id="file-input" accept=".json" hidden>
</header>

<div id="viewer">
  <div id="world"></div>
  <svg id="overlay-svg">
    <g id="g-drills"></g>
    <g id="g-traces"></g>
    <g id="g-handles"></g>
    <g id="g-preview"></g>
  </svg>
  <svg id="guide-svg"></svg>
  <div class="placeholder" id="placeholder">Cargando tiles…</div>
</div>

<div class="statusbar">
  <span id="sb-zoom">Zoom: —</span>
  <span id="sb-pos">—</span>
  <span id="sb-hover" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
  <span id="sb-count">0 pistas</span>
  <span id="sb-mode">Pan</span>
</div>

<script>
(() => {
  'use strict';

  const SNAP_PX = 22;  // snap radius in screen pixels

  /* ── State ── */
  const state = {
    manifest: null, boardId: null,
    x: 0, y: 0, zoom: 1, level: 0,
    tiles: new Map(),
    drills: [],
    traces: [],
    history: [],
    nextId: 1,
    // Tool
    tool: 'pan',
    drawSide: 'A',
    drawWidth: 12,
    draftPoints: [],
    snapPt: null,
    cursorImg: null,
    // Selection
    selectedId: null,
    draggingPoint: null,  // { traceId, pointIdx, snapshotTaken }
    netByTrace:  new Map(),  // traceId → netId
    tracesByNet: new Map(),  // netId   → [traceId, ...]
    // UI
    showDrills: true,
    showCrosshair: true,
    cursorVX: -9999, cursorVY: -9999,
  };

  /* ── DOM ── */
  const viewer      = document.getElementById('viewer');
  const world       = document.getElementById('world');
  const overlaySvg  = document.getElementById('overlay-svg');
  const guideSvg    = document.getElementById('guide-svg');
  const gDrills     = document.getElementById('g-drills');
  const gTraces     = document.getElementById('g-traces');
  const gHandles    = document.getElementById('g-handles');
  const gPreview    = document.getElementById('g-preview');
  const placeholder = document.getElementById('placeholder');
  const layerSel    = document.getElementById('layer-sel');
  const sideSel     = document.getElementById('side-sel');
  const widthInp    = document.getElementById('width-inp');
  const btnPan      = document.getElementById('btn-pan');
  const btnDraw     = document.getElementById('btn-draw');
  const btnSelect   = document.getElementById('btn-select');
  const btnDrills   = document.getElementById('btn-drills');
  const btnUndo     = document.getElementById('btn-undo');
  const btnFinish   = document.getElementById('btn-finish');
  const btnCrosshair = document.getElementById('btn-crosshair');
  const btnDelete    = document.getElementById('btn-delete');
  const btnSave      = document.getElementById('btn-save');
  const unsavedDot   = document.getElementById('unsaved-dot');
  const btnImport   = document.getElementById('btn-import');
  const btnExport   = document.getElementById('btn-export');
  const sbZoom      = document.getElementById('sb-zoom');
  const sbPos       = document.getElementById('sb-pos');
  const sbHover     = document.getElementById('sb-hover');
  const sbCount     = document.getElementById('sb-count');
  const sbMode      = document.getElementById('sb-mode');

  /* ── Helpers ── */
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function board()     { return state.manifest?.boards?.[state.boardId]; }
  function levelInfo() { return board()?.levels?.[state.level]; }
  function svgEl(tag)  { return document.createElementNS('http://www.w3.org/2000/svg', tag); }
  function currentWidth() { return Math.max(1, parseFloat(widthInp.value) || 12); }

  function toViewer(cx, cy) {
    const r = viewer.getBoundingClientRect();
    return { x: cx - r.left, y: cy - r.top };
  }
  function clientToImage(cx, cy) {
    const v = toViewer(cx, cy);
    return { x: (v.x - state.x) / state.zoom, y: (v.y - state.y) / state.zoom };
  }

  /* ── Zoom / pan ── */
  function chooseLevel() {
    const b = board(); if (!b) return;
    let best = b.levels[0], bestScore = Infinity;
    for (const lv of b.levels) {
      const s = Math.abs(Math.log2(state.zoom / lv.scale));
      if (s < bestScore) { best = lv; bestScore = s; }
    }
    state.level = best.level;
  }

  function setZoom(next, anchorCX, anchorCY) {
    const b = board(); if (!b) return;
    const min = Math.min(viewer.clientWidth / b.width, viewer.clientHeight / b.height) * 0.8;
    const z   = clamp(next, min, 8);
    const ax  = anchorCX !== undefined ? toViewer(anchorCX, 0).x : viewer.clientWidth / 2;
    const ay  = anchorCY !== undefined ? toViewer(0, anchorCY).y : viewer.clientHeight / 2;
    state.x   = ax - ((ax - state.x) / state.zoom) * z;
    state.y   = ay - ((ay - state.y) / state.zoom) * z;
    state.zoom = z;
    render();
  }

  function fitToScreen() {
    const b = board(); if (!b) return;
    state.zoom = Math.min(viewer.clientWidth / b.width, viewer.clientHeight / b.height) * 0.92;
    state.x    = (viewer.clientWidth  - b.width  * state.zoom) / 2;
    state.y    = (viewer.clientHeight - b.height * state.zoom) / 2;
    _overlayDirty = true;
    // Call doRender directly so the first frame always paints,
    // even in throttled contexts (preview iframes, background tabs).
    _rafId = null;
    doRender();
  }

  /* ── Tiles ── */
  function tileKey(l, c, r) { return `${l}/${c}/${r}`; }

  function ensureTile(level, col, row) {
    const key = tileKey(level, col, row);
    if (state.tiles.has(key)) return state.tiles.get(key);
    const img = document.createElement('img');
    img.src = `tiles/${state.boardId}/${level}/${col}_${row}.jpg`;
    img.style.cssText = 'position:absolute;display:block;image-rendering:pixelated;';
    img.draggable = false;
    world.appendChild(img);
    state.tiles.set(key, img);
    return img;
  }

  function clearTiles() { state.tiles.clear(); world.replaceChildren(); }

  /* ── Hover hit detection ── */
  function nearestTrace(imgX, imgY) {
    const thresh = 12 / state.zoom;
    let best = null, bestDist = Infinity;
    for (const tr of state.traces) {
      const pts = tr.points;
      for (let i = 0; i < pts.length - 1; i++) {
        const ax = pts[i].x, ay = pts[i].y, bx = pts[i+1].x, by = pts[i+1].y;
        const vx = bx-ax, vy = by-ay, len2 = vx*vx+vy*vy;
        const t = len2 === 0 ? 0 : Math.max(0, Math.min(1, ((imgX-ax)*vx+(imgY-ay)*vy)/len2));
        const dist = Math.hypot(imgX-(ax+t*vx), imgY-(ay+t*vy));
        const hw = (Number(tr.width)||10)/2;
        if (dist <= hw + thresh && dist < bestDist) { best = tr; bestDist = dist; }
      }
    }
    return best;
  }

  /* ── Snap ── */
  function findSnap(imgX, imgY) {
    const thresh = SNAP_PX / state.zoom;
    let best = null, bestDist = Infinity;

    if (state.showDrills) {
      for (const d of state.drills) {
        const dist = Math.hypot(d.x - imgX, d.y - imgY);
        if (dist < Math.max(d.r * 1.8, thresh) && dist < bestDist) {
          best = { x: d.x, y: d.y, r: d.r }; bestDist = dist;
        }
      }
    }

    // Snap to ALL trace points
    for (const tr of state.traces) {
      for (const p of tr.points) {
        const dist = Math.hypot(p.x - imgX, p.y - imgY);
        if (dist < thresh && dist < bestDist) {
          best = { x: p.x, y: p.y, r: null }; bestDist = dist;
        }
      }
    }

    return best;
  }

  /* ── Render ── */
  let _rafId = null;
  let _overlayDirty = true;

  function render() {
    if (_rafId !== null) return;
    _rafId = requestAnimationFrame(() => { _rafId = null; doRender(); });
  }

  function doRender() {
    const b = board(); if (!b) return;
    chooseLevel();
    const info = levelInfo();
    const ts   = state.manifest.tileSize;
    const lts  = state.zoom / info.scale;

    world.style.width     = `${info.width}px`;
    world.style.height    = `${info.height}px`;
    world.style.transform = `translate(${state.x}px,${state.y}px) scale(${lts})`;

    const vbX = (-state.x / state.zoom).toFixed(2);
    const vbY = (-state.y / state.zoom).toFixed(2);
    const vbW = (viewer.clientWidth  / state.zoom).toFixed(2);
    const vbH = (viewer.clientHeight / state.zoom).toFixed(2);
    overlaySvg.setAttribute('width',   viewer.clientWidth);
    overlaySvg.setAttribute('height',  viewer.clientHeight);
    overlaySvg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);

    // Load visible tiles
    const vl = (-state.x / state.zoom) * info.scale;
    const vt = (-state.y / state.zoom) * info.scale;
    const vr = ((viewer.clientWidth  - state.x) / state.zoom) * info.scale;
    const vb = ((viewer.clientHeight - state.y) / state.zoom) * info.scale;
    const c0 = clamp(Math.floor(vl / ts) - 1, 0, info.cols - 1);
    const c1 = clamp(Math.ceil (vr / ts),     0, info.cols - 1);
    const r0 = clamp(Math.floor(vt / ts) - 1, 0, info.rows - 1);
    const r1 = clamp(Math.ceil (vb / ts),     0, info.rows - 1);
    const visible = new Set();
    for (let r = r0; r <= r1; r++) {
      for (let c = c0; c <= c1; c++) {
        const tile = ensureTile(info.level, c, r);
        const tw = Math.min(ts, info.width  - c * ts);
        const th = Math.min(ts, info.height - r * ts);
        tile.style.left = `${c * ts}px`; tile.style.top = `${r * ts}px`;
        tile.style.width = `${tw}px`;    tile.style.height = `${th}px`;
        visible.add(tileKey(info.level, c, r));
      }
    }
    for (const [key, img] of state.tiles) {
      if (!visible.has(key)) { img.remove(); state.tiles.delete(key); }
    }

    if (_overlayDirty) { renderOverlay(); _overlayDirty = false; }
    renderGuides();
    sbZoom.textContent = `Zoom: ${(state.zoom * 100).toFixed(0)}%`;
    pushHash();
  }

  /* ── Overlay ── */
  function renderOverlay() {
    // Drills
    gDrills.innerHTML = '';
    if (state.showDrills) {
      for (const d of state.drills) {
        const c = svgEl('circle');
        c.setAttribute('cx', d.x); c.setAttribute('cy', d.y); c.setAttribute('r', d.r);
        c.classList.add('drill-circle');
        gDrills.appendChild(c);
      }
    }

    // Traces
    gTraces.innerHTML = '';
    const hasSel   = state.selectedId !== null;
    const selNetId = hasSel ? state.netByTrace.get(state.selectedId) : null;
    const netSet   = selNetId ? new Set(state.tracesByNet.get(selNetId) ?? []) : null;

    for (const tr of state.traces) {
      if (tr.points.length < 2) continue;
      const pl = svgEl('polyline');
      pl.setAttribute('points', tr.points.map(p => `${p.x},${p.y}`).join(' '));
      pl.setAttribute('stroke-width', tr.width);
      pl.classList.add('trace-line', `side-${tr.side.toLowerCase()}`);
      if (tr.id === state.selectedId) {
        pl.classList.add('selected');
      } else if (hasSel) {
        if (netSet && netSet.has(tr.id)) pl.classList.add('net-peer');
        else                              pl.classList.add('dimmed');
      }
      pl.dataset.traceId = tr.id;
      gTraces.appendChild(pl);
    }

    // Grid de todos los puntos para detección de conexiones endpoint→waypoint
    const CELL = 4;
    const ptGrid = new Map();
    for (const tr of state.traces) {
      if (tr.points.length < 2) continue;
      for (let i = 1; i < tr.points.length - 1; i++) {  // solo intermedios
        const p = tr.points[i];
        const key = `${Math.round(p.x / CELL)}:${Math.round(p.y / CELL)}`;
        if (!ptGrid.has(key)) ptGrid.set(key, []);
        ptGrid.get(key).push({ traceId: tr.id, x: p.x, y: p.y });
      }
    }

    // epCount: cuántos endpoints comparten la misma coordenada (para puntos verdes)
    const epCount = new Map();
    for (const tr of state.traces) {
      if (tr.points.length < 2) continue;
      for (const p of [tr.points[0], tr.points[tr.points.length - 1]]) {
        const key = `${Math.round(p.x)},${Math.round(p.y)}`;
        epCount.set(key, (epCount.get(key) ?? 0) + 1);
      }
    }

    // waypointHits: endpoints que caen sobre un punto intermedio de OTRA traza → rombo ámbar
    // connectedEps: endpoints conectados (otra traza O misma traza) → no son huérfanos
    const waypointHits  = new Map();  // "rx,ry" → {x, y}
    const connectedEps  = new Set();  // "rx,ry"

    for (const tr of state.traces) {
      if (tr.points.length < 2) continue;
      for (const ep of [tr.points[0], tr.points[tr.points.length - 1]]) {
        const epKey = `${Math.round(ep.x)},${Math.round(ep.y)}`;
        if ((epCount.get(epKey) ?? 0) >= 2) continue;
        const cx = Math.round(ep.x / CELL), cy = Math.round(ep.y / CELL);
        let hitOther = false, hitSelf = false;
        for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++)
          for (const e of (ptGrid.get(`${cx+dx}:${cy+dy}`) || []))
            if (Math.hypot(ep.x - e.x, ep.y - e.y) <= 2) {
              if (e.traceId !== tr.id) hitOther = true;
              else hitSelf = true;
            }
        if (hitOther || hitSelf) connectedEps.add(epKey);
        if (hitOther) waypointHits.set(epKey, { x: ep.x, y: ep.y });
        // hitSelf = lasso (traza cierra sobre sí misma): no es huérfano, pero tampoco muestra rombo
      }
    }

    // Puntos verdes: endpoint-to-endpoint
    for (const [key, cnt] of epCount) {
      if (cnt < 2) continue;
      const [px, py] = key.split(',').map(Number);
      const dot = svgEl('circle');
      dot.setAttribute('cx', px); dot.setAttribute('cy', py); dot.setAttribute('r', 5);
      dot.classList.add('net-dot');
      gTraces.appendChild(dot);
    }

    // Puntos ámbar: endpoint-to-waypoint (rombo para distinguirlos)
    for (const { x, y } of waypointHits.values()) {
      const s = 6;
      const diamond = svgEl('polygon');
      diamond.setAttribute('points', `${x},${y-s} ${x+s},${y} ${x},${y+s} ${x-s},${y}`);
      diamond.classList.add('waypoint-dot');
      gTraces.appendChild(diamond);
    }

    // Marcadores de endpoints huérfanos (sin conexión a ningún punto de otra traza ni drill)
    const DRILL_THRESH = 20;
    for (const tr of state.traces) {
      if (tr.points.length < 2) continue;
      for (const ep of [tr.points[0], tr.points[tr.points.length - 1]]) {
        const key = `${Math.round(ep.x)},${Math.round(ep.y)}`;
        if ((epCount.get(key) ?? 0) >= 2) continue;
        if (connectedEps.has(key)) continue;
        if (state.drills.some(d => Math.hypot(d.x - ep.x, d.y - ep.y) <= Math.max(d.r * 1.5, DRILL_THRESH))) continue;

        const r  = 11 / state.zoom;
        const r2 = 7  / state.zoom;
        const circ = svgEl('circle');
        circ.setAttribute('cx', ep.x); circ.setAttribute('cy', ep.y); circ.setAttribute('r', r);
        circ.classList.add('orphan-ep');
        gTraces.appendChild(circ);
        for (const [x1, y1, x2, y2] of [
          [ep.x-r2, ep.y-r2, ep.x+r2, ep.y+r2],
          [ep.x+r2, ep.y-r2, ep.x-r2, ep.y+r2],
        ]) {
          const ln = svgEl('line');
          ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
          ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
          ln.classList.add('orphan-ep');
          gTraces.appendChild(ln);
        }
      }
    }

    // Handles for selected trace
    gHandles.innerHTML = '';
    const sel = state.traces.find(t => t.id === state.selectedId);
    if (sel) {
      for (const p of sel.points) {
        const h = svgEl('circle');
        h.setAttribute('cx', p.x); h.setAttribute('cy', p.y); h.setAttribute('r', 5);
        h.classList.add('trace-handle');
        gHandles.appendChild(h);
      }
    }

    sbCount.textContent = `${state.traces.length} pista${state.traces.length !== 1 ? 's' : ''}`;
    btnExport.disabled  = state.traces.length === 0;
    btnUndo.disabled    = state.history.length === 0 && state.draftPoints.length === 0;
  }

  function dirtyOverlay() { _overlayDirty = true; render(); }

  /* ── Preview (updates without RAF for immediate feel) ── */
  function renderPreview() {
    gPreview.innerHTML = '';
    if (state.tool !== 'draw') return;

    const cursorPt = state.snapPt || state.cursorImg;
    if (!cursorPt) return;

    // Snap ring
    if (state.snapPt) {
      const ring = svgEl('circle');
      const r = state.snapPt.r ? state.snapPt.r * 1.5 : SNAP_PX / state.zoom;
      ring.setAttribute('cx', state.snapPt.x);
      ring.setAttribute('cy', state.snapPt.y);
      ring.setAttribute('r',  r);
      ring.classList.add('snap-ring');
      gPreview.appendChild(ring);
    }

    // Points already placed (as a polyline)
    if (state.draftPoints.length >= 2) {
      const pl = svgEl('polyline');
      pl.setAttribute('points', state.draftPoints.map(p => `${p.x},${p.y}`).join(' '));
      pl.setAttribute('stroke-width', currentWidth());
      pl.classList.add('preview-line', `side-${state.drawSide.toLowerCase()}`);
      gPreview.appendChild(pl);
    }

    // Rubber-band segment from last point to cursor
    if (state.draftPoints.length >= 1) {
      const last = state.draftPoints[state.draftPoints.length - 1];
      const seg  = svgEl('line');
      seg.setAttribute('x1', last.x); seg.setAttribute('y1', last.y);
      seg.setAttribute('x2', cursorPt.x); seg.setAttribute('y2', cursorPt.y);
      seg.setAttribute('stroke-width', currentWidth());
      seg.classList.add('preview-line', `side-${state.drawSide.toLowerCase()}`);
      gPreview.appendChild(seg);
    }
  }

  /* ── Guide SVG (crosshair, viewport-space) ── */
  function renderGuides() {
    const W = viewer.clientWidth, H = viewer.clientHeight;
    guideSvg.setAttribute('width', W); guideSvg.setAttribute('height', H);
    guideSvg.innerHTML = '';
    if (!state.showCrosshair || state.cursorVX < 0) return;
    const h = svgEl('line');
    h.setAttribute('x1', 0); h.setAttribute('y1', state.cursorVY);
    h.setAttribute('x2', W); h.setAttribute('y2', state.cursorVY);
    h.classList.add('crosshair-line'); guideSvg.appendChild(h);
    const v = svgEl('line');
    v.setAttribute('x1', state.cursorVX); v.setAttribute('y1', 0);
    v.setAttribute('x2', state.cursorVX); v.setAttribute('y2', H);
    v.classList.add('crosshair-line'); guideSvg.appendChild(v);
  }

  /* ── Tool management ── */
  function setTool(tool) {
    if (tool !== 'draw' && state.draftPoints.length) cancelDraft();
    state.tool = tool;
    if (tool !== 'select') selectTrace(null);
    btnPan.classList.toggle('active', tool === 'pan');
    btnDraw.classList.toggle('active', tool === 'draw');
    btnSelect.classList.toggle('active-g', tool === 'select');
    viewer.className = `mode-${tool}`;
    overlaySvg.classList.toggle('interactive', tool === 'select');
    btnFinish.hidden = tool !== 'draw';
    sbMode.textContent = tool === 'pan' ? 'Pan'
      : tool === 'draw' ? `Dibujar — Lado ${state.drawSide}`
      : 'Seleccionar';
  }

  btnPan.addEventListener('click',    () => setTool('pan'));
  btnDraw.addEventListener('click',   () => setTool('draw'));
  btnSelect.addEventListener('click', () => setTool('select'));

  sideSel.addEventListener('change', () => {
    state.drawSide = sideSel.value;
    if (state.tool === 'draw') sbMode.textContent = `Dibujar — Lado ${state.drawSide}`;
  });

  widthInp.addEventListener('input', () => {
    if (!state.selectedId) return;
    const tr = state.traces.find(t => t.id === state.selectedId);
    if (tr) { tr.width = currentWidth(); markDirty(); dirtyOverlay(); }
  });

  btnDrills.addEventListener('click', () => {
    state.showDrills = !state.showDrills;
    btnDrills.classList.toggle('active-g', state.showDrills);
    dirtyOverlay();
  });

  btnCrosshair.addEventListener('click', () => {
    state.showCrosshair = !state.showCrosshair;
    btnCrosshair.classList.toggle('active-g', state.showCrosshair);
    renderGuides();
  });

  /* ── Point insertion ── */
  function closestPointOnSegment(px, py, ax, ay, bx, by) {
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx*dx + dy*dy;
    if (lenSq === 0) return { x: ax, y: ay };
    const t = Math.max(0, Math.min(1, ((px-ax)*dx + (py-ay)*dy) / lenSq));
    return { x: ax + t*dx, y: ay + t*dy };
  }

  function insertPointOnTrace(tr, imgX, imgY) {
    let bestDist = Infinity, bestIdx = -1, bestPt = null;
    for (let i = 0; i < tr.points.length - 1; i++) {
      const a = tr.points[i], b = tr.points[i + 1];
      const cp = closestPointOnSegment(imgX, imgY, a.x, a.y, b.x, b.y);
      const dist = Math.hypot(cp.x - imgX, cp.y - imgY);
      if (dist < bestDist) { bestDist = dist; bestIdx = i; bestPt = cp; }
    }
    if (bestIdx < 0) return;
    snapshot();
    tr.points.splice(bestIdx + 1, 0, { x: Math.round(bestPt.x), y: Math.round(bestPt.y) });
    calculateNets();
    markDirty();
    dirtyOverlay();
  }

  /* ── Drawing ── */
  function addPoint(imgX, imgY) {
    const pt = state.snapPt ? { x: state.snapPt.x, y: state.snapPt.y } : { x: imgX, y: imgY };
    // Avoid duplicate consecutive points
    const last = state.draftPoints[state.draftPoints.length - 1];
    if (last && Math.hypot(last.x - pt.x, last.y - pt.y) < 1) return;
    state.draftPoints.push(pt);
    renderPreview();
    btnUndo.disabled = false;
  }

  function finishDraft() {
    if (state.draftPoints.length < 2) { cancelDraft(); return; }
    snapshot();
    state.traces.push({
      id:     `T${state.nextId++}`,
      side:   state.drawSide,
      width:  currentWidth(),
      points: state.draftPoints.slice(),
    });
    state.draftPoints = [];
    state.snapPt = null;
    gPreview.innerHTML = '';
    calculateNets();
    markDirty();
    dirtyOverlay();
  }

  function cancelDraft() {
    state.draftPoints = [];
    state.snapPt = null;
    gPreview.innerHTML = '';
  }

  btnFinish.addEventListener('click', finishDraft);

  /* ── Select ── */
  function selectTrace(id) {
    state.selectedId = id;
    btnDelete.hidden = id === null;
    dirtyOverlay();
  }

  btnDelete.addEventListener('click', deleteSelected);

  function deleteSelected() {
    if (!state.selectedId) return;
    snapshot();
    state.traces     = state.traces.filter(t => t.id !== state.selectedId);
    state.selectedId = null;
    calculateNets();
    markDirty();
    dirtyOverlay();
  }

  /* ── Net detection ── */
  const NET_THRESH = 1; // image-px; snapped pts share exact coords

  function calculateNets() {
    const parent = {};
    for (const tr of state.traces) parent[tr.id] = tr.id;
    function find(id) { if (parent[id] !== id) parent[id] = find(parent[id]); return parent[id]; }
    function union(a, b) { a = find(a); b = find(b); if (a !== b) parent[b] = a; }

    // Grid de TODOS los puntos (endpoints e intermedios)
    const CELL = 4;
    const grid = new Map();
    for (const tr of state.traces) {
      for (const p of tr.points) {
        const key = `${Math.round(p.x / CELL)}:${Math.round(p.y / CELL)}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push({ traceId: tr.id, x: p.x, y: p.y });
      }
    }

    // Para cada endpoint buscar coincidencias en cualquier punto de otra traza (≤2px)
    for (const tr of state.traces) {
      const pts = tr.points;
      for (const ep of [pts[0], pts[pts.length - 1]]) {
        const cx = Math.round(ep.x / CELL), cy = Math.round(ep.y / CELL);
        for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++)
          for (const e of (grid.get(`${cx+dx}:${cy+dy}`) || []))
            if (e.traceId !== tr.id && Math.hypot(ep.x - e.x, ep.y - e.y) <= 2)
              union(tr.id, e.traceId);
      }
    }

    state.netByTrace.clear();
    state.tracesByNet.clear();
    for (const tr of state.traces) {
      const netId = find(tr.id);
      state.netByTrace.set(tr.id, netId);
      if (!state.tracesByNet.has(netId)) state.tracesByNet.set(netId, []);
      state.tracesByNet.get(netId).push(tr.id);
    }
  }

  /* ── Undo ── */
  function snapshot() {
    state.history.push(state.traces.map(t => ({ ...t, points: t.points.slice() })));
    if (state.history.length > 50) state.history.shift();
    btnUndo.disabled = false;
  }

  function undo() {
    // If drawing: remove last draft point
    if (state.draftPoints.length > 0) {
      state.draftPoints.pop();
      renderPreview();
      if (!state.draftPoints.length) btnUndo.disabled = state.history.length === 0;
      return;
    }
    if (!state.history.length) return;
    state.traces     = state.history.pop();
    state.selectedId = null;
    calculateNets();
    markDirty();
    dirtyOverlay();
    btnUndo.disabled = state.history.length === 0;
  }

  btnUndo.addEventListener('click', undo);

  /* ── URL state ── */
  function stateToHash() {
    const p = new URLSearchParams();
    p.set('z',  state.zoom.toFixed(2));
    p.set('px', Math.round(state.x));
    p.set('py', Math.round(state.y));
    if (state.boardId) p.set('b', state.boardId);
    p.set('s', state.drawSide);
    p.set('w', state.drawWidth);
    if (state.tool !== 'pan') p.set('t', state.tool);
    let v = 0;
    if (state.showDrills)     v |= 1;
    if (state.showCrosshair)  v |= 2;
    if (v !== 3) p.set('v', v);  // 3 = ambos activos (default), no hace falta serializar
    history.replaceState(null, '', '#' + p.toString());
  }

  let _hashTimer = null;
  function pushHash() {
    clearTimeout(_hashTimer);
    _hashTimer = setTimeout(stateToHash, 200);
  }

  function applyHashToState() {
    const raw = window.location.hash.slice(1);
    if (!raw) return;
    const p = new URLSearchParams(raw);

    const z = parseFloat(p.get('z'));
    if (Number.isFinite(z) && z > 0) state.zoom = z;

    const px = parseInt(p.get('px')), py = parseInt(p.get('py'));
    if (Number.isFinite(px) && Number.isFinite(py)) { state.x = px; state.y = py; }

    const b = p.get('b');
    if (b && state.manifest?.boards[b]) {
      state.boardId = b;
      layerSel.value = b;
    }

    const s = p.get('s');
    if (s === 'A' || s === 'B') {
      state.drawSide = s;
      sideSel.value = s;
    }

    const w = parseInt(p.get('w'));
    if (Number.isFinite(w) && w > 0) {
      state.drawWidth = w;
      widthInp.value  = w;
    }

    const t = p.get('t');
    if (t === 'select') setTool('select');

    const v = p.has('v') ? parseInt(p.get('v'), 10) : 3;
    state.showDrills    = !!(v & 1);
    state.showCrosshair = !!(v & 2);
    btnDrills.classList.toggle('active-g', state.showDrills);
    btnCrosshair.classList.toggle('active-g', state.showCrosshair);
  }

  /* ── Pointer events ── */
  viewer.addEventListener('dragstart', e => e.preventDefault());
  let _rDown = false, _rStart = null;
  let _lDown = false, _lMoved = false, _lStart = null;
  const DRAG_THRESH = 5;

  viewer.addEventListener('pointerdown', (e) => {
    if (e.button === 2) {
      _rDown  = true;
      _rStart = { ox: state.x, oy: state.y, cx: e.clientX, cy: e.clientY };
      viewer.setPointerCapture(e.pointerId);
      viewer.classList.add('panning');
    } else if (e.button === 0) {
      _lDown = true; _lMoved = false;
      _lStart = { x: e.clientX, y: e.clientY, ox: state.x, oy: state.y };
      viewer.setPointerCapture(e.pointerId);

      // Handle drag — detectar si el clic cae sobre un handle de la traza seleccionada
      if (state.tool === 'select' && state.selectedId !== null) {
        const img = clientToImage(e.clientX, e.clientY);
        const tr  = state.traces.find(t => t.id === state.selectedId);
        const thresh = 12 / state.zoom;
        if (tr) {
          for (let i = 0; i < tr.points.length; i++) {
            const p = tr.points[i];
            if (Math.hypot(p.x - img.x, p.y - img.y) < thresh) {
              state.draggingPoint = { traceId: state.selectedId, pointIdx: i, snapshotTaken: false };
              _lMoved = true; // evita que pointerup interprete esto como clic
              break;
            }
          }
        }
      }
    }
  });

  viewer.addEventListener('pointermove', (e) => {
    const vp = toViewer(e.clientX, e.clientY);
    state.cursorVX = vp.x; state.cursorVY = vp.y;

    if (_rDown) {
      state.x = _rStart.ox + (e.clientX - _rStart.cx);
      state.y = _rStart.oy + (e.clientY - _rStart.cy);
      render(); return;
    }

    // Pan mode drag with left button
    if (_lDown && state.tool === 'pan') {
      const dx = e.clientX - _lStart.x, dy = e.clientY - _lStart.y;
      if (!_lMoved && Math.hypot(dx, dy) > DRAG_THRESH) _lMoved = true;
      if (_lMoved) {
        state.x = _lStart.ox + dx;
        state.y = _lStart.oy + dy;
        render(); return;
      }
    } else if (_lDown) {
      const dx = e.clientX - _lStart.x, dy = e.clientY - _lStart.y;
      if (!_lMoved && Math.hypot(dx, dy) > DRAG_THRESH) _lMoved = true;
    }

    const img = clientToImage(e.clientX, e.clientY);
    state.cursorImg = img;
    const needsSnap = state.tool === 'draw' || state.draggingPoint !== null;
    state.snapPt = needsSnap ? findSnap(img.x, img.y) : null;
    sbPos.textContent = `${img.x.toFixed(0)}, ${img.y.toFixed(0)} px`;

    if (!state.draggingPoint && state.tool !== 'draw') {
      const tr = nearestTrace(img.x, img.y);
      if (tr) {
        const side = tr.side === 'B' ? 'Cara B' : 'Cara A';
        const net  = tr.net ? `  net: ${tr.net}` : '';
        const pts  = tr.points.length;
        sbHover.textContent = `${tr.id}  ·  ${side}  ·  w=${tr.width}px  ·  ${pts} pts${net}`;
      } else {
        sbHover.textContent = '';
      }
    } else {
      sbHover.textContent = '';
    }

    // Drag de handle
    if (state.draggingPoint) {
      const dp = state.draggingPoint;
      if (!dp.snapshotTaken) { snapshot(); dp.snapshotTaken = true; }
      const tr = state.traces.find(t => t.id === dp.traceId);
      if (tr) {
        const pt = state.snapPt ?? img;
        tr.points[dp.pointIdx] = { x: pt.x, y: pt.y };
        calculateNets();
        markDirty();
        dirtyOverlay();
      }
      renderGuides();
      return;
    }

    if (state.tool === 'draw') renderPreview();
    renderGuides();
  });

  viewer.addEventListener('pointerup', (e) => {
    if (e.button === 2) { _rDown = false; viewer.classList.remove('panning'); return; }
    if (e.button !== 0 || !_lDown) return;
    _lDown = false;

    if (state.draggingPoint) { state.draggingPoint = null; return; }
    if (!_lMoved) {
      const img = clientToImage(e.clientX, e.clientY);
      if (state.tool === 'draw') {
        addPoint(img.x, img.y);
      } else if (state.tool === 'select') {
        const el = document.elementFromPoint(e.clientX, e.clientY);
        const traceEl = el?.closest('[data-trace-id]');
        if (!traceEl) {
          selectTrace(null);
        } else if (traceEl.dataset.traceId !== state.selectedId) {
          selectTrace(traceEl.dataset.traceId);
        } else {
          // Clic sobre traza ya seleccionada → insertar punto si no hay uno cerca
          const imgPt = clientToImage(e.clientX, e.clientY);
          const tr = state.traces.find(t => t.id === state.selectedId);
          const nearThresh = 10 / state.zoom;
          const nearExisting = tr?.points.some(p =>
            Math.hypot(p.x - imgPt.x, p.y - imgPt.y) < nearThresh
          );
          if (tr && !nearExisting) insertPointOnTrace(tr, imgPt.x, imgPt.y);
        }
      }
    }
  });

  viewer.addEventListener('dblclick', () => {
    if (state.tool === 'draw') {
      // Second click of dblclick added a duplicate point — remove it
      if (state.draftPoints.length > 1) state.draftPoints.pop();
      finishDraft();
    }
  });

  viewer.addEventListener('contextmenu', (e) => e.preventDefault());

  viewer.addEventListener('pointerleave', () => {
    state.cursorVX = -9999; state.cursorVY = -9999;
    state.snapPt = null;
    if (state.tool === 'draw') renderPreview();
    renderGuides();
  });

  viewer.addEventListener('wheel', (e) => {
    e.preventDefault();
    setZoom(state.zoom * (e.deltaY < 0 ? 1.15 : 1 / 1.15), e.clientX, e.clientY);
  }, { passive: false });

  /* ── Keyboard ── */
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
    if (e.key === 'p' || e.key === 'P') setTool('pan');
    if (e.key === 'd' || e.key === 'D') setTool('draw');
    if (e.key === 's' || e.key === 'S') setTool('select');
    if (e.key === 'f' || e.key === 'F') fitToScreen();
    if (e.key === 'c' || e.key === 'C') { state.showCrosshair = !state.showCrosshair; renderGuides(); }
    if (e.key === 't' || e.key === 'T') btnDrills.click();
    if (e.key === 'Enter') { if (state.tool === 'draw') finishDraft(); }
    if (e.key === 'Escape') {
      if (state.draftPoints.length) cancelDraft();
      else setTool('pan');
    }
    if (e.key === 'Delete' || e.key === 'Backspace') { if (state.selectedId) deleteSelected(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undo(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); doSave(); }
  });

  /* ── Layer select ── */
  layerSel.addEventListener('change', () => {
    state.boardId = layerSel.value; clearTiles(); fitToScreen();
  });

  /* ── Import / Export ── */
  btnImport.addEventListener('click', () => document.getElementById('file-input').click());

  document.getElementById('file-input').addEventListener('change', (e) => {
    const f = e.target.files[0]; if (!f) return;
    f.text().then(t => {
      try {
        const data = JSON.parse(t);
        const arr  = data.traces ?? data;
        if (!Array.isArray(arr)) { alert('JSON inválido'); return; }
        snapshot();
        state.traces = arr.map(tr => ({
          id:     tr.id    ?? `T${state.nextId++}`,
          side:   tr.side  ?? 'A',
          width:  tr.width ?? 12,
          points: tr.points ?? [],
        }));
        state.selectedId = null;
        calculateNets();
        markDirty();
        dirtyOverlay();
      } catch { alert('JSON inválido'); }
    });
    e.target.value = '';
  });

  btnSave.addEventListener('click', doSave);
  btnExport.addEventListener('click', doExport);

  function markDirty() {
    unsavedDot.style.display = 'inline-block';
    btnSave.disabled = state.traces.length === 0;
  }

  function markClean() {
    unsavedDot.style.display = 'none';
  }

  async function doSave() {
    if (!state.traces.length) return;
    const body = JSON.stringify({ traces: state.traces }, null, 2);
    try {
      const res = await fetch('data/traces.json', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body,
      });
      if (!res.ok && res.status !== 204) throw new Error(`HTTP ${res.status}`);
      markClean();
      const orig = btnSave.textContent;
      btnSave.textContent = '✓ Guardado';
      setTimeout(() => { btnSave.textContent = orig; }, 1800);
    } catch (err) {
      alert(`Error al guardar: ${err.message}\n¿Está corriendo scripts/dev_server.py?`);
    }
  }

  function doExport() {
    const blob = new Blob([JSON.stringify({ traces: state.traces }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = 'traces.json'; a.click();
    URL.revokeObjectURL(a.href);
  }

  /* ── Init ── */
  async function init() {
    try {
      const res = await fetch('tiles/manifest.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      state.manifest = await res.json();
      const boards = Object.keys(state.manifest.boards);
      if (!boards.length) throw new Error('Sin capas en manifest');
      layerSel.innerHTML = boards.map(id => `<option value="${id}">${id}</option>`).join('');
      state.boardId = boards[0];
      placeholder.style.display = 'none';
      const hasHash = !!window.location.hash.slice(1);
      if (hasHash) applyHashToState(); else fitToScreen();
    } catch (err) {
      placeholder.innerHTML = `<span style="color:var(--red)">Sin tiles: ${err.message}</span><br>Generá los tiles primero con generate_tiles.py`;
    }

    fetch('data/drills.json').then(r => r.ok ? r.json() : null).then(d => {
      if (d) { state.drills = d.drills ?? d; dirtyOverlay(); }
    }).catch(() => {});

    fetch('data/traces.json').then(r => r.ok ? r.json() : null).then(d => {
      if (!d) return;
      const arr = d.traces ?? d;
      if (Array.isArray(arr)) {
        state.traces = arr.map(tr => ({ id: tr.id ?? `T${state.nextId++}`, side: tr.side ?? 'A', width: tr.width ?? 12, points: tr.points ?? [] }));
        calculateNets();
        dirtyOverlay();
      }
    }).catch(() => {});

    fetch('project.json').then(r => r.ok ? r.json() : {}).catch(() => ({})).then(p => {
      if (p?.name) document.title = `Pistas — ${p.name}`;
    });
  }

  setTool('pan');
  init();
})();
</script>
</body>
</html>
